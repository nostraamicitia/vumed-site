function ChestModal({ onClose, onClaim }) {
  const prize = React.useRef(rollChestPrize()).current;
  const [taps, setTaps]         = React.useState(0);
  const [phase, setPhase]       = React.useState('tap'); // tap | burst | revealed
  const [sparks, setSparks]     = React.useState([]);
  const [rings, setRings]       = React.useState([]);
  const [confetti, setConfetti] = React.useState([]);
  const [drops, setDrops]       = React.useState([]); // reveal coin/gem fountain
  const [wash, setWash]         = React.useState(0);  // gold light wash per upgrade tap
  const hitRef  = React.useRef(null);
  const claimed = React.useRef(false);
  const timers  = React.useRef([]);
  React.useEffect(() => () => timers.current.forEach(clearTimeout), []);

  // ── Sounds (2026-07-16): glitter bed loops (faded in) while the chest is
  //    closed, every tap plays chest1/2/3 (cycling) EXCEPT the opening tap —
  //    that stays silent so the tadaa lands clean over the reveal.
  //    The bed itself lives in gift_modal.js (VumedGlitterBed, loaded on this
  //    page too): Web Audio, because <audio loop> replays LAME's encoder
  //    padding every cycle and that reads as a pause. Shared so the two chest
  //    homes can't drift apart on sound.
  const glitterRef = React.useRef(null);
  const stopGlitter = (ms) => {
    const g = glitterRef.current;
    if (g) { g.stop(ms || 450); glitterRef.current = null; }
  };
  React.useEffect(() => {
    try {
      const Bed = window.VumedGlitterBed;
      if (Bed) glitterRef.current = Bed.start(0.45, 700);
    } catch (e) {}
    return () => stopGlitter(200);
  }, []);
  // each tap plays the next beat of CHEST_TAP_SOUNDS (play order ≠ filename order)
  const sndTap   = (n) => { try { const a = new Audio(CHEST_TAP_SOUNDS[Math.min(n, CHEST_TAP_SOUNDS.length) - 1]); a.volume = 0.8; a.play().catch(() => {}); } catch (e) {} };
  const sndTadaa = ()  => { try { const a = new Audio('sound_chest_tadaa.mp3'); a.volume = 0.85; a.play().catch(() => {}); } catch (e) {} };

  function kick() {
    const el = hitRef.current;
    if (!el) return;
    el.classList.remove('gift-hit');
    void el.offsetWidth; // reflow → restart animation
    el.classList.add('gift-hit');
  }

  function spawnSparks(count, spread) {
    const base = Date.now() + Math.random();
    setSparks(s => [...s, ...Array.from({ length: count }, (_, i) => {
      const rad  = ((i / count) * 360 + Math.random() * 40) * Math.PI / 180;
      const dist = spread + Math.random() * spread * 0.8;
      return {
        id: base + '-' + i,
        gx: (Math.cos(rad) * dist).toFixed(0) + 'px',
        gy: (Math.sin(rad) * dist).toFixed(0) + 'px',
        gr: ((Math.random() - 0.5) * 500).toFixed(0) + 'deg',
        size: 7 + Math.floor(Math.random() * 8),
      };
    })]);
    setRings(r => [...r, base]);
  }

  function spawnConfetti() {
    const COLORS = ['#58C8FF','#AA72FF','#FF6B8A','#58CC02','#FFC800','#FF9600','#00D1FF','#FF5B5B','#34C759','#FFCC00','#5AC8FA', prize.color];
    const n = 40 + prize.stars * 8;
    setConfetti(Array.from({ length: n }, (_, i) => {
      const angle = (i / n) * 360 + (Math.random() - 0.5) * 16;
      const dist  = 100 + Math.random() * 210;
      const rad   = angle * Math.PI / 180;
      return {
        id: i,
        gx: (Math.cos(rad) * dist).toFixed(1) + 'px',
        gy: (Math.sin(rad) * dist).toFixed(1) + 'px',
        gr: ((Math.random() - 0.5) * 800).toFixed(0) + 'deg',
        gd: (Math.random() * 0.22).toFixed(3) + 's',
        color: COLORS[i % COLORS.length],
        ribbon: i % 3 === 0,
        size: 10 + Math.floor(Math.random() * 11),
        rw: 5 + Math.floor(Math.random() * 5),
        rh: 13 + Math.floor(Math.random() * 10),
      };
    }));
  }

  /* Fountain of the currencies actually in the prize: icons erupt up out of
     the chest and fall past it (outer div drifts X, inner arcs Y — see
     chestDropX/Y). Keep in sync with gift_modal.js spawnDrops. */
  function spawnDrops() {
    const mk = (kind, count) => Array.from({ length: count }, (_, i) => {
      const dt = (0.95 + Math.random() * 0.5).toFixed(2) + 's';
      const dd = (Math.random() * 0.28).toFixed(2) + 's';
      return {
        id: kind + i, kind, dt, dd,
        dx: ((Math.random() * 2 - 1) * 230).toFixed(0) + 'px',
        dy: (-(90 + Math.random() * 190)).toFixed(0) + 'px',
        dr: ((Math.random() - 0.5) * 300).toFixed(0) + 'deg',
        size: 16 + Math.floor(Math.random() * 14),
      };
    });
    setDrops([
      ...(prize.gems   > 0 ? mk('gem', 12)  : []),
      ...(prize.coins  > 0 ? mk('coin', 14) : []),
      ...(prize.hearts > 0 ? mk('heart', 8) : []),
    ]);
  }

  function tap() {
    if (phase !== 'tap') return;
    const n = taps + 1;
    setTaps(n);
    sndTap(n);
    // autoplay was blocked on open → this tap IS a user gesture, recover the bed
    if (glitterRef.current) glitterRef.current.retry();
    kick();
    if (n >= prize.plan.length) {
      setPhase('burst');
      spawnSparks(14, 130);
      spawnConfetti();
      timers.current.push(setTimeout(() => {
        stopGlitter(500);
        sndTadaa();
        setPhase('revealed');
        spawnDrops();
        if (!claimed.current) { claimed.current = true; onClaim(prize); }
      }, 620));
    } else {
      // an upgrade tap gets a bigger spark burst + a gold light wash
      const up = prize.plan[n - 1] > prize.plan[n - 2];
      if (up) setWash(w => w + 1);
      spawnSparks(up ? 12 : 8, up ? 115 : 85);
    }
  }

  // stage after n taps = the chest's CURRENT tier from the pre-rolled plan
  // (tap 1 reveals the start tier, later taps may have upgraded it)
  const stageIdx = taps > 0 ? prize.plan[Math.min(taps, prize.plan.length) - 1] : -1;
  const stage    = stageIdx >= 0 ? CHEST_RARITIES[stageIdx] : null;
  // backdrop = current tier (zeldzaam blauw / episch paars / legendarisch
  // goud); gewoon + the reveal stay white
  const tinted = phase !== 'revealed' && stageIdx >= 1;
  const glow = phase === 'revealed'
    ? 'none'
    : stage
      // white glow on a tinted backdrop — the tier colour would drown in it
      ? 'drop-shadow(0 0 ' + (10 + stage.stars * 9) + 'px ' + hexToRgba(tinted ? '#FFFFFF' : stage.color, 0.28 + stage.stars * 0.11) + ')'
      : 'drop-shadow(0 0 10px rgba(255,200,0,0.28))';
  return (
    <div className={'chest-overlay' + (tinted ? ' cbg-' + stageIdx + ' cbg-tint' : '')} style={{
      position: 'fixed', inset: 0, zIndex: 600,
      backdropFilter: 'blur(6px)',
      display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center',
      animation: 'chestOverlayIn 0.18s ease both',
    }}>
      {/* Close */}
      <button
        onClick={e => { e.stopPropagation(); onClose(); }}
        style={{
          position: 'absolute', top: 22, right: 22,
          width: 44, height: 44, borderRadius: 13,
          background: tinted ? 'rgba(255,255,255,0.22)' : '#f2f2f7', border: 'none',
          cursor: 'pointer', fontSize: 18, color: tinted ? '#fff' : '#888',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: 'inherit', zIndex: 4,
          transition: 'background 0.55s ease, color 0.55s ease',
        }}
      >&#10005;</button>

      {/* Title + tap hint */}
      <div className="chest-title" style={{
        fontWeight: 900, fontSize: 26, marginBottom: 6,
        animation: 'chestCardIn 0.35s cubic-bezier(0.25,0.46,0.45,0.94) both',
      }}>Dagelijkse beloning</div>
      {/* Stage label: pre-tap hint "Tik om te openen", then the CURRENT tier
          name — white on a tinted backdrop, tier colour on white (incl. the
          reveal). Keyed on tier + phase so it re-pops on upgrades AND on the
          reveal re-colour. Stars live in the BOTTOM dock (Tijmen 2026-07-19). */}
      <div style={{ height: 52, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <div key={'stagelbl-' + (stage ? stage.key : 'none') + '-' + (phase === 'revealed' ? 'rev' : 'tap')} style={{
          height: 46, display: 'flex', alignItems: 'center',
          fontSize: stage ? 40 : 15, fontWeight: 900,
          letterSpacing: stage ? '0.04em' : 'normal',
          textTransform: stage ? 'uppercase' : 'none',
          color: stage ? (tinted ? '#fff' : stage.labelColor) : '#8E8E93',
          transition: 'color 0.55s ease',
          animation: stage
            ? 'chestStagePop 0.4s cubic-bezier(0.34,1.56,0.64,1) both'
            : (phase === 'tap' ? 'subtitlePulse 1.6s ease-in-out infinite' : 'none'),
        }}>
          {stage ? stage.label + '!' : (phase === 'tap' ? 'Tik om te openen' : ' ')}
        </div>
      </div>

      {/* Stage */}
      <div style={{
        position: 'relative', width: 340, height: 340,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
        {/* Reveal fountain: coins/gems erupt out of the chest and fall */}
        {drops.map(d => (
          <div key={d.id} className="chest-drop"
            style={{ '--dx': d.dx, '--dt': d.dt, '--dd': d.dd }}>
            <div className="chest-drop-in" style={{ '--dy': d.dy, '--dt': d.dt, '--dd': d.dd, '--dr': d.dr }}>
              {d.kind === 'gem' ? <GemIcon size={d.size} /> : d.kind === 'heart' ? <HeartIcon size={d.size} /> : <CoinIcon size={d.size} />}
            </div>
          </div>
        ))}

        {/* Confetti (spawned on the final tap) */}
        {confetti.map(p => (
          <div key={p.id} className="confetti-particle"
            style={{ '--gx': p.gx, '--gy': p.gy, '--gr': p.gr, '--gd': p.gd }}>
            {p.ribbon
              ? <div style={{ width: p.rw, height: p.rh, background: p.color, borderRadius: 2, opacity: 0.9 }} />
              : <svg width={p.size} height={p.size} viewBox="0 0 20 22">
                  <polygon points="10,1 20,8 16,21 4,21 0,8" fill={p.color}/>
                  <polygon points="10,1 20,8 10,6 0,8" fill="rgba(255,255,255,0.38)"/>
                </svg>
            }
          </div>
        ))}

        {/* Per-tap shockwave rings + gold sparks */}
        {rings.map(t => <div key={t} className="shock-ring" />)}
        {sparks.map(p => (
          <div key={p.id} className="tap-spark" style={{ '--gx': p.gx, '--gy': p.gy, '--gr': p.gr }}>
            <svg width={p.size} height={p.size} viewBox="0 0 20 22">
              <polygon points="10,1 20,8 16,21 4,21 0,8" fill="#FFC800"/>
              <polygon points="10,1 20,8 10,6 0,8" fill="rgba(255,255,255,0.45)"/>
            </svg>
          </div>
        ))}

        {/* The present. Tier growth + the reveal exit live on their OWN
            wrapper: chestBounceIn on the outer div fills forwards and would
            override a transform set there. */}
        <div
          onClick={tap}
          style={{
            position: 'relative', zIndex: 1,
            cursor: phase === 'tap' ? 'pointer' : 'default',
            userSelect: 'none', WebkitTapHighlightColor: 'transparent',
            animation: 'chestBounceIn 0.55s cubic-bezier(0.34,1.4,0.64,1) both',
          }}>
          <div style={{
            transform: phase === 'revealed'
              ? 'scale(0.5) translateY(52px)'
              : 'scale(' + CHEST_TIER_SCALE[Math.max(stageIdx, 0)] + ')',
            opacity: phase === 'revealed' ? 0 : 1,
            // the open chest lingers a beat (delays) so the fountain reads as
            // erupting OUT of it before it sinks away
            transition: phase === 'revealed'
              ? 'transform 0.6s 0.15s ease, opacity 0.45s 0.3s ease'
              : 'transform 0.45s cubic-bezier(0.34,1.3,0.64,1), opacity 0.4s ease',
          }}>
            <div className={phase === 'tap' ? 'gift-idle' : ''}>
              <div ref={hitRef} style={{ filter: glow, transition: 'filter 0.2s' }}>
                <GiftSvg taps={taps} needed={prize.plan.length} open={phase !== 'tap'} tier={stage ? stage.stars : 1} />
              </div>
            </div>
          </div>
        </div>

        {/* White flash on burst */}
        {phase !== 'tap' && <div className="gift-flash" />}

        {/* Gold light wash on an upgrade tap (keyed to retrigger) */}
        {wash > 0 && (
          <div key={wash} className="gift-flash" style={{
            background: 'radial-gradient(circle, rgba(255,200,0,0.5) 0%, rgba(255,200,0,0.22) 45%, transparent 72%)',
          }} />
        )}

        {/* Reveal payout: big count-up amounts on the white backdrop — no
            card, no beams. The bottom star dock keeps the final tier. */}
        {phase === 'revealed' && (
          <div style={{
            position: 'absolute', inset: 0, zIndex: 3,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            pointerEvents: 'none',
          }}>
            <div className="chest-payout">
              {prize.gems > 0 && (
                <div className="chest-pay-row chest-pay-gems" style={{ animationDelay: '0.15s' }}>
                  <span className="chest-pay-ico" style={{ animationDelay: '0.2s' }}><GemIcon size={46} /></span>
                  <ChestCountUp target={prize.gems} delay={300} />
                </div>
              )}
              {prize.coins > 0 && (
                <div className={'chest-pay-row ' + (prize.gems > 0 ? 'chest-pay-coins' : 'chest-pay-gems')}
                  style={{ animationDelay: prize.gems > 0 ? '0.34s' : '0.15s' }}>
                  <span className="chest-pay-ico" style={{ animationDelay: prize.gems > 0 ? '0.39s' : '0.2s' }}>
                    <CoinIcon size={prize.gems > 0 ? 32 : 46} />
                  </span>
                  <ChestCountUp target={prize.coins} delay={prize.gems > 0 ? 490 : 300} />
                </div>
              )}
              {prize.hearts > 0 && (() => {
                // hearts stagger in after whatever gems/coins rows exist
                // (the single-roll logic guarantees at least one of those,
                // so this bonus row is never the big first row)
                const slot = (prize.gems > 0 ? 1 : 0) + (prize.coins > 0 ? 1 : 0);
                const d = 0.15 + slot * 0.19;
                return (
                  <div className="chest-pay-row chest-pay-coins chest-pay-heart" style={{ animationDelay: d + 's' }}>
                    <span className="chest-pay-ico" style={{ animationDelay: (d + 0.05) + 's' }}><HeartIcon size={32} /></span>
                    <ChestCountUp target={prize.hearts} delay={(d + 0.15) * 1000} />
                  </div>
                );
              })()}
            </div>
          </div>
        )}
      </div>

      {/* Stars dock — BOTTOM: the chest's current tier (1-4), a star bursts
          in on tap 1 and on every upgrade; stays visible on the reveal. */}
      <div style={{ height: 66, marginTop: 4, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {stage && (
          <div className="chest-stars">
            {Array.from({ length: stage.stars }, (_, i) => <ChestStar key={i} size={44} burst />)}
          </div>
        )}
      </div>

      {/* Button */}
      {phase === 'revealed' && (
        <div style={{
          textAlign: 'center', marginTop: 20,
          animation: 'chestCardIn 0.45s 0.1s cubic-bezier(0.34,1.56,0.64,1) both',
        }}>
          <button
            onClick={e => { e.stopPropagation(); onClose(); }}
            style={{
              background: '#1CB0F6', color: '#fff',
              border: 'none', borderBottom: '4px solid #0e85b5',
              borderRadius: 16, padding: '16px 52px',

            }}
            onMouseEnter={e => e.target.style.background = '#22c3ff'}
            onMouseLeave={e => e.target.style.background = '#1CB0F6'}
            onMouseDown={e => e.target.style.transform = 'translateY(3px)'}
            onMouseUp={e => e.target.style.transform = ''}
          >Geweldig!</button>
        </div>
      )}
    </div>
  );
}

const XP_MILESTONES = [100, 200, 300, 500, 1000, 1500, 2000, 3000, 5000];
function getMilestone(claimedCount) {
  if (claimedCount < XP_MILESTONES.length) return XP_MILESTONES[claimedCount];
  return XP_MILESTONES[XP_MILESTONES.length - 1] + (claimedCount - XP_MILESTONES.length + 1) * 5000;
}
/* Day key for quest claims + daily XP data. MUST be the same ISO-UTC day that
   progressdots.js bumpDaily uses for vumed_daily_<date> — the claims and the
   question counter have to roll over at the same instant. (An earlier
   Europe/Amsterdam version made claims placed between 00:00–02:00 Dutch time
   carry the NEXT UTC day's date, so they showed "Geclaimd" all of that day.) */
function getDayKey() {
  return new Date().toISOString().slice(0, 10);
}
function getDailyData() {
  const today = getDayKey();
  try {
    const s = JSON.parse(localStorage.getItem('vumed_daily') || '{}');
    if (s.date === today) return {
      date: today,
      startXp:      s.startXp      ?? null,
      claimedCount: s.claimedCount || 0,
      guestXp:      s.guestXp      || 0,
    };
  } catch(e) {}
  return { date: today, startXp: null, claimedCount: 0, guestXp: 0 };
}
function saveDailyData(data) {
  try { localStorage.setItem('vumed_daily', JSON.stringify(data)); } catch(e) {}
}
/* Questions answered today — written by progressdots.js (bumpDaily) under an
   ISO-UTC date key, so read it with the same key format. */
function getDailyQuestionCount() {
  try {
    const k = 'vumed_daily_' + new Date().toISOString().slice(0, 10);
    return parseInt(localStorage.getItem(k) || '0', 10) || 0;
  } catch(e) { return 0; }
}
/* Per-day claim state of the fixed-reward quests: { questId: true } */
function getQuestClaims() {
  const today = getDayKey();
  try {
    const s = JSON.parse(localStorage.getItem('vumed_quests') || '{}');
    if (s.date === today) return s.claimed || {};
  } catch(e) {}
  return {};
}
function saveQuestClaims(claimed) {
  try { localStorage.setItem('vumed_quests', JSON.stringify({ date: getDayKey(), claimed })); } catch(e) {}
}

function App() {
  const [activeYear, setActiveYear] = React.useState("Jaar 1");
  // Live spiegel van activeYear voor de swipe-handler (die maar 1× wordt geïnstalleerd).
  const _yrRef = React.useRef(activeYear);
  _yrRef.current = activeYear;

  // Jaar-swipe (phone): veeg naar LINKS = volgend jaar, naar rechts = vorig jaar
  // (standaard carrousel-richting, gelijk aan het dashboard — Tijmen 2026-07-22).
  // Deze pagina is een verticale-scroll layout (gestapelde jaar-secties), dus de
  // veeg scrollt naar de sectie i.p.v. te pagen; de scroll-spy werkt de pill bij.
  React.useEffect(() => {
    function startsInHScroll(node) {
      for (var el = node; el && el !== document.body; el = el.parentElement) {
        if (!(el instanceof Element)) continue;
        if (el.scrollWidth - el.clientWidth > 8) {
          var ov = getComputedStyle(el).overflowX;
          if (ov === 'auto' || ov === 'scroll') return true;
        }
      }
      return false;
    }
    var overlayOpen = function () {
      return !!(document.querySelector('.modal-overlay') || document.querySelector('.quest-panel'));
    };
    var isPhone = function () { return window.matchMedia('(max-width:768px)').matches; };
    var sx = 0, sy = 0, st = 0, tracking = false;
    function onStart(e) {
      if (!isPhone() || e.touches.length !== 1 || overlayOpen() || startsInHScroll(e.target)) { tracking = false; return; }
      var t = e.touches[0]; sx = t.clientX; sy = t.clientY; st = Date.now(); tracking = true;
    }
    function onEnd(e) {
      if (!tracking) return;
      tracking = false;
      var t = e.changedTouches[0];
      var dx = t.clientX - sx, dy = t.clientY - sy, dt = Date.now() - st;
      if (dt > 800 || Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy) * 1.8) return;
      var cur = parseInt(String(_yrRef.current).replace(/\D/g, ''), 10) || 1;
      var next = dx < 0 ? cur + 1 : cur - 1;   // veeg links = volgend jaar
      if (next < 1 || next > 3 || next === cur) return;
      var el = document.getElementById('section-Jaar-' + next);
      if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); setActiveYear('Jaar ' + next); }
    }
    document.addEventListener('touchstart', onStart, { passive: true });
    document.addEventListener('touchend', onEnd, { passive: true });
    return function () {
      document.removeEventListener('touchstart', onStart);

  function claimDailyGift() {

    if (!vs || !vs.claimGift || giftDay === getDayKey()) return;

  React.useEffect(() => {
    const sb = getSB();
    if (!sb) return;

    // Recovery-link fallbacks (don't rely only on the PASSWORD_RECOVERY event, it can
    // fire before this subscription is registered):
    const hash = window.location.hash || "";
    if (/[#&]type=recovery/.test(hash)) {
      setRecoveryMode(true);
    } else if (/error_code=otp_expired/.test(hash) || (/[#&]error=access_denied/.test(hash) && /type=recovery|otp/.test(hash))) {
      // Expired or already-used recovery link → tell the user instead of silently doing nothing
      setAuthMsg({ type: "err", text: "Deze herstel-link is verlopen of al gebruikt. Vraag hieronder een nieuwe aan via 'Wachtwoord vergeten?'." });
      setAuthModal(true);
      history.replaceState(null, "", window.location.pathname + window.location.search);
    } else if (/[#&]error(_description)?=/.test(hash)) {
      // OAuth (Google/Apple) redirect came back with an error → show it in the login modal
      const m = hash.match(/error_description=([^&]+)/);
      const detail = m ? decodeURIComponent(m[1].replace(/\+/g, " ")) : "";
      setAuthMsg({ type: "err", text: detail || "Inloggen is niet gelukt. Probeer het opnieuw." });
      setAuthModal(true);
      history.replaceState(null, "", window.location.pathname + window.location.search);
    }

    // Restore existing session
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) {
        setUser(session.user);
        loadCompletions(sb, session.user.id);
        initProfile(sb, session.user.id);
        const initial = ((session.user.user_metadata?.full_name || session.user.email || "?")[0]);
        window.renderSidebarProfileIcon && window.renderSidebarProfileIcon(initial);
      }
    });

    // Listen for login / logout events
    const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
      // User arrived via a "wachtwoord vergeten" email link → let them set a new password
      if (event === 'PASSWORD_RECOVERY') { setRecoveryMode(true); setAuthModal(false); }
      if (session?.user) {
        setUser(session.user);
        loadCompletions(sb, session.user.id);
        initProfile(sb, session.user.id);
        const initial = ((session.user.user_metadata?.full_name || session.user.email || "?")[0]);

        setQuestionStreak(null);

  function creditPrize(prize) {
    const vs = window.VumedStats;
    if (vs && vs.awardGems) {
      vs.awardGems(prize.gems);
      if (vs.awardCoins) vs.awardCoins(prize.coins);

              alignItems: 'center', justifyContent: 'center',
              fontSize: 10.5, fontWeight: 800, color: '#AFAFAF', letterSpacing: '0.02em',
            }}>{Math.min(now, target).toLocaleString('nl-NL')} / {target.toLocaleString('nl-NL')}</span>
          </div>
        );
        const Bolt = ({ size }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0 }}>
            <path d="M13 2L4.5 13.5H11L10 22L19.5 10H13L13 2Z" fill="#FFC800"/>
          </svg>
        );
        // mini EHBO-koffertje (shop.html GIFT) — keep in sync
        const Gift = ({ size }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0 }}>
            <rect x="8.6" y="2.6" width="6.8" height="4.8" rx="2.4" stroke="#E03131" strokeWidth="1.7"/>
            <rect x="2.5" y="5.4" width="19" height="15.2" rx="3" fill="#FF4B4B"/>
            <rect x="2.5" y="5.4" width="19" height="4.2" rx="3" fill="#FF6B6B"/>
            <rect x="2.5" y="9.4" width="19" height="1.4" fill="rgba(0,0,0,0.14)"/>
            <rect x="10.4" y="11" width="3.2" height="7.6" rx="1" fill="#fff"/>
            <rect x="8.2" y="13.2" width="7.6" height="3.2" rx="1" fill="#fff"/>
          </svg>
        );
        return (
          <>
            <button className="quest-tab" title="Daily quests"
              onClick={() => {
                if (questsOpen) { closeQuests(); return; }
                setDailyCount(getDailyQuestionCount()); setQuestClaims(getQuestClaims()); setQuestsOpen(true);
              }}>
              <Bolt size={24} />
              {claimable > 0 && <span className="quest-badge">{claimable}</span>}
            </button>
            {questsOpen && (
              <>
                <div className={"quest-panel" + (questsClosing ? " qp-closing" : "")}>
                  {/* Header */}
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 2 }}>
                    <span style={{ fontWeight: 900, fontSize: 18, color: dk ? '#FFFFFF' : '#1C1C1E' }}>Dagelijkse quests</span>
                    <button onClick={closeQuests} style={{
                      width: 30, height: 30, borderRadius: 9, border: 'none',
                      background: dk ? '#3A3A3C' : '#F2F2F7', color: '#8E8E93',
                      fontSize: 13, cursor: 'pointer', fontFamily: 'inherit',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                    }}>&#10005;</button>
                  </div>
                  <div style={{ fontSize: 12, fontWeight: 700, color: '#afafaf', marginBottom: 16 }}>Elke dag nieuwe quests</div>

                  {/* Dagelijkse beloning — free daily random chest (moved here from the shop) */}
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '14px 0', borderBottom: '1px solid ' + (dk ? '#3A3A3C' : '#EEEEF0') }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 800, fontSize: 13.5, color: dk ? '#FFFFFF' : '#1C1C1E', marginBottom: 3 }}>Dagelijkse beloning</div>
                      <div style={{ fontSize: 12, fontWeight: 700, color: dk ? '#9A9AA0' : '#8E8E93' }}>Een verrassingskist, elke dag opnieuw</div>
                    </div>
                    <div style={{ flexShrink: 0, minWidth: 74, display: 'flex', justifyContent: 'center' }}>
                      {!user ? (
                        /* Guests: reward is dimmed — clicking opens the login pop-up */
                        <div style={{ cursor: 'pointer', display: 'flex', alignItems: 'center', opacity: 0.5 }}
                             title="Log in om je dagelijkse beloning te claimen" onClick={() => setAuthModal(true)}>
                          <Gift size={42} />
                        </div>
                      ) : giftReady ? (
                        <div style={{ cursor: 'pointer', display: 'flex', alignItems: 'center', animation: 'qpGiftPulse 1.3s ease-in-out infinite' }}
                             title="Klik om je beloning te claimen!" onClick={claimDailyGift}>
                          <Gift size={42} />
                        </div>
                      ) : (
                        <span style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 12, fontWeight: 800, color: '#58CC02' }}>
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 12.5L9.5 18L20 6.5" stroke="#58CC02" strokeWidth="3.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
                          Geclaimd
                        </span>
                      )}
                    </div>
                  </div>

                  {/* XP quest — chest reward */}
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 0 14px', borderBottom: '1px solid ' + (dk ? '#3A3A3C' : '#EEEEF0') }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 800, fontSize: 13.5, color: dk ? '#FFFFFF' : '#1C1C1E', marginBottom: 7 }}>Verdien {xpTarget.toLocaleString('nl-NL')} XP</div>
                      <Bar now={xpNow} target={xpTarget} />
                    </div>
                    <div
                      ref={chestWrapRef}
                      style={{ cursor: (!user || xpDone) ? 'pointer' : 'default', flexShrink: 0, minWidth: 74, justifyContent: 'center', display: 'flex', alignItems: 'center',
                               opacity: (xpDone && user) ? 1 : 0.5,
                               animation: (xpDone && user) ? 'qpGiftPulse 1.3s ease-in-out infinite' : 'none' }}
                      title={!user ? 'Log in om je beloning te claimen' : (xpDone ? 'Klik om je beloning te claimen!' : 'Verdien XP om je beloning te ontgrendelen')}
                      onClick={() => { if (!user) setAuthModal(true); else if (xpDone) setChestModal(true); else bumpChest(); }}
                    >
                      <Gift size={42} />
                    </div>
                  </div>

                  {/* Question-count quests — gem rewards */}
                  {QUESTS.map((q, i) => {
                    const done = dailyCount >= q.target;
                    const claimed = !!questClaims[q.id];
                    return (
                      <div key={q.id} style={{
                        display: 'flex', alignItems: 'center', gap: 12, padding: '14px 0',
                        borderBottom: i < QUESTS.length - 1 ? '1px solid ' + (dk ? '#3A3A3C' : '#EEEEF0') : 'none',
                      }}>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontWeight: 800, fontSize: 13.5, color: dk ? '#FFFFFF' : '#1C1C1E', marginBottom: 7 }}>{q.label}</div>
                          <Bar now={dailyCount} target={q.target} />
                        </div>
                        <div style={{ flexShrink: 0, minWidth: 74, display: 'flex', justifyContent: 'center' }}>
                          {claimed ? (
                            <span style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 12, fontWeight: 800, color: '#58CC02' }}>
                              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 12.5L9.5 18L20 6.5" stroke="#58CC02" strokeWidth="3.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
                              Geclaimd
                            </span>
                          ) : done ? (
                            <div style={{ cursor: 'pointer', display: 'flex', alignItems: 'center', animation: 'qpGiftPulse 1.3s ease-in-out infinite' }}
                                 title="Klik om je beloning te claimen!" onClick={() => setQuestChest({ id: q.id })}>
                              <Gift size={42} />
                            </div>
                          ) : (
                            <span style={{ display: 'inline-flex', opacity: 0.5 }} title="Beloning — voltooi de quest">
                              {/* mini EHBO-koffertje (shop.html GIFT) — keep in sync */}
                              <Gift size={42} />
                            </span>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </>
        );
      })()}

      {/* XP-milestone chest — random loot roll. Claim fires once at reveal;
          closing early leaves the chest claimable. */}
      {chestModal && (
        <ChestModal
          onClose={() => setChestModal(false)}
          onClaim={claimChestPrize}
        />
      )}

      {/* Question-quest reward — same random loot roll. */}
      {questChest && (
        <ChestModal
          onClose={() => setQuestChest(null)}
          onClaim={(prize) => claimQuest(questChest.id, prize)}
        />
      )}

      {/* Shift+R dev preview — throwaway roll, claims nothing */}
      {previewChest && (
        <ChestModal
          onClose={() => setPreviewChest(false)}
          onClaim={() => {}}
        />
      )}

      {/* Auth Modal */}
      {authModal && (
        <AuthModal
          onClose={() => { setAuthModal(false); setAuthMsg(null); }}
          onLoggedIn={() => { setAuthModal(false); setAuthMsg(null); }}
          initialMsg={authMsg}
        />
      )}

      {/* Set-new-password Modal (after a "wachtwoord vergeten" email link) */}
      {recoveryMode && (
        <ResetPasswordModal onClose={() => setRecoveryMode(false)} />
      )}

      {/* Avatar Modal */}
      {avatarModal && (
        <AvatarModal onClose={() => setAvatarModal(false)} />
      )}

      {examPopup && (
        <ExamPopup
          popup={examPopup}
          onClose={() => setExamPopup(null)}
          onStart={() => startExam(examPopup)}
        />
      )}

    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
(function() {
  function initGemRows() {
    document.querySelectorAll('.gem-row:not([data-gem-inited])').forEach(function(el) {
      el.setAttribute('data-gem-inited', '1');
      el.addEventListener('mouseenter', function() {
        el.classList.remove('gem-animating');
        void el.offsetWidth;
        el.classList.add('gem-animating');
        clearTimeout(el._gemTimer);
        el._gemTimer = setTimeout(function() { el.classList.remove('gem-animating'); }, 4100);
      });
    });
  }
  new MutationObserver(initGemRows).observe(document.body, { childList: true, subtree: true });
})();
</script>

<!-- ── Drop-in reveal: subject cards fall onto the page ("toenk toenk"), jaar-
     headers draw themselves in. Same system as dashboard.html's dashDrop,
     adapted for this page: the scroll container is #root and the DOM comes from
     React — a MutationObserver catches the mount pre-paint (so cards never
     flash visible before their drop), and the classes we add survive re-renders
     because React only patches props it owns. ── -->
<script>
(function () {
  if (!('IntersectionObserver' in window)) return;
  if (window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  var CARD = '.subject-card', HEAD = '.vm-sechead';
  // Entrance window: the first 1.6s after the FIRST reveal = the page-entry
  // cascade (deeper stagger). After that: quick scroll-reveal drops.
  var firstAt = 0;
  function stagDelay(n) {
    if (!firstAt) firstAt = Date.now();
    var entrance = (Date.now() - firstAt) < 1600;
    return (entrance ? Math.min(n, 7) * 95 : Math.min(n, 4) * 60) + 'ms';
  }
  function drop(el, n) {
    el.style.animationDelay = stagDelay(n);
    el.classList.add('in');
    io.unobserve(el);
  }
  var io = new IntersectionObserver(function (ents) {
    var n = 0;
    ents.forEach(function (e) {
      if (!e.isIntersecting) return;
      drop(e.target, n); n++; // stagger elements that enter together
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -5% 0px' });
  // When a drop finishes, strip the animation (.landed) so the hover-lift
  // transition works again — this also triggers the icon settle-wiggle.
  document.addEventListener('animationend', function (e) {
    if (e.animationName === 'vmDrop') {
      e.target.classList.add('landed');
      e.target.style.animationDelay = '';
    }
  });
  function scan() {
    var els = document.querySelectorAll(CARD + ',' + HEAD);
    for (var i = 0; i < els.length; i++) {
      var el = els[i];
      if (el.__rev) continue;
      el.__rev = true;
      el.classList.add(el.matches(HEAD) ? 'vm-rv' : 'vm-reveal');
      io.observe(el);
    }
  }
  // Reveal everything currently inside the viewport — backs up the observer so
  // the drop never depends on IO delivery timing (throttled/background tabs).
  function revealVisible() {
    var els = document.querySelectorAll('.vm-reveal:not(.in), .vm-sechead.vm-rv:not(.in)'), n = 0;
    for (var i = 0; i < els.length; i++) {
      var r = els[i].getBoundingClientRect();
      if (r.bottom > 0 && r.top < window.innerHeight * 0.92) { drop(els[i], n); n++; }
    }
  }
  function boot() {
    var root = document.getElementById('root') || document.body;
    scan(); revealVisible();
    // Scan synchronously on each React commit: MutationObserver callbacks run
    // as a microtask, before the browser paints the inserted nodes.
    new MutationObserver(function () { scan(); }).observe(root, { childList: true, subtree: true });
    // Poll a few times so async renders + the study-year jump are caught even
    // where IO/scroll delivery is throttled.
    [150, 500, 1200, 2500].forEach(function (ms) { setTimeout(function () { scan(); revealVisible(); }, ms); });
    var lastT = 0;
    function onScroll() { var now = Date.now(); if (now - lastT < 90) return; lastT = now; revealVisible(); }
    root.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('scroll', onScroll, { passive: true });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
</script>
