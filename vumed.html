  <title>VUmed – Tentamens Geneeskunde VU</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    /* The sticky header (z-index 100) would cover the shared vumed_stats.js bar
       (default z-index 60). Lift the bar above it so it shows in the header's
       now-empty right area. Scoped to this page only. */
    #vumed-stats { z-index: 150 !important; }
    /* Hide the bar for logged-out guests (the header shows the Inloggen button
       there instead). Default-hidden until React resolves the session, so a
       logged-in user's bar doesn't flash-then-hide. */
    html.vumed-guest #vumed-stats { display: none !important; }
    /* When the centered bar IS shown (logged in), it sits where the year tabs
       are, so drop the tabs just below it and give the header room. Guests keep
       the tabs centered (no bar). */
    html:not(.vumed-guest) .year-nav { top: 48px; }
    /* Tall enough that the year pills (bottom ≈ 95px) never poke out under the
       sticky header while content scrolls beneath it. */
    html:not(.vumed-guest) header > div { height: 110px !important; }
    body {
      font-family: 'Nunito', 'Varela Round', 'Arial Rounded MT Bold', Arial, sans-serif;
      background: #FFFFFF;
      color: #1C1C1E;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex; height: 100vh; overflow: hidden;
    }
    #root { flex: 1; overflow-y: auto; height: 100vh; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.14); border-radius: 10px; }

    /* ── Keyframe animations ── */
    @keyframes examPopupIn {
      0%   { opacity: 0; transform: scale(0.82) translateY(10px); }
      65%  { opacity: 1; transform: scale(1.035) translateY(-2px); }
      100% { opacity: 1; transform: scale(1)     translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.93) translateY(12px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }
    @keyframes overlayIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Card hover lift ── */
    .subject-card {
      transition: transform 0.28s cubic-bezier(0.25,0.46,0.45,0.94),
                  box-shadow 0.28s cubic-bezier(0.25,0.46,0.45,0.94);
      will-change: transform;
    }
    .subject-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 56px rgba(0,0,0,0.11), 0 6px 18px rgba(0,0,0,0.07) !important;
    }

    /* ── Drop-in reveal: subject cards fall onto the page and land with a
       squash-bounce ("toenk") — same family as the dashboard tiles, tuned a
       little heavier because these cards are big. The vm-reveal class is only
       ever added by the reveal script, so without JS nothing is hidden. ── */
    .vm-reveal { opacity: 0; transform-origin: 50% 100%; will-change: opacity, transform; }
    .vm-reveal.in { animation: vmDrop 0.6s cubic-bezier(0.5,0,0.85,0.4) both; }
    /* animationend → .landed strips the finished animation so the hover-lift
       transition (also transform) works again afterwards. */
    .vm-reveal.landed { animation: none; opacity: 1; will-change: auto; }
    @keyframes vmDrop {
      0%   { opacity: 0; transform: translateY(-30px) scaleY(1.03) scaleX(0.99);
             animation-timing-function: cubic-bezier(0.5,0,0.85,0.4); }  /* accelerating fall */
      34%  { opacity: 1; }
      52%  { transform: translateY(2px) scaleY(0.955) scaleX(1.015);
             animation-timing-function: cubic-bezier(0.18,0.65,0.3,1); } /* TOENK — impact squash */
      74%  { transform: translateY(-3px) scaleY(1.012) scaleX(0.997);
             animation-timing-function: cubic-bezier(0.5,0,0.6,1); }     /* rebound hop */
      88%  { transform: translateY(1px) scaleY(0.994) scaleX(1.003);
             animation-timing-function: cubic-bezier(0.25,0.5,0.4,1); }  /* tiny second toenk */
      100% { opacity: 1; transform: none; }
    }
    /* The subject icon "settles" with a springy wiggle right after its card lands */
    .vm-reveal.landed .subj-head > div:first-child > svg {
      animation: vmIcoSettle 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes vmIcoSettle {
      0%   { transform: rotate(0) scale(1); }
      35%  { transform: rotate(-10deg) scale(1.16); }
      65%  { transform: rotate(6deg) scale(1.04); }
      100% { transform: rotate(0) scale(1); }
    }
    /* Ambient: slow light sweep across the coloured card headers (dashboard's bnShine) */
    .subj-head { position: relative; overflow: hidden; }
    .subj-head::after {
      content: ''; position: absolute; top: -30%; left: 0; width: 34%; height: 160%;
      background: linear-gradient(105deg, transparent, rgba(255,255,255,0.09) 42%, rgba(255,255,255,0.16) 50%, rgba(255,255,255,0.09) 58%, transparent);
      transform: skewX(-16deg) translateX(-330%);
      animation: bnShine 7s ease-in-out infinite; pointer-events: none;
    }
    @keyframes bnShine {
      0%        { transform: skewX(-16deg) translateX(-330%); }
      27%, 100% { transform: skewX(-16deg) translateX(430%); }
    }
    /* Jaar-section headers: chip pops in, divider line draws itself out of it.
       Hidden state is gated on the JS-added vm-rv marker (no-JS stays visible). */
    .vm-sechead.vm-rv .vm-secchip { opacity: 0; transform: scale(0.5); }
    .vm-sechead.vm-rv .vm-secline { transform: scaleX(0); transform-origin: left center; }
    .vm-sechead.vm-rv.in .vm-secchip { animation: vmChipPop 0.55s cubic-bezier(0.34,1.56,0.64,1) both; }
    .vm-sechead.vm-rv.in .vm-secline { animation: vmLineGrow 0.8s cubic-bezier(0.22,1,0.36,1) 0.15s both; }
    @keyframes vmChipPop {
      0%   { opacity: 0; transform: scale(0.5); }
      70%  { opacity: 1; transform: scale(1.09); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes vmLineGrow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    /* START button in the exam popup: soft white pulse ring invites the tap */
    .vm-startbtn { animation: vmStartPulse 1.7s ease-in-out 0.35s infinite; transition: transform 0.1s; }
    .vm-startbtn:active { transform: translateY(2px); }
    @keyframes vmStartPulse {
      0%, 100% { box-shadow: 0 3px 0 rgba(0,0,0,0.14), 0 0 0 0 rgba(255,255,255,0.55); }
      55%      { box-shadow: 0 3px 0 rgba(0,0,0,0.14), 0 0 0 9px rgba(255,255,255,0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .vm-reveal, .vm-reveal.in { opacity: 1 !important; animation: none !important; }
      .vm-sechead.vm-rv .vm-secchip, .vm-sechead.vm-rv .vm-secline { opacity: 1 !important; transform: none !important; animation: none !important; }
      .subj-head::after, .vm-startbtn, .year-btn.ypop, .year-btn.ypop::after,
      .vm-reveal.landed .subj-head > div:first-child > svg { animation: none !important; }
    }

    /* ── Page content fade-in ── */
    .page-content {
      animation: fadeInUp 0.36s cubic-bezier(0.25,0.46,0.45,0.94) both;
    }

    /* ── Modal animations ── */
    .modal-overlay { animation: overlayIn 0.18s ease both; }
    .modal-box     { animation: modalIn  0.28s cubic-bezier(0.25,0.46,0.45,0.94) both; }

    /* ── Year button transitions + tap feedback ── */
    .year-btn {
      position: relative; overflow: hidden;
      transition: transform 0.18s cubic-bezier(0.25,0.46,0.45,0.94),
                  background 0.2s ease,
                  box-shadow 0.2s ease;
    }
    .year-btn:hover  { box-shadow: 0 4px 16px rgba(0,0,0,0.18); filter: brightness(1.09); }
    .year-btn:active { transform: translateY(2px) scale(0.97); outline: none; }
    /* Click → springy pop + a white flash that blooms out of the tap point.
       --rx comes from the click handler; the classes are CSS-only extras on a
       React element whose className prop never changes, so React leaves them. */
    .year-btn.ypop { animation: vmBtnPop 0.45s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes vmBtnPop {
      0%   { transform: translateY(2px) scale(0.96); }
      55%  { transform: translateY(-2px) scale(1.035); }
      100% { transform: translateY(0) scale(1); }
    }
    .year-btn.ypop::after {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: radial-gradient(circle at var(--rx,50%) 50%, rgba(255,255,255,0.55), rgba(255,255,255,0.12) 45%, transparent 70%);
      transform-origin: var(--rx,50%) 50%;
      animation: vmBtnFlash 0.55s ease-out both; pointer-events: none;
    }
    @keyframes vmBtnFlash {
      0%   { opacity: 1; transform: scale(0.35); }
      100% { opacity: 0; transform: scale(1.8); }
    }

    /* ── Nav segmented control ── */
    .nav-pill {
      transition: background 0.22s cubic-bezier(0.25,0.46,0.45,0.94),
                  box-shadow 0.22s cubic-bezier(0.25,0.46,0.45,0.94),
                  color 0.22s ease,
                  transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
    }
    .nav-pill:active { transform: translateY(1px) scale(0.96) !important; }

    /* ── Auth button hover (Duolingo style) ── */
    .auth-primary        { transition: transform 0.1s, box-shadow 0.1s, background 0.15s; }
    .auth-primary:hover  { background: #22c3ff !important; }
    .auth-primary:active { transform: translateY(3px) !important; box-shadow: 0 1px 0 #0e85b5 !important; }
    .modal-submit        { transition: transform 0.1s, box-shadow 0.1s, background 0.15s; }
    .modal-submit:hover  { background: #22c3ff !important; }
    .modal-submit:active { transform: translateY(3px) !important; box-shadow: 0 2px 0 #0e85b5 !important; }

    /* ── Logout button hover ── */
    .btn-logout-hdr {
      transition: transform 0.12s cubic-bezier(0.25,0.46,0.45,0.94),
                  box-shadow 0.12s cubic-bezier(0.25,0.46,0.45,0.94),
                  background 0.15s ease;
    }
    .btn-logout-hdr:hover  {
      background: #22c3ff !important;
      box-shadow: 0 4px 14px rgba(28,176,246,0.35) !important;
    }
    .btn-logout-hdr:active {
      transform: translateY(2px) !important;
      box-shadow: 0 1px 0 #0e85b5 !important;
    }

    /* ── Input focus ring ── */
    .ios-input:focus { border-color: #1CB0F6 !important; box-shadow: 0 0 0 3px rgba(28,176,246,0.18); }

    /* ── Daily quests flyout ── */
    .quest-tab {
      position: fixed; right: 0; top: 50%; transform: translateY(-50%);
      width: 46px; height: 52px;
      background: #fff; border: 1.5px solid #D1D1D6; border-right: none;
      border-radius: 14px 0 0 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      cursor: pointer; z-index: 380;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .quest-tab:hover { transform: translate(-3px, -50%); box-shadow: 0 6px 18px rgba(0,0,0,0.12); }
    .quest-tab .quest-badge {
      position: absolute; top: -7px; left: -7px;
      min-width: 20px; height: 20px; padding: 0 5px;
      border-radius: 10px; background: #FF3B30; color: #fff;
      font-size: 11px; font-weight: 800; font-family: inherit;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(255,59,48,0.4);
    }
    html.dark .quest-tab { background: #2C2C2E; border-color: #48484A; }
    @keyframes questPanelIn {
      from { opacity: 0; transform: translate(46px, -50%); }
      to   { opacity: 1; transform: translate(0, -50%); }
    }
    @keyframes questPanelOut {
      from { opacity: 1; transform: translate(0, -50%); }
      to   { opacity: 0; transform: translate(46px, -50%); }
    }
    .quest-panel {
      /* Vertically centred on the .quest-tab button (both at top:50%) */
      position: fixed; right: 12px; top: 50%; transform: translate(0, -50%);
      width: 344px; max-width: calc(100vw - 24px);
      max-height: calc(100vh - 140px); overflow-y: auto;
      background: #fff; border: 1.5px solid #D1D1D6; border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.10);
      padding: 20px 18px 16px; z-index: 400;
      animation: questPanelIn 0.34s cubic-bezier(0.22,1,0.36,1) both;
    }
    .quest-panel.qp-closing {
      animation: questPanelOut 0.26s cubic-bezier(0.4,0,0.68,0.6) both;
    }
    /* Phone: the quest panel becomes a full-screen page sliding in from the right */
    @keyframes questPageIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes questPageOut { from { transform: translateX(0); } to { transform: translateX(100%); } }
    @media (max-width: 768px) {
      .quest-panel {
        inset: 0; width: 100%; max-width: 100%; max-height: 100%;
        transform: none; border: none; border-radius: 0; box-shadow: none;
        padding: calc(16px + env(safe-area-inset-top)) 16px calc(20px + env(safe-area-inset-bottom));
        animation: questPageIn 0.32s cubic-bezier(0.22,1,0.36,1) both;
      }
      .quest-panel.qp-closing { animation: questPageOut 0.26s cubic-bezier(0.4,0,0.68,0.6) both; }
    }
    html.dark .quest-panel { background: #2C2C2E; border-color: #48484A; }
    .quest-claim-btn {
      background: #1CB0F6; color: #fff; border: none;
      border-bottom: 3px solid #0e85b5; border-radius: 10px;
      padding: 7px 14px; font-size: 12px; font-weight: 800;
      font-family: inherit; text-transform: uppercase; letter-spacing: 0.05em;
      cursor: pointer; transition: background 0.15s, transform 0.1s;
      animation: questClaimPulse 1.4s ease-in-out infinite;
    }
    .quest-claim-btn:hover  { background: #22c3ff; }
    .quest-claim-btn:active { transform: translateY(2px); border-bottom-width: 1px; }
    /* Off state — daily reward for guests: dimmed, no pulse, click opens login */
    .quest-claim-btn.quest-off { background: #C7C7CC; border-bottom-color: #A9A9AE; animation: none; }
    .quest-claim-btn.quest-off:hover { background: #BFBFC4; }
    html.dark .quest-claim-btn.quest-off { background: #48484A; border-bottom-color: #3A3A3C; }
    @keyframes questClaimPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(28,176,246,0.45); }
      55%      { box-shadow: 0 0 0 8px rgba(28,176,246,0); }
    }
    @keyframes qpGiftPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.13); } }

    /* ── Doctor mascot animations ── */
    @keyframes docFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-5px); }
    }
    @keyframes docWave {
      0%, 100% { transform: rotate(0deg); transform-origin: bottom center; }
      20%       { transform: rotate(20deg); transform-origin: bottom center; }
      40%       { transform: rotate(-8deg); transform-origin: bottom center; }
      60%       { transform: rotate(16deg); transform-origin: bottom center; }
      80%       { transform: rotate(-4deg); transform-origin: bottom center; }
    }
    @keyframes eyeBlink {
      0%, 90%, 100% { transform: scaleY(1); }
      95%           { transform: scaleY(0.1); }
    }
    .doc-mascot        { animation: docFloat 3s ease-in-out infinite; display:block; }
    .doc-wave-arm      { animation: docWave 2.5s ease-in-out 1s infinite; transform-box: fill-box; transform-origin: 50% 100%; }
    .doc-eye-l         { animation: eyeBlink 4s ease-in-out 0.5s infinite; transform-box: fill-box; transform-origin: 50% 50%; }
    .doc-eye-r         { animation: eyeBlink 4s ease-in-out 0.7s infinite; transform-box: fill-box; transform-origin: 50% 50%; }

    /* ── Chest reward modal ── */
    @keyframes chestOverlayIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes chestCardIn {
      from { opacity: 0; transform: scale(0.82) translateY(28px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }
    @keyframes gemBurst {
      0%   { transform: translate(calc(-50% + 0px), calc(-50% + 0px)) scale(0) rotate(0deg); opacity: 0; }
      18%  { opacity: 1; transform: translate(calc(-50% + var(--gx) * 0.28), calc(-50% + var(--gy) * 0.28)) scale(1.5) rotate(30deg); }
      100% { transform: translate(calc(-50% + var(--gx)), calc(-50% + var(--gy))) scale(0.25) rotate(var(--gr)); opacity: 0; }
    }
    @keyframes gemCountIn {
      0%   { transform: scale(0.2) rotate(-10deg); opacity: 0; }
      62%  { transform: scale(1.22) rotate(4deg);  opacity: 1; }
      100% { transform: scale(1)   rotate(0deg);   opacity: 1; }
    }
    @keyframes chestIdleGlow {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(255,200,0,0.25)); }
      50%       { filter: drop-shadow(0 0 22px rgba(255,200,0,0.70)); }
    }
    @keyframes chestTapBounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }
    @keyframes subtitlePulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.55; }
    }
    .gem-particle {
      position: absolute; top: 50%; left: 50%;
      pointer-events: none;
      animation: gemBurst 1.1s cubic-bezier(0.22,0.61,0.36,1) forwards;
      animation-delay: var(--gd, 0s);
      opacity: 0;
    }
    .chest-modal-glow   { animation: chestIdleGlow 2s ease-in-out infinite; }
    .chest-tap-animate  { animation: chestTapBounce 1.4s ease-in-out infinite; cursor: pointer; }
    @keyframes chestNope {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.13); }
      100% { transform: scale(1); }
    }
    .chest-nope { animation: chestNope 0.5s cubic-bezier(0.34, 1.4, 0.64, 1) both; }

    /* ── Tap-to-open gift (Brawl-style) ── */
    /* Backdrop follows the chest's CURRENT tier (Tijmen 2026-07-19): gewoon =
       wit, zeldzaam = blauw, episch = paars, legendarisch = goud — and back to
       white on the reveal. Dark-mode tier rules NEED the html.dark prefix:
       html.dark .chest-overlay (0,2,1) outranks .chest-overlay.cbg-N (0,2,0)
       — gotcha 5. Keep in sync with gift_modal.js .vg-bgN. */
    .chest-overlay { background: rgba(255,255,255,0.97); transition: background 0.55s ease; }
    html.dark .chest-overlay { background: rgba(16,16,18,0.97); }
    .chest-overlay.cbg-1 { background: rgba(23,151,216,0.97); }
    .chest-overlay.cbg-2 { background: rgba(147,88,238,0.97); }
    .chest-overlay.cbg-3 { background: rgba(255,179,0,0.97); }
    html.dark .chest-overlay.cbg-1 { background: rgba(15,105,155,0.97); }
    html.dark .chest-overlay.cbg-2 { background: rgba(104,55,182,0.97); }
    html.dark .chest-overlay.cbg-3 { background: rgba(202,141,0,0.97); }
    .chest-title  { color: #1C1C1E; transition: color 0.55s ease; }
    html.dark .chest-title  { color: #F2F2F7; }
    .chest-overlay.cbg-tint .chest-title { color: #fff; }
    /* stars dock (BOTTOM) — naked gold stars, no pill (Tijmen 2026-07-19:
       "delete the grey div"); white glow keeps them readable on tinted/gold
       backdrops. Keep in sync with gift_modal.js .vg-stars */
    .chest-stars { display: flex; gap: 12px; align-items: center; }
    .chest-overlay.cbg-tint .chest-star svg { filter: drop-shadow(0 0 8px rgba(255,255,255,0.85)) drop-shadow(0 2px 4px rgba(0,0,0,0.18)); }
    @keyframes giftIdle {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50%      { transform: translateY(-7px) rotate(1deg); }
    }
    @keyframes giftHit {
      0%   { transform: scale(1,1) rotate(0deg); }
      30%  { transform: scale(1.15,0.82) rotate(-5deg); }
      60%  { transform: scale(0.93,1.1) rotate(4deg); }
      100% { transform: scale(1,1) rotate(0deg); }
    }
    @keyframes giftPrimed {
      0%, 100% { transform: rotate(0deg) scale(1); }
      15% { transform: rotate(-3.5deg) scale(1.02); }
      30% { transform: rotate(3.5deg)  scale(1.03); }
      45% { transform: rotate(-3deg)   scale(1.02); }
      60% { transform: rotate(3deg)    scale(1.03); }
      80% { transform: rotate(-2deg)   scale(1.01); }
    }

/* ─────────────────────────── LOTTIE CHEST ─────────────────────────── */
function LottieChest({ size = 70, playing = false }) {
  const ref    = React.useRef(null);
  const animRef = React.useRef(null);
  const ready  = React.useRef(false);

  React.useEffect(() => {
    if (!ref.current || !window.lottie) return;
    const anim = window.lottie.loadAnimation({
      container: ref.current,
      renderer: 'svg',
      loop: true,
      autoplay: false,
      path: 'chest_anim.json',
    });
    animRef.current = anim;
    anim.addEventListener('DOMLoaded', () => {
      ready.current = true;
      if (playing) {
        anim.playSegments([0, 30], true);
      } else {
        anim.goToAndStop(0, true);
      }
    });
    return () => anim.destroy();
  }, []);

  React.useEffect(() => {
    if (!ready.current || !animRef.current) return;
    if (playing) {
      animRef.current.playSegments([0, 30], true);
    } else {
      animRef.current.goToAndStop(0, true);
    }
  }, [playing]);

  return <div ref={ref} style={{ width: size, height: size, flexShrink: 0 }} />;
}

/* ─────────────────────────── LOTTIE COIN ─────────────────────────── */
function LottieCoin({ size = 32, playing = false, extraStyle }) {
  const ref       = React.useRef(null);
  const animRef   = React.useRef(null);
  const ready     = React.useRef(false);
  const spinPhase = React.useRef(0);

  React.useEffect(() => {
    if (!ref.current || !window.lottie) return;
    const anim = window.lottie.loadAnimation({
      container: ref.current,
      renderer: 'svg',
      loop: false,
      autoplay: false,
      path: 'coin_anim.json',
    });
    animRef.current = anim;
    anim.addEventListener('DOMLoaded', () => {
      ready.current = true;
      anim.goToAndStop(14, true);
    });
    // 3-phase spin so every transition is edge→edge or front→front (no snap)
    // Phase 0 → [14,26]: front→edge   (½ rotation)
    // Phase 1 → [0, 26]: edge→front→edge  (full rotation)
    // Phase 2 → [0, 14]: edge→front   (½ rotation) — lands on resting frame
    anim.addEventListener('complete', () => {
      spinPhase.current++;
      if (spinPhase.current === 1) {
        anim.playSegments([0, 26], true);
      } else if (spinPhase.current === 2) {
        anim.playSegments([0, 14], true);
      } else {
        spinPhase.current = 0; // resting at frame 14 — done
      }
    });
    return () => anim.destroy();
  }, []);

  React.useEffect(() => {
    if (!ready.current || !animRef.current) return;
    if (playing) {
      spinPhase.current = 0;
      animRef.current.playSegments([14, 26], true); // start phase 0
    } else {
      spinPhase.current = 0;
      animRef.current.stop();
      animRef.current.goToAndStop(14, true);
    }
  }, [playing]);

  return <div ref={ref} style={{ width: size, height: size, flexShrink: 0, ...extraStyle }} />;
}

function ProfileModal({ onClose, user, onOpenAuth }) {
  const name    = user?.user_metadata?.full_name || user?.email?.split('@')[0] || 'Gebruiker';
  const initial = (name[0] || '?').toUpperCase();
  const joined  = user ? new Date(user.created_at).toLocaleDateString('nl-NL', { month: 'long', year: 'numeric' }) : '';

  /* Shared card style */
  const card = {
    background: "#fff", borderRadius: 24,
    width: 600, maxWidth: "92vw", maxHeight: "85vh",
    display: "flex", flexDirection: "column",
    boxShadow: "0 32px 80px rgba(0,0,0,0.20)",
    animation: "modalIn 0.28s cubic-bezier(0.25,0.46,0.45,0.94) both",
    overflow: "hidden",

  /* Not logged in — show auth prompt */
  if (!user) {
    return (
      <div style={S.overlay} className="modal-overlay" onClick={onClose}>
        <div style={{ ...card, maxWidth: 420, padding: "48px 36px 36px", textAlign: "center", alignItems: "center" }}

              <circle cx="12" cy="7.5" r="4.5" fill="#1CB0F6"/>

          <div style={{ fontSize: 15, color: "#afafaf", marginBottom: 32, lineHeight: 1.6 }}>
            Maak een account aan of log in om je voortgang, prestaties en statistieken bij te houden.

          <button onClick={() => { onClose(); onOpenAuth(); }} style={{
            background: "#1CB0F6", color: "#fff",

/* ─────────────────────────── PROFANITY FILTER ─────────────────────────── */
function containsProfanity(text) {
  var bad = [
    // English
    'fuck','shit','ass','bitch','cunt','dick','cock','pussy','whore','slut',
    'bastard','asshole','motherfucker','nigger','faggot','retard','twat',
    'wank','prick','bollocks','bugger','arsehole','arse','dickhead','fuckface',
    'shithead','dumbass','jackass','dipshit','douchebag','fag','tit','tits',
    // Dutch
    'kut','lul','klootzak','hoer','eikel','neuken','slet','teef','mongool',
    'kanker','kankerd','tyfus','godverdomme','godver','klote','tering',
    'pleur','poephoofd','kontgat','zeik','kankerwijk','debiel','idioot',
    'stommeling','trut','kutwijf','lulhannes','klere','fikker','nikker'
  ];
  // Normalise leet speak, but keep word boundaries for a whole-word pass so real
  // names that merely contain a short fragment (Hassan/Titus/Cassandra/Massimo)
  // aren't rejected. Then a substring pass for long, unambiguous swears only.
  var norm = String(text || '').toLowerCase()
    .replace(/[4@]/g,'a').replace(/3/g,'e').replace(/[!1]/g,'i')
    .replace(/0/g,'o').replace(/[$5]/g,'s').replace(/7/g,'t');
  var tokens = norm.split(/[^a-z]+/);
  if (bad.some(function(w) { return tokens.indexOf(w) !== -1; })) return true;
  var strong = [
    'fuck','shit','cunt','nigger','nikker','faggot','fikker','motherfucker',
    'asshole','arsehole','bitch','whore','pussy','wanker','kanker','klootzak',
    'godverdomme','kutwijf','lulhannes','poephoofd','kontgat','kankerwijk'
  ];
  var flat = norm.replace(/[^a-z]/g,'');
  return strong.some(function(w) { return flat.indexOf(w) !== -1; });
}

/* ─────────────────────────── AUTH MODAL ─────────────────────────── */
function AuthModal({ onClose, onLoggedIn, initialMsg }) {
  const [mode, setMode]         = React.useState("login");
  const [name, setName]         = React.useState("");
  const [email, setEmail]       = React.useState("");
  const [password, setPassword] = React.useState("");
  const [showPw, setShowPw]     = React.useState(false);
  const [msg, setMsg]           = React.useState(initialMsg || { type: "", text: "" });
  const [loading, setLoading]   = React.useState(false);
  const [cooldown, setCooldown] = React.useState(0);
  const [appleEnabled, setAppleEnabled] = React.useState(false);

  // Apple-knop is slapend: verschijnt pas als de provider echt aanstaat in
  // Supabase (native-app-voorbereiding — geen dode knop tot die tijd).
  React.useEffect(() => {
    let alive = true;
    fetch(window.SUPABASE_URL + "/auth/v1/settings", { headers: { apikey: window.SUPABASE_ANON_KEY } })
      .then(r => r.json())
      .then(s => { if (alive && s && s.external && s.external.apple) setAppleEnabled(true); })
      .catch(() => {});
    return () => { alive = false; };
  }, []);

  // Countdown for the "wachtwoord vergeten" resend cooldown
  React.useEffect(() => {
    if (cooldown <= 0) return;
    const t = setTimeout(() => setCooldown(c => c - 1), 1000);
    return () => clearTimeout(t);
  }, [cooldown]);

  async function submit() {
    setMsg({ type: "", text: "" });
    if (!email || !password) { setMsg({ type: "err", text: "Vul e-mail en wachtwoord in." }); return; }
    if (mode === "signup" && !name.trim()) { setMsg({ type: "err", text: "Vul je naam in." }); return; }
    if (mode === "signup" && containsProfanity(name)) {
      setMsg({ type: "err", text: "Kies alsjeblieft een andere naam." }); return;
    }
    const sb = getSB();
    if (!sb) { setMsg({ type: "err", text: "Supabase is nog niet geconfigureerd." }); return; }
    setLoading(true);
    let result;
    if (mode === "login") {
      result = await sb.auth.signInWithPassword({ email, password });
    } else {
      result = await sb.auth.signUp({ email, password, options: { data: { full_name: name } } });
    }
    setLoading(false);
    if (result.error) { setMsg({ type: "err", text: result.error.message }); return; }
    if (mode === "signup" && result.data.user && !result.data.session) {
      setMsg({ type: "ok", text: "Check je e-mail voor de bevestigingslink." });
      return;
    }
    onLoggedIn();
  }

  async function forgotPassword() {
    setMsg({ type: "", text: "" });
    const addr = email.trim().toLowerCase();
    if (!addr) { setMsg({ type: "err", text: "Vul je e-mailadres in om je wachtwoord te herstellen." }); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(addr)) { setMsg({ type: "err", text: "Dat lijkt geen geldig e-mailadres. Controleer op typfouten." }); return; }
    const sb = getSB();
    if (!sb) { setMsg({ type: "err", text: "Supabase is nog niet geconfigureerd." }); return; }
    setLoading(true);
    const { error } = await sb.auth.resetPasswordForEmail(addr, {
      redirectTo: window.location.origin + window.location.pathname,
    });
    setLoading(false);
    if (error) {
      if (/rate limit|60 seconds|too many/i.test(error.message)) {
        setMsg({ type: "err", text: "Je kunt maar één herstel-mail per minuut aanvragen. Probeer het zo opnieuw." });
      } else {
        setMsg({ type: "err", text: error.message });
      }
      return;
    }
    setCooldown(60);
    setMsg({ type: "ok", text: "Als er een account bestaat voor " + addr + " is er een herstel-link verstuurd. Geen mail na een paar minuten? Check je spam-map en of dit écht het adres is waarmee je bent geregistreerd." });
  }

  async function socialLogin(provider) {
    // Native app (Capacitor): Google weigert OAuth in een embedded webview —
    // route via de systeembrowser + deep-link (native-auth.js). Web ongewijzigd:
    // window.VUMED_NATIVE bestaat alleen in de app.
    if (window.VUMED_NATIVE && window.VumedNativeAuth) {
      provider === "apple" ? VumedNativeAuth.signInWithApple()
                           : VumedNativeAuth.signInWithOAuth(provider);
      return;
    }
    setMsg({ type: "", text: "" });
    const sb = getSB();
    if (!sb) { setMsg({ type: "err", text: "Supabase is nog niet geconfigureerd." }); return; }
    setLoading(true);
    // Guard: a disabled provider makes Supabase's /authorize endpoint show a raw
    // JSON error page — check the public settings first and fail inside the modal.
    try {
      const r = await fetch(window.SUPABASE_URL + "/auth/v1/settings", { headers: { apikey: window.SUPABASE_ANON_KEY } });
      const s = await r.json();
      if (s && s.external && !s.external[provider]) {
        setLoading(false);
        setMsg({ type: "err", text: "Inloggen met " + (provider === "google" ? "Google" : "Apple") + " is nog niet beschikbaar. Gebruik voorlopig je e-mail en wachtwoord." });
        return;
      }
    } catch (e) { /* settings unreachable → just attempt the normal redirect */ }
    const { error } = await sb.auth.signInWithOAuth({
      provider,
      options: { redirectTo: window.location.origin + window.location.pathname },
    });
    // On success the browser navigates away — we only get back here on failure.
    if (error) {
      setLoading(false);
      setMsg({ type: "err", text: error.message });
    }
  }

  const inputStyle = {
    border: "2px solid #e8e8e8", borderRadius: 14,
    padding: "16px 18px", fontSize: 16, fontFamily: "inherit",
    outline: "none", width: "100%", background: "#f7f7f7",
    color: "#1C1C1E", fontWeight: 500,
    transition: "border-color 0.2s",
  };

  return (
    <div style={S.overlay} className="modal-overlay" onClick={onClose}>
      <div style={{
        background: "#fff", borderRadius: 24, padding: "40px 36px 32px",
        width: 420, maxWidth: "92vw",
        boxShadow: "0 32px 80px rgba(0,0,0,0.18)",
        display: "flex", flexDirection: "column", gap: 0,
      }} className="modal-box" onClick={e => e.stopPropagation()}>

        {/* Title */}
        <div style={{ fontSize: 26, fontWeight: 900, color: "#1C1C1E", textAlign: "center", marginBottom: 28 }}>
          {mode === "login" ? "Inloggen" : "Maak je profiel"}
        </div>

        {/* Real <form> + autocomplete attrs → browsers/iCloud Keychain offer to save & autofill */}
        <form onSubmit={e => { e.preventDefault(); submit(); }}
          style={{ display: "flex", flexDirection: "column", margin: 0 }}>

        {/* Name field (signup only) */}
        {mode === "signup" && (
          <input className="ios-input" style={{ ...inputStyle, marginBottom: 12 }}
            type="text" name="name" autoComplete="name" placeholder="Naam"
            value={name} onChange={e => setName(e.target.value)}
          />
        )}

        {/* Email */}
        <input className="ios-input" style={{ ...inputStyle, marginBottom: 12 }}
          type="email" name="email" autoComplete="username" placeholder="E-mailadres"
          value={email} onChange={e => setEmail(e.target.value)}
          autoFocus={!(window.VUMED_NATIVE || (window.matchMedia && matchMedia("(pointer: coarse)").matches))}
        />

        {/* Password with show/hide */}
        <div style={{ position: "relative", marginBottom: 20 }}>
          <input className="ios-input" style={{ ...inputStyle, paddingRight: 52 }}
            type={showPw ? "text" : "password"} name="password"
            autoComplete={mode === "login" ? "current-password" : "new-password"}
            placeholder="Wachtwoord"
            value={password} onChange={e => setPassword(e.target.value)}
          />
          <button type="button" onClick={() => setShowPw(p => !p)} style={{
            position: "absolute", right: 16, top: "50%", transform: "translateY(-50%)",
            background: "none", border: "none", cursor: "pointer", padding: 4, color: "#1CB0F6",
          }}>
            {showPw
              ? <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="#1CB0F6" strokeWidth="2"/><circle cx="12" cy="12" r="3" fill="#1CB0F6"/><line x1="3" y1="3" x2="21" y2="21" stroke="#1CB0F6" strokeWidth="2" strokeLinecap="round"/></svg>
              : <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="#1CB0F6" strokeWidth="2"/><circle cx="12" cy="12" r="3" fill="#1CB0F6"/></svg>
            }
          </button>
        </div>

        {/* Forgot password (login only) */}
        {mode === "login" && (
          <div style={{ textAlign: "right", marginTop: -10, marginBottom: 18 }}>
            <button type="button" onClick={forgotPassword} disabled={loading || cooldown > 0} style={{
              background: "none", border: "none", color: cooldown > 0 ? "#8E8E93" : "#1CB0F6",
              cursor: cooldown > 0 ? "default" : "pointer",
              fontFamily: "inherit", fontSize: 13, fontWeight: 700, padding: 0,
            }}>{cooldown > 0 ? `Opnieuw versturen kan over ${cooldown}s` : "Wachtwoord vergeten?"}</button>
          </div>
        )}

        {/* Error / success */}
        {msg.text && (
          <div style={{ fontSize: 14, marginBottom: 12, color: msg.type === "err" ? "#FF3B30" : "#34C759", fontWeight: 600, textAlign: "center" }}>{msg.text}</div>
        )}

        {/* Main CTA button */}
        <button type="submit" className="modal-submit" disabled={loading} style={{
          background: "#1CB0F6", color: "#fff",
          border: "none", borderBottom: "4px solid #0e85b5",
          borderRadius: 14, padding: "16px 0",
          fontSize: 15, fontWeight: 900, letterSpacing: "0.07em",
          textTransform: "uppercase", cursor: "pointer", fontFamily: "inherit",
          width: "100%", marginBottom: 20,
        }}>
          {loading ? "Even geduld…" : (mode === "login" ? "Inloggen" : "Account aanmaken")}
        </button>

        </form>

        {/* Switch mode — subtiel, direct onder de inlog-knop */}
        <div style={{ textAlign: "center", margin: "-6px 0 18px", fontSize: 14, fontWeight: 600, color: "#8E8E93" }}>
          {mode === "login" ? (
            <React.Fragment>Nog geen account?&nbsp;
              <button type="button" style={{ background: "none", border: "none", color: "#1CB0F6", cursor: "pointer", fontFamily: "inherit", fontSize: 14, fontWeight: 800, padding: 0, textDecoration: "underline" }}
                onClick={() => { setMode("signup"); setMsg({ type:"", text:"" }); }}>Gratis account aanmaken</button>
            </React.Fragment>
          ) : (
            <React.Fragment>Al een account?&nbsp;
              <button type="button" style={{ background: "none", border: "none", color: "#1CB0F6", cursor: "pointer", fontFamily: "inherit", fontSize: 14, fontWeight: 800, padding: 0, textDecoration: "underline" }}
                onClick={() => { setMode("login"); setMsg({ type:"", text:"" }); }}>Inloggen</button>
            </React.Fragment>
          )}
        </div>

        {/* OR divider */}
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
          <div style={{ flex: 1, height: 1.5, background: "#e8e8e8", borderRadius: 2 }}/>
          <span style={{ fontSize: 13, fontWeight: 700, color: "#afafaf", letterSpacing: "0.06em" }}>OF</span>
          <div style={{ flex: 1, height: 1.5, background: "#e8e8e8", borderRadius: 2 }}/>
        </div>

        {/* Social buttons — Google altijd; Apple slapend (verschijnt automatisch
            zodra de provider in Supabase is geconfigureerd, zie appleEnabled). */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr", gap: 10, marginBottom: 20 }}>
          <button type="button" onClick={() => socialLogin("google")} disabled={loading} style={{
            display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
            border: "2px solid #e8e8e8", borderRadius: 14, padding: "13px 0",
            background: "#fff", cursor: "pointer", fontFamily: "inherit",

            {/* Google G */}
            <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>

/* ─────────────────── SET NEW PASSWORD (recovery) MODAL ─────────────────── */
function ResetPasswordModal({ onClose }) {
  const [password, setPassword]   = React.useState("");
  const [confirm, setConfirm]     = React.useState("");
  const [showPw, setShowPw]       = React.useState(false);
  const [msg, setMsg]             = React.useState({ type: "", text: "" });
  const [loading, setLoading]     = React.useState(false);
  const [done, setDone]           = React.useState(false);

  async function submit() {
    setMsg({ type: "", text: "" });
    if (!password || password.length < 6) { setMsg({ type: "err", text: "Wachtwoord moet minstens 6 tekens zijn." }); return; }
    if (password !== confirm) { setMsg({ type: "err", text: "De wachtwoorden komen niet overeen." }); return; }
    const sb = getSB();
    if (!sb) { setMsg({ type: "err", text: "Supabase is nog niet geconfigureerd." }); return; }
    setLoading(true);
    const { error } = await sb.auth.updateUser({ password });
    setLoading(false);
    if (error) {
      if (/session|expired|invalid/i.test(error.message) && !/different/i.test(error.message)) {
        setMsg({ type: "err", text: "Je herstel-link is verlopen. Sluit dit venster en vraag een nieuwe aan via 'Wachtwoord vergeten?'." });
      } else if (/different from the old/i.test(error.message)) {
        setMsg({ type: "err", text: "Dit is je huidige wachtwoord al — kies een ander wachtwoord (of sluit dit venster, je bent gewoon ingelogd)." });
      } else {
        setMsg({ type: "err", text: error.message });
      }
      return;
    }
    setDone(true);
    setMsg({ type: "ok", text: "Je wachtwoord is aangepast. Je bent nu ingelogd." });
  }

  const inputStyle = {
    border: "2px solid #e8e8e8", borderRadius: 14,
    padding: "16px 18px", fontSize: 16, fontFamily: "inherit",
    outline: "none", width: "100%", background: "#f7f7f7",
    color: "#1C1C1E", fontWeight: 500, transition: "border-color 0.2s",
  };

  return (
    <div style={S.overlay} className="modal-overlay" onClick={onClose}>
      <div style={{
        background: "#fff", borderRadius: 24, padding: "40px 36px 32px",
        width: 420, maxWidth: "92vw",
        boxShadow: "0 32px 80px rgba(0,0,0,0.18)",
        display: "flex", flexDirection: "column", gap: 0,
      }} className="modal-box" onClick={e => e.stopPropagation()}>

        <div style={{ fontSize: 26, fontWeight: 900, color: "#1C1C1E", textAlign: "center", marginBottom: 28 }}>
          Nieuw wachtwoord
        </div>

        {!done && (
          <>
            {/* New password with show/hide */}
            <div style={{ position: "relative", marginBottom: 12 }}>
              <input className="ios-input" style={{ ...inputStyle, paddingRight: 52 }}
                type={showPw ? "text" : "password"} autoComplete="new-password" placeholder="Nieuw wachtwoord"
                autoFocus={!(window.VUMED_NATIVE || (window.matchMedia && matchMedia("(pointer: coarse)").matches))}
                value={password} onChange={e => setPassword(e.target.value)}
              />
              <button type="button" onClick={() => setShowPw(p => !p)} style={{
                position: "absolute", right: 16, top: "50%", transform: "translateY(-50%)",
                background: "none", border: "none", cursor: "pointer", padding: 4, color: "#1CB0F6",
              }}>
                {showPw
                  ? <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="#1CB0F6" strokeWidth="2"/><circle cx="12" cy="12" r="3" fill="#1CB0F6"/><line x1="3" y1="3" x2="21" y2="21" stroke="#1CB0F6" strokeWidth="2" strokeLinecap="round"/></svg>
                  : <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="#1CB0F6" strokeWidth="2"/><circle cx="12" cy="12" r="3" fill="#1CB0F6"/></svg>
                }
              </button>
            </div>

            {/* Confirm password */}
            <input className="ios-input" style={{ ...inputStyle, marginBottom: 20 }}
              type={showPw ? "text" : "password"} autoComplete="new-password" placeholder="Bevestig wachtwoord"
              value={confirm} onChange={e => setConfirm(e.target.value)}
              onKeyDown={e => e.key === "Enter" && submit()}
            />
          </>
        )}

        {msg.text && (
          <div style={{ fontSize: 14, marginBottom: 12, color: msg.type === "err" ? "#FF3B30" : "#34C759", fontWeight: 600, textAlign: "center" }}>{msg.text}</div>
        )}

        <button className="modal-submit" onClick={done ? onClose : submit} disabled={loading} style={{
          background: "#1CB0F6", color: "#fff",
          border: "none", borderBottom: "4px solid #0e85b5",
          borderRadius: 14, padding: "16px 0",
          fontSize: 15, fontWeight: 900, letterSpacing: "0.07em",
          textTransform: "uppercase", cursor: "pointer", fontFamily: "inherit",
          width: "100%",
        }}>
          {loading ? "Even geduld…" : (done ? "Sluiten" : "Wachtwoord opslaan")}
        </button>
      </div>
    </div>
  );
}

const DEFAULT_COLOR = { bg: "#1CB0F6", dark: "#0E85B5", icon: "bolt" };
// EXAM_LINKS names can differ from the map keys in accents/commas ("Arts en Patiënt",
// "Schade, Afweer en Herstel") — same normalized fallback as dashboard.html's subjColor.
const _normSubj = s => s.normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/,/g, '').trim();
function subjColor(name) {
  if (SUBJECT_COLORS[name]) return SUBJECT_COLORS[name];
  const t = _normSubj(name);
  for (const k in SUBJECT_COLORS) if (_normSubj(k) === t) return SUBJECT_COLORS[k];
  return DEFAULT_COLOR;
}

function FireIcon({ size = 22, playing = false }) {
  const ref    = React.useRef(null);
  const animRef = React.useRef(null);
  const ready  = React.useRef(false);

  React.useEffect(() => {
    if (!ref.current || !window.lottie) return;
    const anim = window.lottie.loadAnimation({
      container: ref.current,
      renderer: 'svg',
      loop: true,
      autoplay: false,
      path: 'streak_anim.json',
    });
    animRef.current = anim;
    anim.addEventListener('DOMLoaded', () => {
      ready.current = true;
      anim.goToAndStop(0, true);
    });
    return () => anim.destroy();
  }, []);

  React.useEffect(() => {
    if (!ready.current || !animRef.current) return;
    if (playing) {
      animRef.current.play();
    } else {
      animRef.current.stop();
      animRef.current.goToAndStop(0, true);
    }
  }, [playing]);

  return <div ref={ref} style={{ width: size, height: size, flexShrink: 0 }} />;
}

function YearButton({ year, link, done, col, onSelect }) {
  const available = link && link !== "#";
  const base = {
    display: "flex", alignItems: "center", justifyContent: "space-between",
    width: "100%", padding: "11px 14px", marginBottom: 8,
    borderRadius: 12, fontSize: 14, fontWeight: 600,
    fontFamily: "inherit", textDecoration: "none", boxSizing: "border-box",
    border: "none", transition: "filter 0.15s, transform 0.1s",
  };
  if (!available) {
    return (
      <span style={{ ...base, background: col.bg + "20", color: col.bg, cursor: "default" }} title="Nog niet beschikbaar">
        <span>{year.replace('*','')}</span>
        <span style={{ fontSize: 11, opacity: 0.7 }}>Niet beschikbaar</span>
      </span>
    );
  }
  const handleClick = (e) => {
    e.preventDefault();
    const btn = e.currentTarget;
    const rect = btn.getBoundingClientRect();
    // Tap feedback: springy pop + white flash blooming from the tap point.
    // (Keyboard activation has no coordinates → bloom from the centre.)
    try {
      const rx = e.clientX ? Math.round((e.clientX - rect.left) / rect.width * 100) + '%' : '50%';
      btn.style.setProperty('--rx', rx);
      btn.classList.remove('ypop'); void btn.offsetWidth; btn.classList.add('ypop');
      setTimeout(() => btn.classList.remove('ypop'), 600);
    } catch (err) {}
    onSelect(rect);
  };
  const activeBg = done ? "#34C759" : col.bg;
  const activeDark = done ? "#25A244" : col.dark;
  return (
    <button className="year-btn" onClick={handleClick}
      style={{ ...base, background: activeBg, color: "#fff", borderBottom: `3px solid ${activeDark}`, cursor: "pointer" }}>
      <span>{year.replace('*','')}</span>
      {done ? (
        <span style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12, fontWeight: 700, flexShrink: 0 }}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4.5 12.6l4.9 4.9L19.5 7" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          Voltooid
        </span>
      ) : (
        <span className="yb-play" aria-hidden="true">
          <svg width="12.6" height="14" viewBox="0 0 9 10">
            <path d="M8.42 4.13a1 1 0 0 1 0 1.74L1.5 9.6A1 1 0 0 1 0 8.73V1.27A1 1 0 0 1 1.5.4z" fill="#fff"/>
          </svg>
        </span>
      )}
    </button>
  );
}

  const onDown = (e) => { e.currentTarget.style.transform = "translateY(1px)"; };
  const onUp = (e) => { e.currentTarget.style.transform = ""; };
  return (
    <div style={{ display: "flex", gap: 8, marginTop: 2, marginBottom: 8 }}>
      <a href={link + "?pakmode=shuffle"} title="Alle vragen in willekeurige volgorde"
        onMouseDown={onDown} onMouseUp={onUp} onMouseLeave={onUp}
        style={{ ...pill, background: col.bg + "1A", color: col.bg }}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <path d="M16 3h5v5" /><path d="M4 20 21 3" /><path d="M21 16v5h-5" /><path d="m15 15 6 6" /><path d="M4 4l5 5" />
        </svg>
        Shuffle
      </a>
      <a href={link + "?pakmode=doorgaan"} title="Eén vraag tegelijk tot je alles goed hebt"
        onMouseDown={onDown} onMouseUp={onUp} onMouseLeave={onUp}
        style={{ ...pill, background: col.bg, color: "#fff", borderBottom: `3px solid ${col.dark}` }}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <path d="M3 12a9 9 0 1 0 9-9" /><path d="M3 4v5h5" />
        </svg>
        Doorgaan-modus
      </a>
    </div>
  );
}

function ExamPopup({ popup, onClose, onStart }) {
  const { col, subjectName, moment, year, qCount, rect } = popup;

  // Position below the button, centered on it; flip up if near bottom
  const popW = 240;
  const popH = 160;
  const margin = 8;
  let left = rect.left + rect.width / 2 - popW / 2;
  left = Math.max(12, Math.min(left, window.innerWidth - popW - 12));
  let top = rect.bottom + margin;
  if (top + popH > window.innerHeight - 12) top = rect.top - popH - margin;

  return (
    <>
      {/* Invisible backdrop to close on outside click */}
      <div onClick={onClose} style={{ position: "fixed", inset: 0, zIndex: 400 }} />
      {/* Popup card */}
      <div onClick={e => e.stopPropagation()} style={{
        position: "fixed", zIndex: 401,
        left, top, width: popW,
        background: col.bg,
        borderRadius: 18,
        padding: "18px 18px 16px",
        boxShadow: `0 8px 32px rgba(0,0,0,0.22), 0 2px 8px rgba(0,0,0,0.14), 0 0 0 0 transparent`,
        animation: "examPopupIn 0.3s cubic-bezier(0.22,1,0.36,1) both",
      }}>
        <div style={{ color: "#fff", fontWeight: 800, fontSize: 15, marginBottom: 4, lineHeight: 1.3 }}>{subjectName}</div>
        <div style={{ color: "rgba(255,255,255,0.82)", fontSize: 13, marginBottom: 14 }}>
          {moment} · {year.replace('*','')}
          {qCount ? ` · ${qCount} vragen` : ""}
        </div>
        <button onClick={onStart} className="vm-startbtn" style={{
          width: "100%", padding: "11px 0",
          background: "#fff", color: col.bg,
          border: "none", borderRadius: 12,
          fontSize: 14, fontWeight: 900,
          letterSpacing: "0.05em", textTransform: "uppercase",
          cursor: "pointer", fontFamily: "inherit",
          boxShadow: `0 3px 0 rgba(0,0,0,0.14)`,
        }}>START +10 XP</button>
      </div>
    </>
  );
}

/* ─────────────────────────── INSIGHTS PANEL ─────────────────────────── */
function LegendRow({ topic, count, total, color, active, index, onHover, onSelect }) {
  const pct = Math.round(count / total * 100);
  return (
    <div
      onMouseEnter={() => onHover && onHover(index)}
      onMouseLeave={() => onHover && onHover(-1)}
      onClick={() => onSelect && onSelect(topic)}
      style={{
        display: "flex", alignItems: "center", gap: 8, cursor: onSelect ? "pointer" : "default",
        background: active ? "rgba(255,255,255,0.16)" : "transparent",
        borderRadius: 6, padding: "1px 6px", margin: "-1px -6px",
        transition: "background 0.15s ease",
      }}>
      <div style={{
        width: 10, height: 10, borderRadius: 3, background: color, flexShrink: 0,
        transform: active ? "scale(1.4)" : "scale(1)", transition: "transform 0.15s ease",
      }} />
      <span style={{
        flex: 1, color: "#fff", fontWeight: active ? 800 : 600, fontSize: 13, lineHeight: 1.3,
        opacity: active ? 1 : 0.9, transition: "opacity 0.15s ease",
      }}>{topic}</span>
      <span style={{
        color: active ? "#fff" : "rgba(255,255,255,0.78)", fontWeight: active ? 800 : 700,
        fontSize: 12, transition: "color 0.15s ease",
      }}>{pct}%</span>
    </div>
  );
}

function PieDonut({ topics, total, colors, hovered = -1, onHover, onSelect }) {
  const SIZE = 160, CX = 80, CY = 80, R = 66, IR = 40;
  const entries = Object.entries(topics);
  if (entries.length === 1) {
    const isH = hovered === 0;
    return (
      <svg width={SIZE} height={SIZE} viewBox={`0 0 ${SIZE} ${SIZE}`} style={{ flexShrink: 0 }}>
        <circle cx={CX} cy={CY} r={(R + IR) / 2} fill="none"
          stroke={colors[0]} strokeWidth={R - IR}
          onMouseEnter={() => onHover && onHover(0)} onMouseLeave={() => onHover && onHover(-1)}
          style={{ filter: isH ? "brightness(1.12)" : "none", cursor: "pointer", transition: "filter 0.18s ease" }} />
        <text x={CX} y={CY - 4} textAnchor="middle" fill="#fff"
          fontSize="22" fontWeight="900" fontFamily="Nunito, sans-serif">{total}</text>
        <text x={CX} y={CY + 14} textAnchor="middle" fill="rgba(255,255,255,0.7)"
          fontSize="10" fontWeight="600" fontFamily="Nunito, sans-serif">vragen</text>
      </svg>
    );
  }
  let ang = -Math.PI / 2;
  const slices = entries.map(([topic, count], i) => {
    const frac = count / total;
    const start = ang;
    const end = ang + frac * 2 * Math.PI;
    const mid = (start + end) / 2;
    const la = frac > 0.5 ? 1 : 0;
    const c0 = Math.cos(start), s0 = Math.sin(start);
    const c1 = Math.cos(end), s1 = Math.sin(end);
    const d = [
      `M ${CX + IR * c0} ${CY + IR * s0}`,
      `L ${CX + R  * c0} ${CY + R  * s0}`,
      `A ${R}  ${R}  0 ${la} 1 ${CX + R  * c1} ${CY + R  * s1}`,
      `L ${CX + IR * c1} ${CY + IR * s1}`,
      `A ${IR} ${IR} 0 ${la} 0 ${CX + IR * c0} ${CY + IR * s0}`,
      "Z",
    ].join(" ");
    ang = end;
    return { d, color: colors[i % colors.length], mid, i, topic };
  });
  return (
    <svg width={SIZE} height={SIZE} viewBox={`0 0 ${SIZE} ${SIZE}`} style={{ flexShrink: 0 }}>
      {slices.map((sl) => {
        const isH = hovered === sl.i;
        const dim = hovered >= 0 && !isH;
        const pop = isH ? 7 : 0;
        const dx = Math.cos(sl.mid) * pop, dy = Math.sin(sl.mid) * pop;
        return (
          <g key={sl.i}>
            {/* Visible slice: pops out on hover but ignores pointer events, so it can
                never move out from under the cursor and trigger a leave/enter flicker. */}
            <g style={{
              transform: `translate(${dx}px, ${dy}px)`,
              opacity: dim ? 0.4 : 1,
              transition: "transform 0.18s cubic-bezier(0.34,1.56,0.64,1), opacity 0.18s ease",
              pointerEvents: "none",
            }}>
              <path d={sl.d} fill={sl.color}
                stroke={isH ? "rgba(255,255,255,0.95)" : "rgba(255,255,255,0.18)"}
                strokeWidth={isH ? 2 : 1.5}
                style={{ filter: isH ? "brightness(1.12)" : "none", transition: "filter 0.18s ease" }} />
            </g>
            {/* Static invisible hit area at the slice's rest position — never moves. */}
            <path d={sl.d} fill="transparent"
              onMouseEnter={() => onHover && onHover(sl.i)}
              onMouseLeave={() => onHover && onHover(-1)}
              onClick={() => onSelect && onSelect(sl.topic)}
              style={{ cursor: "pointer" }} />
          </g>
        );
      })}
      <text x={CX} y={CY - 4} textAnchor="middle" fill="#fff"
        fontSize="22" fontWeight="900" fontFamily="Nunito, sans-serif" style={{ pointerEvents: "none" }}>{total}</text>
      <text x={CX} y={CY + 14} textAnchor="middle" fill="rgba(255,255,255,0.7)"
        fontSize="10" fontWeight="600" fontFamily="Nunito, sans-serif" style={{ pointerEvents: "none" }}>vragen</text>
    </svg>
  );
}

function InsightsPanel({ meta, col, open, custom, subject }) {
  const [hovered, setHovered] = React.useState(-1);
  const [selected, setSelected] = React.useState(null);
  const [inView, setInView] = React.useState(true);
  const rootRef = React.useRef(null);
  React.useEffect(() => { if (!open) { setHovered(-1); setSelected(null); } }, [open]);
  // Re-play the entrance animation whenever the open panel scrolls back into view.
  React.useEffect(() => {
    if (!open || !rootRef.current) return;
    const io = new IntersectionObserver(
      ([e]) => setInView(e.isIntersecting),
      { threshold: 0, rootMargin: "-8px 0px" }
    );
    io.observe(rootRef.current);
    return () => io.disconnect();
  }, [open]);
  const shown = open && inView;
  const { topics, total } = meta;
  const COLORS = [
    "rgba(255,255,255,0.90)", "rgba(255,255,255,0.68)", "rgba(255,255,255,0.48)",
    "rgba(255,255,255,0.30)", "rgba(255,255,255,0.18)", "rgba(255,255,255,0.09)",
  ];
  const sorted = Object.entries(topics).sort(([,a],[,b]) => b - a);
  const sortedObj = Object.fromEntries(sorted);
  const rows = sorted.length;
  const pick = (topic) => setSelected(t => t === topic ? null : topic);
  const sel = selected ? (custom && custom[selected]) : null;
  return (
    <div ref={rootRef} style={{ background: col.bg, padding: "14px 20px 16px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
        <div style={{
          transition: "transform 0.45s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease",
          transitionDelay: shown ? "0.06s" : "0s",
          transform: shown ? "scale(1) rotate(0deg)" : "scale(0.5) rotate(-60deg)",
          opacity: shown ? 1 : 0,
          flexShrink: 0,
        }}>
          <PieDonut topics={sortedObj} total={total} colors={COLORS} hovered={hovered} onHover={setHovered} onSelect={pick} />
        </div>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 7 }}>
          {sorted.map(([topic, count], i) => (
            <div key={topic} style={{
              transition: "transform 0.34s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.34s ease",
              // stagger in on entry (top row first); collapse together on leave (bottom row first)
              transitionDelay: shown ? `${0.10 + i * 0.05}s` : `${(rows - 1 - i) * 0.02}s`,
              transform: shown ? "translateX(0)" : "translateX(12px)",
              opacity: shown ? 1 : 0,
            }}>
              <LegendRow topic={topic} count={count} total={total} color={COLORS[i % COLORS.length]}
                index={i} active={hovered === i || selected === topic} onHover={setHovered} onSelect={pick} />
            </div>
          ))}
        </div>
      </div>
      {selected && (
        <div style={{
          marginTop: 14, padding: "11px 14px", borderRadius: 12,
          background: "rgba(255,255,255,0.16)", display: "flex", alignItems: "center",
          gap: 12, flexWrap: "wrap",
          animation: "insightsDrop 0.2s cubic-bezier(0.25,0.46,0.45,0.94) both",
        }}>
          <div style={{ flex: 1, minWidth: 180, color: "#fff", fontSize: 13, lineHeight: 1.35 }}>
            <span style={{ fontWeight: 800 }}>{selected}</span>
            {sel
              ? <span style={{ opacity: 0.85 }}> — oefen {sel.count} {sel.count === 1 ? "vraag" : "vragen"}{sel.total > sel.count ? ` (van ${sel.total})` : ""}</span>
              : <span style={{ opacity: 0.85 }}> — nog geen oefentoets beschikbaar</span>}
          </div>
          {sel && (
            <a href={sel.file}
              style={{
                background: "#fff", color: col.bg, fontWeight: 800, fontSize: 13,
                textDecoration: "none", padding: "8px 16px", borderRadius: 9,
                whiteSpace: "nowrap", display: "inline-flex", alignItems: "center", gap: 6,
              }}>
              Start oefentoets →
            </a>
          )}
        </div>
      )}
    </div>
  );
}

// Prettify an exam_key into a readable title for the review lists.
function prettyExamKey(k) {
  k = k.replace(/^mission_/, "").replace(/^oefen_/, "");
  return k.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
}

function SubjectCard({ subject, completedExams, onExamSelect, meta, custom, subjInfo, progressByKey, savedList, loggedIn }) {
  const col = subjColor(subject.name);
  // Which header panel is open: null | "inzicht" | "saved" | "fouten" (tab-like, one at a time).
  const [openPanel, setOpenPanel] = React.useState(null);
  const togglePanel = (name) => setOpenPanel(p => (p === name ? null : name));

  // Per-subject review: gather this subject's saved questions + wrong answers so
  // the student can view & redo them (via missie.html) — scoped to this subject only.
  const slug = subjInfo && subjInfo.subj_slug;
  const matchKey = (ek) => !!slug && (((subjInfo.exam_keys || []).indexOf(ek) !== -1) || ek.indexOf('mission_' + slug + '_') === 0);
  const savedRefs = [], wrongRefs = [];
  if (slug) {
    const seenS = {};
    (savedList || []).forEach(r => { if (matchKey(r.exam_key)) { const id = r.exam_key + '#' + r.qnum; if (!seenS[id]) { seenS[id] = 1; savedRefs.push(id); } } });
    const seenW = {};
    Object.entries(progressByKey || {}).forEach(([ek, ans]) => {
      if (!matchKey(ek)) return;
      Object.entries(ans || {}).forEach(([q, v]) => { if (v === 'wrong') { const id = ek + '#' + q; if (!seenW[id]) { seenW[id] = 1; wrongRefs.push(id); } } });
    });
  }
  function startReview(mode, refs, ssKey) {
    if (!slug || !refs.length) return;
    try {
      sessionStorage.setItem(ssKey, JSON.stringify(refs));
      sessionStorage.setItem('vumed_return', 'vumed.html');   // "Menu" returns to the tentamen page
    } catch (e) {}
    window.location.href = 'missie.html?mode=' + mode + '&vak=' + slug;
  }

  if (subject.minoren) {
    return (
      <div style={{ ...S.card, padding: 0, overflow: "hidden" }} className="subject-card">
        <div style={{ background: col.bg, padding: "18px 24px", borderRadius: "20px 20px 0 0" }}>
          <SubjectIcon icon={col.icon} size={24} color="#fff" />
          <span style={{ color: "#fff", fontWeight: 800, fontSize: 18 }}>{subject.name}</span>
        </div>
        <div style={{ padding: "20px 24px 24px" }}>
          <a href="#" target="_blank" rel="noopener noreferrer" style={{ ...S.minorenBtn, background: col.bg, borderBottom: `3px solid ${col.dark}` }}>
            Minoren
          </a>
        </div>
      </div>
    );
  }
  // Header pill (Inzicht / Opgeslagen / Foutenreview): white when active, translucent otherwise.
  const pillStyle = (active) => ({
    background: active ? "#fff" : "rgba(255,255,255,0.18)",
    border: "none", borderRadius: 8, padding: "5px 10px",
    cursor: "pointer", color: active ? col.bg : "#fff", fontSize: 12, fontWeight: 700,
    fontFamily: "inherit", display: "flex", alignItems: "center", gap: 5, flexShrink: 0,
  });
  const countPill = (n) => (
    <span className="cnt-pill" style={{ background: "rgba(0,0,0,0.16)", borderRadius: 9, padding: "0 6px", fontSize: 11, fontWeight: 800, lineHeight: "16px" }}>{n}</span>
  );
  // "on" marks the open segment so the phone stylesheet can strip the inline
  // translucent background off the other two (see the .subj-pill rules).
  const pillClass = (key) => "insights-btn subj-pill" + (openPanel === key ? " on" : "");
  return (
    <div style={{ ...S.card, padding: 0, overflow: "hidden" }} className="subject-card">
      {/* Colored header */}
      <div className="subj-head" style={{ background: col.bg, padding: "18px 24px 16px", borderRadius: "20px 20px 0 0", display: "flex", alignItems: "center", gap: 10, justifyContent: "space-between" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, minWidth: 0 }}>
          <SubjectIcon icon={col.icon} size={26} color="#fff" />
          <span style={{ color: "#fff", fontWeight: 800, fontSize: 18, letterSpacing: "-0.2px" }}>{subject.name}</span>
        </div>
        <div className="subj-pills" style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap", justifyContent: "flex-end" }}>
          {meta && (
            <button className={pillClass("inzicht")} onClick={e => { e.stopPropagation(); togglePanel("inzicht"); }} style={pillStyle(openPanel === "inzicht")}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                <path d="M12 2v10l8.66 5A10 10 0 1 1 12 2z" fill={openPanel === "inzicht" ? col.bg : "rgba(255,255,255,0.9)"}/>
              </svg>
              <span className="pill-long">Inzicht</span>
            </button>
          )}
          {slug && (
            <button className={pillClass("saved")} onClick={e => { e.stopPropagation(); togglePanel("saved"); }} style={pillStyle(openPanel === "saved")}>
              <svg width="12" height="12" viewBox="0 0 24 24"><path d="M12 2.6l2.9 6 6.6.9-4.8 4.6 1.2 6.5L12 17.9 6.1 20.6l1.2-6.5L2.5 9.5l6.6-.9z" fill={openPanel === "saved" ? col.bg : "#fff"}/></svg>
              <span className="pill-long">Opgeslagen</span>{savedRefs.length ? " " : ""}{savedRefs.length ? countPill(savedRefs.length) : null}
            </button>
          )}
          {slug && (
            <button className={pillClass("fouten")} onClick={e => { e.stopPropagation(); togglePanel("fouten"); }} style={pillStyle(openPanel === "fouten")}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 21V4h11l-2 4 2 4H6" stroke={openPanel === "fouten" ? col.bg : "#fff"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
              <span className="pill-long">Foutenreview</span><span className="pill-short">Fouten</span>{wrongRefs.length ? " " : ""}{wrongRefs.length ? countPill(wrongRefs.length) : null}
            </button>
          )}
        </div>
      </div>
      {(meta || slug) && (
        <div style={{
          display: "grid",
          gridTemplateRows: openPanel ? "1fr" : "0fr",
          transition: "grid-template-rows 0.34s cubic-bezier(0.25,0.46,0.45,0.94)",
        }}>
          <div style={{ overflow: "hidden", minHeight: 0 }}>
            {openPanel === "inzicht" && meta && (
              <InsightsPanel meta={meta} col={col} open={true} custom={custom} subject={subject.name} />
            )}
            {openPanel === "saved" && (
              <ReviewListPanel
                col={col} kind="saved" refs={savedRefs} loggedIn={loggedIn}
                onStart={() => startReview("opgeslagen", savedRefs, "vumed_saved_review")}
              />
            )}
            {openPanel === "fouten" && (
              <ReviewListPanel
                col={col} kind="fouten" refs={wrongRefs} loggedIn={loggedIn}
                onStart={() => startReview("foutenreview", wrongRefs, "vumed_fr_wrong")}
              />
            )}
          </div>
        </div>
      )}
      {/* Body */}
      <div className="subj-body" style={{ padding: "20px 24px 24px" }}>
        <div className="exam-grid" style={subject.name === "PAK" ? { display: "grid", gridTemplateColumns: "1fr", gap: 20 } : S.examGrid}>
          {Object.entries(subject.exams).map(([moment, exams]) => {
            const sideBySide = subject.name === "PAK" && exams.length > 1;
            const items = exams.map(e => {
              const examKey = e.link && e.link !== "#" ? e.link.replace(".html", "") : null;
              const done = examKey ? completedExams.has(examKey) : false;
              const yb = (
                <YearButton
                  key={e.year}
                  year={e.year}
                  link={e.link}
                  done={done}
                  col={col}
                  onSelect={(rect) => onExamSelect({
                    link: e.link, year: e.year, moment, subjectName: subject.name,
                    col, qCount: EXAM_Q_COUNT[e.link] || null, rect,
                  })}
                />
              );
              const isPak = subject.name === "PAK" && e.link && e.link !== "#";
              const cell = isPak
                ? (<React.Fragment>{yb}<PakModeRow link={e.link} col={col} /></React.Fragment>)
                : yb;
              return sideBySide ? <div key={e.year} style={{ flex: 1 }}>{cell}</div> : (isPak ? <div key={e.year}>{cell}</div> : cell);
            });
            return (
              <div key={moment} style={S.moment}>
                <div style={{ ...S.momentLabel, color: col.bg }}>{moment}</div>
                {sideBySide ? <div style={{ display: "flex", gap: 12 }}>{items}</div> : items}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// Slide-down panel listing this subject's saved questions or wrong answers, with a
// CTA to redo them as a review mission. Sits on the subject-coloured background,
// matching the InsightsPanel so all three header pills share one look.
function ReviewListPanel({ col, kind, refs, loggedIn, onStart }) {
  const isSaved = kind === "saved";
  const emptyMsg = isSaved
    ? (loggedIn ? "Nog geen opgeslagen vragen in dit vak. Tik op de ster bij een vraag om 'm te bewaren."
                : "Log in om je opgeslagen vragen te zien en op te slaan.")
    : "Nog geen foute antwoorden in dit vak. Maak wat vragen — fouten verschijnen hier om gericht te herhalen.";
  const setReturn = () => { try { sessionStorage.setItem("vumed_return", "vumed.html"); } catch (e) {} };
  const starIcon = <svg width="16" height="16" viewBox="0 0 24 24" style={{ flexShrink: 0 }}><path d="M12 2.6l2.9 6 6.6.9-4.8 4.6 1.2 6.5L12 17.9 6.1 20.6l1.2-6.5L2.5 9.5l6.6-.9z" fill={col.bg}/></svg>;
  const flagIcon = <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0 }}><path d="M6 21V4h11l-2 4 2 4H6" stroke={col.bg} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  // Group the refs per exam so each exam shows once, with its question numbers below it.
  const gmap = {}, groups = [];
  refs.forEach(id => {
    const h = id.lastIndexOf("#");
    const ek = id.slice(0, h), qn = id.slice(h + 1);
    if (!gmap[ek]) { gmap[ek] = []; groups.push([ek, gmap[ek]]); }
    gmap[ek].push(qn);
  });
  groups.forEach(([, qns]) => qns.sort((a, b) => (parseInt(a, 10) || 0) - (parseInt(b, 10) || 0)));
  const chipBg = isSaved ? "#F3ECFB" : "#FFECEA";
  const chipFg = isSaved ? "#8E5BD6" : "#E42718";
  return (

/* ─────────────────────────── CHEST MODAL ─────────────────────────── */
/* Clash Royale-style UPGRADE chest (Tijmen's spec 2026-07-16, replaces the
   2026-07-13 "taps = rarity" roll): the STARTING rarity is rolled at mount
   (p weights — mostly Gewoon, Legendarisch start is very rare). A legendary
   start opens in ONE tap; every other chest takes FOUR taps: tap 1 reveals
   the starting rarity, each later tap has CHEST_UPGRADE_CHANCE of upgrading
   the chest one tier (capped at legendary) — a new star bursts in + the label
   re-pops in the new colour. Stars = current tier level (1-4). The prize is
   random gems (5-20) and/or coins (25-200) rolled from the FINAL tier. Keep
   this ladder + UPGRADE_CHANCE in sync with gift_modal.js RARITIES
   (trofeeenpad/shop/dashboard/exam pages use that vanilla port).
   The prize object is extensible — future skin drops ride along here.       */
// pBoth = chance the reward has BOTH gems and coins; else a single-currency
// roll (50/50), with the other set to 0. Common chests skew single, better
// chests skew both (legendary always both). Keep in sync with gift_modal.js.
const CHEST_RARITIES = [
  { p: 0.70, pBoth: 0.15, key: 'gewoon',       label: 'Gewoon',       color: '#58CC02', labelColor: '#58CC02', text: '#fff',    chipBg: '#58CC02', stars: 1, gems: [5, 8],   coins: [25, 60],   hearts: [1, 1] },
  { p: 0.20, pBoth: 0.40, key: 'zeldzaam',     label: 'Zeldzaam',     color: '#FF9600', labelColor: '#FF9600', text: '#fff',    chipBg: '#FF9600', stars: 2, gems: [9, 12],  coins: [61, 105],  hearts: [1, 2] },
  { p: 0.09, pBoth: 0.70, key: 'episch',       label: 'Episch',       color: '#AA72FF', labelColor: '#AA72FF', text: '#fff',    chipBg: '#AA72FF', stars: 3, gems: [13, 16], coins: [106, 150], hearts: [2, 3] },
  { p: 0.01, pBoth: 1.00, key: 'legendarisch', label: 'Legendarisch', color: '#9FB6CC', labelColor: '#FFB300', text: '#33414F', chipBg: 'linear-gradient(135deg,#F2F6FA 0%,#C3D0DE 45%,#8FA6BC 100%)', stars: 4, gems: [17, 20], coins: [151, 200], hearts: [3, 4] },
];
const CHEST_UPGRADE_CHANCE = 0.15; // per-tap upgrade chance (taps 2-4)
// Small chance a chest ALSO carries hearts (bonus on top of the gems/coins
// roll, amount from the tier's hearts range). Keep in sync with gift_modal.js
// HEART_CHANCE.
const CHEST_HEART_CHANCE = 0.10;
const CHEST_TOTAL_TAPS = 4;
/* Tap beats in PLAY order (Tijmen 2026-07-16) — deliberately NOT filename
   order: sound_chest4 (his "4.aif") is the third beat and chest3 closes.
   ?v on chest4: re-cut (leading silence trimmed) and the SW caches assets
   stale-while-revalidate, so a changed file under a stable name needs it.
   Keep in sync with gift_modal.js TAP_SOUNDS. */
const CHEST_TAP_SOUNDS = ['sound_chest1.mp3', 'sound_chest2.mp3', 'sound_chest4.mp3?v=2', 'sound_chest3.mp3'];
function randInRange(range) { return range[0] + Math.floor(Math.random() * (range[1] - range[0] + 1)); }
function chestAmounts(tier) {
  let gems = randInRange(tier.gems), coins = randInRange(tier.coins);
  if (Math.random() >= (tier.pBoth == null ? 1 : tier.pBoth)) {
    if (Math.random() < 0.5) coins = 0; else gems = 0;
  }
  const hearts = (tier.hearts && Math.random() < CHEST_HEART_CHANCE) ? randInRange(tier.hearts) : 0;
  return { gems, coins, hearts };
}
/* Pre-roll the whole chest at mount: starting tier, the tier-after-each-tap
   plan, and the prize from the FINAL tier. plan.length = taps needed. */
function rollChestPrize() {
  const r = Math.random();
  let acc = 0, startIdx = 0;
  for (let i = 0; i < CHEST_RARITIES.length; i++) { acc += CHEST_RARITIES[i].p; if (r < acc) { startIdx = i; break; } }
  const plan = [startIdx];
  if (startIdx < CHEST_RARITIES.length - 1) {
    let cur = startIdx;
    for (let t = 1; t < CHEST_TOTAL_TAPS; t++) {
      if (cur < CHEST_RARITIES.length - 1 && Math.random() < CHEST_UPGRADE_CHANCE) cur++;
      plan.push(cur);
    }
  }
  const tier = CHEST_RARITIES[plan[plan.length - 1]];
  return { ...tier, plan, ...chestAmounts(tier) };
}
function hexToRgba(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return 'rgba(' + ((n >> 16) & 255) + ',' + ((n >> 8) & 255) + ',' + (n & 255) + ',' + a + ')';
}
const CHEST_TIER_SCALE = [1, 1, 1.07, 1.13]; // present grows from episch up — keep in sync with gift_modal.js TIER_SCALE

/* Reveal payout number: counts 0 → target (eased) then pops. Writes via ref
   so the rAF loop never re-renders the modal; a safety timeout lands the
   final amount even when rAF is frozen (background tab, gotcha 3). */
function ChestCountUp({ target, delay }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    let raf = 0, done = false;
    const tm = setTimeout(() => {
      let t0 = null;
      const step = (now) => {
        if (done) return;
        if (t0 === null) t0 = now;
        const p = Math.min(1, (now - t0) / 850);
        const e = 1 - Math.pow(1 - p, 3);
        if (ref.current) ref.current.textContent = '+' + Math.round(target * e);
        if (p < 1) raf = requestAnimationFrame(step);
        else { done = true; if (ref.current) ref.current.classList.add('chest-pay-pop'); }
      };
      raf = requestAnimationFrame(step);
    }, delay);
    // land the final amount AND stop the loop — a late-starting throttled rAF
    // frame would otherwise overwrite it (background tab, gotcha 3)
    const safety = setTimeout(() => {
      done = true;
      if (ref.current) { ref.current.textContent = '+' + target; ref.current.classList.add('chest-pay-pop'); }
    }, delay + 1250);
    return () => { clearTimeout(tm); clearTimeout(safety); cancelAnimationFrame(raf); };
  }, []);
  return <span ref={ref}>+0</span>;
}

  const gt = { transition: 'opacity 0.45s' };
