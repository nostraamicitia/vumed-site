<!DOCTYPE html><html><head><meta charset="utf-8"><title>VUmed</title>
<script>
(function(){
  var app=false, known=false;
  try { app=(window.matchMedia&&matchMedia('(display-mode: standalone)').matches)||window.navigator.standalone===true; } catch(e){}
  try {
    for (var i=0;i<localStorage.length;i++){ var k=localStorage.key(i)||'';
      if (k.indexOf('vumed')===0||k.indexOf('sb-')===0){ known=true; break; } }
  } catch(e){}
  location.replace(app||known ? 'dashboard.html' : 'landing.html');
})();
</script>
<noscript><meta http-equiv="refresh" content="0; url=dashboard.html"></noscript>
</head><body><a href="dashboard.html">VUmed openen…</a></body></html>
