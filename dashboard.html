<script>
/* App-entry safety-net: an already-installed PWA stubbornly keeps its old
   start_url (dashboard.html) until the manifest updates, so it never reaches
   splash.html. When we're launched as a standalone app / native and the intro
   hasn't run yet this session, bounce to splash.html BEFORE anything paints
   (synchronous replace in the first head script = no dashboard flash). We set
   vumed_splash first so we never loop back here even if splash fails to load. */
(function(){try{
  // PWA-ONLY safety net. Native enters via index.html -> splash.html already, and
  // Capacitor's sessionStorage isn't reliable across navigations, so including
  // native here could loop. An installed PWA keeps its old start_url (dashboard)
  // until the manifest updates, so bounce it to splash BEFORE any paint.
  var app=(window.matchMedia&&matchMedia('(display-mode: standalone)').matches)||window.navigator.standalone===true;
  var nativ=!!(window.Capacitor&&window.Capacitor.isNativePlatform&&window.Capacitor.isNativePlatform());
  if(app&&!nativ&&!sessionStorage.getItem('vumed_splash')&&!localStorage.getItem('vumed_skip_splash')){
    sessionStorage.setItem('vumed_splash','1');
    location.replace('splash.html');
  }
}catch(e){}})();
</script>

    .pnode.current { animation: pbounce 1.7s ease-in-out infinite; }

    /* ── Quest-block tile (40 questions = 4 missions on one tile) ─────────────
       The disc is the 3D button; a segmented ring around it shows the 4 missions,
       a corner crown counts completed missions, and the whole thing pops on. ── */
    .pnode.qtile { width: 84px; height: 84px; }
    .pnode.qtile .pn-body { position: relative; z-index: 2; display: flex; align-items: center; justify-content: center; }
    .pnode.qtile .pn-body svg { width: 32px; height: 32px; }
    /* segmented ring (selector must outrank `.pnode > svg{width:30px}`) */
    .pnode.qtile .gr { position: absolute; top: 50%; left: 50%; width: 110px; height: 110px;
      transform: translate(-50%,-50%); pointer-events: none; z-index: 0; overflow: visible; }
    .gr-track { fill: none; stroke: #E6E6EC; stroke-width: 6.4; stroke-linecap: round; }
    html.dark .gr-track { stroke: #4A4A4D; }
    .gr-fill { fill: none; stroke-width: 6.4; stroke-linecap: round;
      filter: drop-shadow(0 1px 1.5px rgba(0,0,0,0.18)); }
    .gr-done { animation: grPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
    @keyframes grPop { 0% { stroke-width: 3; } 60% { stroke-width: 8.4; } 100% { stroke-width: 6.4; } }
    /* corner crown: how many of the 4 missions are done */
    .qcrown { position: absolute; top: -3px; right: -7px; min-width: 22px; height: 22px; padding: 0 6px;
      border-radius: 12px; background: #fff; color: var(--qc); font-size: 12px; font-weight: 900;
      line-height: 1; display: flex; align-items: center; justify-content: center; z-index: 3;
      box-shadow: 0 2px 6px rgba(0,0,0,0.22); }
    .qcrown i { font-style: normal; opacity: 0.5; font-size: 10.5px; margin-left: 0.5px; }
    .qcrown svg { width: 14px; height: 14px; display: block; }
    html.dark .qcrown { background: #1C1C1E; }
    .pnode.qtile.done .qcrown { color: #FFB020; background: #fff; box-shadow: 0 2px 8px rgba(255,176,32,0.5); }
    html.dark .pnode.qtile.done .qcrown { background: #2A241A; }
    /* radar-ping around the active tile */
    .pnode.qtile.current::before { content: ''; position: absolute; inset: 0; border-radius: 50%;
      z-index: -1; animation: qping 2.1s ease-out infinite; }
    @keyframes qping { 0% { box-shadow: 0 0 0 2px var(--qc); opacity: 0; }
      22% { opacity: 0.5; }
      100% { box-shadow: 0 0 0 18px var(--qc); opacity: 0; } }
    /* glossy shine sweep on a fully-cleared tile */
    .pnode.qtile.done::after { content: ''; position: absolute; inset: 0; border-radius: 50%; z-index: 1;
      background: linear-gradient(115deg, transparent 34%, rgba(255,255,255,0.6) 50%, transparent 66%);
      background-size: 230% 100%; background-position: 150% 0; pointer-events: none;
      animation: qshine 5s ease-in-out infinite; }
    @keyframes qshine { 0%,62% { background-position: 150% 0; } 88%,100% { background-position: -80% 0; } }
    .pnode.qtile.done:hover, .pnode.qtile.locked { }
    .pnode.qtile.done:hover { transform: translateY(-3px); }
    /* ── tap feedback: press-in on :active (disc bottoms out on its 3D edge),
       springy pop + colour ripple on click (added by openMissionPopup) ── */
    .pnode.qtile:not(.locked) { transition: transform 0.08s ease, box-shadow 0.08s ease; }
    .pnode.qtile:not(.locked):active { transform: translateY(8px); box-shadow: 0 0 0 rgba(0,0,0,0) !important; animation: none; }
    .pnode.qtile.qpop { animation: qtapPop 0.45s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes qtapPop { 0% { transform: translateY(6px) scale(0.94); }
      55% { transform: translateY(-4px) scale(1.06); } 100% { transform: translateY(0) scale(1); } }
    .qripple { position: absolute; inset: -6px; border-radius: 50%; pointer-events: none; z-index: 4;
      border: 3px solid var(--qc, #1CB0F6); opacity: 0.65; animation: qrip 0.55s ease-out forwards; }
    @keyframes qrip { 0% { transform: scale(0.9); opacity: 0.65; }

    @media (prefers-reduced-motion: reduce) {

    /* ── Drop-in reveal: tiles FALL onto the page and land with a squash-bounce
       ("toenk"). The keyframes own the transform while playing, so every frame
       carries var(--sx) — the serpentine translateX that pnode-rows set inline
       (inline transforms lose to a running animation). transform-origin sits at
       the bottom edge so the squash compresses onto the landing spot. ── */
    .dash-reveal { opacity: 0; transform-origin: 50% 100%; will-change: opacity, transform; }
    .dash-reveal.in { animation: dashDrop .68s cubic-bezier(.5,0,.85,.4) both; }
    /* While a tile is mid-flight its Start/Ga-verder tooltip would fly straight
       through the unit pill above it — hide it during the drop, fade it in on
       landing. (Reduced-motion never adds .landed → force-visible there.) */
    .pnode .plabel { transition: opacity .28s ease .06s; }
    .dash-reveal.in:not(.landed) .plabel { opacity: 0; transition: none; }
    /* The ambient ring animations (radar ping on .current, shine sweep on .done)
       run from DOM-insert, so a tile fading in mid-fall catches them mid-cycle —
       a ring flashes up around the falling tile. Hold them until touchdown;
       re-applying on .landed restarts each from 0, so the ping radiates right
       as the tile lands. */
    .dash-reveal:not(.landed) .pnode.qtile.current::before,
    .dash-reveal:not(.landed) .pnode.qtile.done::after { animation: none; }
    /* animationend → .landed strips the finished animation, so inline transforms
       (serpentine X) and hover/transition transforms work again afterwards. */

    @keyframes dashDrop {
      0%   { opacity: 0; transform: translate(var(--sx,0px),var(--dropY,-46px)) scaleY(1.04) scaleX(.98);
             animation-timing-function: cubic-bezier(.5,0,.85,.4); }   /* accelerating fall, slightly stretched */
      30%  { opacity: 1; }

             animation-timing-function: cubic-bezier(.18,.65,.3,1); }  /* TOENK — impact squash */
      68%  { transform: translate(var(--sx,0px),-5px) scaleY(1.03) scaleX(.99);
             animation-timing-function: cubic-bezier(.5,0,.6,1); }     /* rebound hop */
      84%  { transform: translate(var(--sx,0px),1px) scaleY(.985) scaleX(1.008);
             animation-timing-function: cubic-bezier(.25,.5,.4,1); }   /* tiny second toenk */
      100% { opacity: 1; transform: translate(var(--sx,0px),0); }
    }

    }

<script>
/* ─────────────────────────── Supabase ─────────────────────────── */
let _sbClient = null;
function getSB() {
  if (_sbClient) return _sbClient;
  if (!window.SUPABASE_URL || !window.supabase) return null;
  try { _sbClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY); window._sbInstance = _sbClient; }
  catch (e) { return null; }
  return _sbClient;
}
async function currentUid() {
  const sb = getSB(); if (!sb) return null;
  try { const { data } = await sb.auth.getSession(); return data && data.session ? data.session.user.id : null; }
  catch (e) { return null; }
}

/* ─────── Mission start popup (mirrors vumed.html ExamPopup) ─────── */
// Escape a value for safe use inside a double-quoted HTML attribute.
function aesc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
// Build the shared data-attrs + onclick for a clickable mission node.
function missionNodeAttrs(link, subject, unitName, count, bg, done, tot, blk, remaining) {
  return ' href="' + aesc(link) + '"'
    + ' data-link="' + aesc(link) + '"'
    + ' data-title="' + aesc(subject) + '"'
    + ' data-sub="' + aesc(unitName) + '"'
    + ' data-qc="' + aesc(count) + '"'
    + ' data-bg="' + aesc(bg) + '"'
    + ' data-done="' + aesc(done == null ? '' : done) + '"'
    + ' data-tot="' + aesc(tot == null ? '' : tot) + '"'
    + ' data-blk="' + aesc(blk == null ? '' : blk) + '"'
    + ' data-rem="' + aesc(remaining == null ? '' : remaining) + '"'
    + ' onclick="return openMissionPopup(event,this)"';
}
function closeMissionPopup() {
  var b = document.getElementById('dpop-back'); if (b) b.remove();
}
// Intercept a mission-node click → show a small "START +10 XP" popup near the node.
// Returns false so the underlying <a> doesn't navigate immediately.
function openMissionPopup(ev, el) {
  if (ev) ev.preventDefault();
  closeMissionPopup();
  var link  = el.getAttribute('data-link') || '#';
  var title = el.getAttribute('data-title') || '';
  var sub   = el.getAttribute('data-sub') || '';
  var qc    = el.getAttribute('data-qc') || '';
  var bg    = el.getAttribute('data-bg') || '#1CB0F6';
  var done  = el.getAttribute('data-done') || '';
  var tot   = el.getAttribute('data-tot') || '';
  var blk   = el.getAttribute('data-blk') || '';
  var rem   = el.getAttribute('data-rem') || '';
  var rect  = el.getBoundingClientRect();
  // tap feedback: springy pop + colour ripple on the pressed tile (rect is
  // measured above so the popup position ignores the mid-pop transform)
  el.classList.remove('qpop'); void el.offsetWidth; el.classList.add('qpop');
  var rip = document.createElement('span'); rip.className = 'qripple';
  el.appendChild(rip);
  setTimeout(function () { el.classList.remove('qpop'); if (rip.parentNode) rip.remove(); }, 600);
  var popW = 244, popH = 172, margin = 8;
  var left = rect.left + rect.width / 2 - popW / 2;
  left = Math.max(12, Math.min(left, window.innerWidth - popW - 12));
  var top = rect.bottom + margin;
  if (top + popH > window.innerHeight - 12) top = rect.top - popH - margin;

  var back = document.createElement('div');
  back.className = 'dpop-back'; back.id = 'dpop-back';
  back.onclick = closeMissionPopup;

  var card = document.createElement('div');
  card.className = 'dpop';
  card.style.left = left + 'px'; card.style.top = top + 'px'; card.style.background = bg;
  card.onclick = function (e) { e.stopPropagation(); };
  // Block progress: 4 pips (one per mission in this 40-question block), lit up to `done`.
  var nSub = parseInt(tot, 10) || 4, nDone = parseInt(done, 10) || 0, pips = '';
  for (var pi = 0; pi < nSub; pi++) pips += '<span class="dpop-pip' + (pi < nDone ? ' on' : '') + '"></span>';
  var btnTxt = nDone > 0 ? 'GA VERDER +10 XP' : 'START +10 XP';
  card.innerHTML =
      '<div class="dpop-title"></div>'
    + '<div class="dpop-sub"></div>'
    + (blk ? '<div class="dpop-pips">' + pips + '</div>' : '')
    + '<button class="dpop-btn" style="color:' + bg + '">' + btnTxt + '</button>';
  card.querySelector('.dpop-title').textContent = title;
  var subTxt = sub + (blk ? (sub ? ' · ' : '') + 'Blok ' + blk : '');
  subTxt += (tot ? ' · ' + nDone + '/' + nSub + ' missies' : '');
  if (rem) subTxt += ' · nog ' + rem + ' vragen';
  else if (qc) subTxt += (subTxt ? ' · ' : '') + qc + ' vragen';
  card.querySelector('.dpop-sub').textContent = subTxt;
  card.querySelector('.dpop-btn').onclick = function () { startMission(link); };

  back.appendChild(card);
  document.body.appendChild(back);
  return false;
}
// Award the flat +10 XP (logged-in only, same as vumed.html), then open the mission.
async function startMission(link) {
  try {
    var sb = getSB(), uid = await currentUid();
    if (sb && uid) { try { await sb.rpc('add_xp', { p_user_id: uid, p_amount: 10 }); } catch (e) {} }
  } catch (e) {}
  window.location.href = link;
}

const DEFAULT_COLOR = { bg:"#1CB0F6", dark:"#0E85B5" };
const _norm = s => s.normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/,/g,'').trim();
function subjColor(name) {
  if (SUBJECT_COLORS[name]) return SUBJECT_COLORS[name];
  const t = _norm(name);
  for (const k in SUBJECT_COLORS) if (_norm(k) === t) return SUBJECT_COLORS[k];

}

/* ─────────────────────────── Data & state ─────────────────────────── */
let CAL = {}, SUBJ_IDX = {}, MISSIONS = {}, PROGRESS = {};
const YEAR_LABEL = { year1: "Jaar 1", year2: "Jaar 2", year3: "Jaar 3" };
function studyYear() { return localStorage.getItem('vumed_study_year') || 'year1'; }

function todayStr() { return new Date().toISOString().slice(0,10); }

/* Recurring calendar: block_starts are MM-DD, resolved to the current academic
   year. Aug-Dec → the year that starts this September; Jan-Jul → next year. */
function academicYearStart(now) {
  now = now || new Date();
  // From July (after the June exams) we already look ahead to the coming year.
  return (now.getMonth() + 1) >= 7 ? now.getFullYear() : now.getFullYear() - 1;
}
function resolveMMDD(mmdd, ayStart) {
  const p = mmdd.split('-'); const m = parseInt(p[0],10), d = parseInt(p[1],10);
  const yr = m >= 8 ? ayStart : ayStart + 1;
  return new Date(yr, m - 1, d);
}
function resolveBlocks(yr) {
  const starts = CAL.block_starts || [];
  const subs = CAL[yr] || [];
  const ayStart = academicYearStart();
  const n = Math.min(starts.length, subs.length);
  let blocks = [];
  for (let i = 0; i < n; i++) blocks.push({ subject: subs[i], start: resolveMMDD(starts[i], ayStart) });
  blocks = blocks.filter(b => SUBJ_IDX[b.subject]);
  blocks.sort((a,b) => a.start - b.start);
  const yearEnd = resolveMMDD(CAL.year_end || '06-30', ayStart);
  for (let i = 0; i < blocks.length; i++) {
    blocks[i].end = (i + 1 < blocks.length) ? blocks[i+1].start : yearEnd;
    blocks[i].exam = blocks[i].end;   // block exam ≈ its final week
  }
  return blocks;
}
function computeCurrent() {
  const yr = studyYear();
  const blocks = resolveBlocks(yr);
  const now = new Date();
  let active = blocks.find(b => b.start <= now && now < b.end);
  if (active) return { subject: active.subject, entry: active };
  const upcoming = blocks.filter(b => b.start > now).sort((a,b) => a.start - b.start)[0];
  if (upcoming) return { subject: upcoming.subject, entry: upcoming, upcoming: true };
  const past = blocks.filter(b => b.end <= now).sort((a,b) => b.end - a.end)[0];
  if (past) return { subject: past.subject, entry: past, ended: true };
  const any = Object.keys(SUBJ_IDX)[0];
  return { subject: any, entry: null };
}

/* progress: exam_key -> {answered, correct} from localStorage + Supabase */
async function loadProgress() {
  const map = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.indexOf('vumed_progress_') === 0) {
      try {
        const p = JSON.parse(localStorage.getItem(k)); const ek = k.slice('vumed_progress_'.length);
        const ans = (p && p.answered) || {};
        map[ek] = { answered: Object.keys(ans).length, correct: Object.values(ans).filter(v=>v==='correct').length };
      } catch (e) {}
    }
  }
  const sb = getSB(), uid = await currentUid();
  if (sb && uid) {
    try {
      const { data } = await sb.from('exam_progress').select('exam_key,progress').eq('user_id', uid);
      (data||[]).forEach(r => {
        const ans = (r.progress && r.progress.answered) || {};
        map[r.exam_key] = { answered: Object.keys(ans).length, correct: Object.values(ans).filter(v=>v==='correct').length };
      });
    } catch (e) {}
  }
  return map;
}

function missionAnswered(key) { return (PROGRESS[key] && PROGRESS[key].answered) || 0; }

function subjectStats(subject) {
  const m = MISSIONS[subject]; if (!m) return { done: 0, total: 0, aq: 0, tq: 0, pct: 0 };
  let done = 0, total = 0, aq = 0, tq = 0;
  Object.values(m.topics).forEach(u => {
    u.missions.forEach(ms => {
      total++; tq += ms.count;
      const a = Math.min(missionAnswered(ms.key), ms.count);
      aq += a;
      if (a >= ms.count) done++;
    });
  });
  return { done, total, aq, tq, pct: tq ? Math.round(aq/tq*100) : 0 };
}

/* ─────────────────────────── Rendering ─────────────────────────── */
function daysUntil(date) {
  if (!date) return null;
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const n = new Date(); const now = new Date(n.getFullYear(), n.getMonth(), n.getDate());
  return Math.round((d - now) / 86400000);
}

// Colored countdown bar at the very top of the page, with an animated clock.
function renderExamClock(cur, inStrip) {
  if (!cur.entry) return '';
  const days = daysUntil(cur.entry.exam);
  if (days === null) return '';
  const col = subjColor(cur.subject);
  const txt = days > 0 ? ('nog ' + days + (days === 1 ? ' dag' : ' dagen')) : (days === 0 ? 'vandaag!' : 'afgerond');
  // Dashed tick face: NT ticks around the rim (every 5th a little longer). The
  // second hand steps through the same NT positions, so the pointer advances in
  // small increments that land on each dash.
  const NT = 20;
  let ticks = '';
  for (let i = 0; i < NT; i++) {
    const a = (i / NT) * 2 * Math.PI - Math.PI / 2;
    const rOut = 17.2, rIn = (i % 5 === 0) ? 13.4 : 14.9;
    const x1 = (20 + rOut * Math.cos(a)).toFixed(2), y1 = (20 + rOut * Math.sin(a)).toFixed(2);
    const x2 = (20 + rIn * Math.cos(a)).toFixed(2),  y2 = (20 + rIn * Math.sin(a)).toFixed(2);
    ticks += '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="rgba(255,255,255,0.6)" stroke-width="0.9" stroke-linecap="round"/>';
  }
  const clock = '<svg class="ec-clock" viewBox="0 0 40 40" width="42" height="42" aria-hidden="true">'
    + '<circle cx="20" cy="20" r="18.2" fill="rgba(0,0,0,0.20)" stroke="#fff" stroke-width="1.7"/>'
    + ticks
    + '<line class="ec-hour" x1="20" y1="20" x2="20" y2="14.5" stroke="#fff" stroke-width="2.4" stroke-linecap="round" transform="rotate(-58 20 20)"/>'
    + '<line class="ec-min" x1="20" y1="20" x2="20" y2="11.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" transform="rotate(56 20 20)"/>'
    + '<line class="ec-sec" x1="20" y1="21.4" x2="20" y2="9.4" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>'
    + '<circle cx="20" cy="20" r="1.7" fill="#fff"/></svg>';
  // inStrip = embedded inside the current subject's card (translucent), else a standalone pill.
  const bg = inStrip ? 'rgba(255,255,255,0.16)' : ('linear-gradient(135deg,'+col.bg+','+col.dark+')');
  return '<div class="examclock'+(inStrip ? ' examclock-strip' : '')+'" style="background:'+bg+'">'
    + clock + '<span>Tentamen <b class="ec-days">'+txt+'</b></span></div>';
}

// ── Quest-block tiles: 4 missions (40 questions) live on ONE tile ────────────
// A tile finishes only after all 4 of its sub-missions are done. The ring around
// the tile has one arc segment per sub-mission, each filled by that mission's own
// progress — so a click keeps continuing the same tile until all 40 are answered.
const GROUP_SIZE = 4;
function _polarXY(cx, cy, r, deg) { const a = deg * Math.PI / 180; return [cx + r * Math.cos(a), cy + r * Math.sin(a)]; }
function _segArc(cx, cy, r, a0, a1) {
  const p0 = _polarXY(cx, cy, r, a0), p1 = _polarXY(cx, cy, r, a1);
  const large = (a1 - a0) > 180 ? 1 : 0;
  return 'M ' + p0[0].toFixed(2) + ' ' + p0[1].toFixed(2)
    + ' A ' + r + ' ' + r + ' 0 ' + large + ' 1 ' + p1[0].toFixed(2) + ' ' + p1[1].toFixed(2);
}
// The segmented "quest ring": `subs` = up to 4 sub-missions {done,active,answered,count}.
function groupRing(subs, colBg) {
  const CX = 50, CY = 50, R = 45, GAP = 18, SPAN = 90;
  let out = '';
  for (let i = 0; i < GROUP_SIZE; i++) {
    const a0 = -90 + i * SPAN + GAP / 2, a1 = -90 + i * SPAN + SPAN - GAP / 2;
    out += '<path class="gr-track" d="' + _segArc(CX, CY, R, a0, a1) + '"/>';
    const s = subs[i];
    if (s) {
      const frac = s.done ? 1 : (s.active ? Math.max(0, Math.min(1, s.answered / s.count)) : 0);
      if (frac > 0.001) {
        const af = a0 + (a1 - a0) * frac;
        out += '<path class="gr-fill' + (s.done ? ' gr-done' : '') + '" style="stroke:' + colBg + '" d="' + _segArc(CX, CY, R, a0, af) + '"/>';
      }
    }
  }
  return '<svg class="gr" viewBox="0 0 100 100" aria-hidden="true">' + out + '</svg>';
}
// Build the unit labels + serpentine quest-block tiles for one subject.
// Shared by the collapsed-card road and the full-year Pad pane.
function roadNodesInner(subject) {
  const m = MISSIONS[subject]; if (!m) return '';
  const col = subjColor(subject);
  const slug = m.subj_slug;
  const units = Object.entries(m.topics).sort((a,b)=>b[1].total-a[1].total);
  let inner = '', gi = 0;
  units.forEach(([tslug, u]) => {
    inner += '<div class="punit-label"><span class="punit-chip reached" style="--pc:'+col.bg+'">'
      + u.name+'</span></div><div class="pnodes">';
    // Each topic is its own ladder: its first block is always playable, so a new
    // topic never sits behind every block of the topics above it.
    let prevGroupDone = true;
    const nG = Math.ceil(u.missions.length / GROUP_SIZE);
    for (let g = 0; g < nG; g++) {
      const raw = u.missions.slice(g * GROUP_SIZE, g * GROUP_SIZE + GROUP_SIZE);
      let groupAnswered = 0, groupTotal = 0, doneCount = 0;
      const subs = raw.map(ms => {
        const a = Math.min(missionAnswered(ms.key), ms.count);
        const done = a >= ms.count;
        groupAnswered += a; groupTotal += ms.count; if (done) doneCount++;
        return { ms: ms, answered: a, count: ms.count, done: done, active: false };
      });
      const activeIdx = subs.findIndex(s => !s.done);
      if (activeIdx >= 0) subs[activeIdx].active = true;
      const groupDone = doneCount === subs.length;
      const current = prevGroupDone && !groupDone;
      const tgt = activeIdx >= 0 ? subs[activeIdx].ms : subs[0].ms;   // where a click continues
      const link = 'missie.html?vak='+slug+'&unit='+tslug+'&deel='+tgt.deel;
      const off = Math.round(Math.sin(gi * 0.85) * 115); gi++;

      let cls = 'pnode qtile', style = '', body = '', clickable = false, label = '';
      if (groupDone) {
        cls += ' done'; style = 'background:'+col.bg+';box-shadow:0 8px 0 '+col.dark+';--qc:'+col.bg;
        body = IC.check; clickable = true;
      } else if (current) {
        cls += ' current'; style = 'background:'+col.bg+';box-shadow:0 8px 0 '+col.dark+';--qc:'+col.bg;
        body = IC.play; clickable = true; label = doneCount > 0 ? 'Ga verder' : 'Start';
      } else {
        cls += ' locked'; style = '--qc:'+col.bg; body = IC.lock;
      }
      const ring = groupRing(subs, col.bg);
      const crown = (current || groupDone)
        ? '<span class="qcrown">'+(groupDone ? IC.crown : (doneCount + '<i>/' + subs.length + '</i>'))+'</span>' : '';
      const labelHtml = label ? '<span class="plabel">'+label+'</span>' : '';
      const small = '<small>'+groupAnswered+' / '+groupTotal+' vragen</small>';
      const nodeInner = ring + labelHtml + crown + '<span class="pn-body">'+body+'</span>' + small;
      const node = clickable
        ? '<a class="'+cls+'" style="'+style+'"'
            + missionNodeAttrs(link, subject, u.name, tgt.count, col.bg, doneCount, subs.length, g+1, groupTotal-groupAnswered)
            + '>'+nodeInner+'</a>'
        : '<span class="'+cls+'" style="'+style+'">'+nodeInner+'</span>';
      // --sx mirrors the serpentine offset so the drop-in keyframes (which own
      // the transform while playing) can keep the node on its winding-path X.
      inner += '<div class="pnode-row" style="transform:translateX('+off+'px);--sx:'+off+'px">'+node+'</div>';
      prevGroupDone = groupDone;
    }
    inner += '</div>';
  });
  return inner;
}
// The winding mission nodes for one subject (unit labels + node path), shown inside an expanded card.
function renderRoadNodes(subject) {
  const m = MISSIONS[subject]; if (!m) return '';
  return roadNodesInner(subject);
}

// Grow one subject open (collapse the rest) and re-animate its dials.
function expandSubject(slug) {
  document.querySelectorAll('.subjcard').forEach(function (c) {
    c.classList.toggle('open', c.getAttribute('data-slug') === slug);
  });
  window._openSlug = slug;
  var opened = document.querySelector('.subjcard.open');
  if (!opened) return;
  var fills = opened.querySelectorAll('.sr-fill');
  fills.forEach(function (c) { c.style.strokeDashoffset = c.style.strokeDasharray || getComputedStyle(c).strokeDasharray; });
  requestAnimationFrame(function () { requestAnimationFrame(function () {
    fills.forEach(function (c) { var o = c.getAttribute('data-off'); if (o !== null) c.style.strokeDashoffset = o; });
  }); });
  try { opened.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); } catch (e) {}
}

// Daily streak + vragen-vandaag, as chips on the coloured hero.
// A circular progress dial (radial gauge). The fill animates in via animateRings().
function statRing(frac, big, small, label, gold, cls) {
  frac = Math.max(0, Math.min(1, frac || 0));
  const R = 30, C = 2 * Math.PI * R, off = C * (1 - frac);
  return '<div class="statring' + (cls ? ' ' + cls : '') + '"><div class="sr-ring">'
    + '<svg viewBox="0 0 72 72" width="72" height="72">'
    + '<circle class="sr-track" cx="36" cy="36" r="'+R+'"/>'
    + '<circle class="sr-fill'+(gold?' sr-gold':'')+'" cx="36" cy="36" r="'+R+'" '
    + 'style="stroke-dasharray:'+C.toFixed(1)+';stroke-dashoffset:'+C.toFixed(1)+'" data-off="'+off.toFixed(1)+'"/>'
    + '</svg>'
    + '<div class="sr-center"><div class="sr-big">'+big+'</div>'+(small?'<div class="sr-small">'+small+'</div>':'')+'</div>'
    + '</div><div class="sr-label">'+label+'</div></div>';
}
// Daily-goal dial (the 🔥 streak is in the top-right bar, so not duplicated here).
// vumed_stats.js owns the dagdoel and the dagdoel-reeks, but navbar.js injects it
// async — so fall back to the raw keys for the first paint. The 'vumed-stats'
// event repaints every dial once the profile is in.
function goalState() {
  try { return (window.VumedStats && window.VumedStats.goalInfo) ? window.VumedStats.goalInfo() : null; }
  catch (e) { return null; }
}
const SR_CHECK = '<svg viewBox="0 0 24 24" width="22" height="22" style="display:block">'
  + '<path d="M20 6L9 17l-5-5" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
function dailyRing() {
  const gi = goalState();
  const goal   = gi ? gi.goal  : (parseInt(localStorage.getItem('vumed_daygoal') || '20', 10) || 20);
  const today  = gi ? gi.count : (parseInt(localStorage.getItem('vumed_daily_' + todayStr()) || '0', 10) || 0);
  const streak = gi ? gi.streak : 0;
  const done   = today >= goal;
  // Past the goal the dial used to read "21 / 20" under an already-full ring,
  // which reads as a bug rather than an achievement — show the goal is met.
  const big   = done ? SR_CHECK : (today + ' / ' + goal);
  const small = streak > 0 ? ('reeks ' + streak) : (done ? 'gehaald' : '');
  return statRing(goal ? today/goal : 0, big, small, 'dagdoel', true, 'statring-goal');
}
// The engine loads async and settles the reeks after its profile pull, so the
// dagdoel dials are repainted in place rather than re-rendering the whole
// dashboard (which would collapse open subject cards).
function repaintGoalRings() {
  const rings = document.querySelectorAll('.statring-goal');
  if (!rings.length) return;
  rings.forEach(function (el) {
    const tmp = document.createElement('div');
    tmp.innerHTML = dailyRing();
    if (tmp.firstElementChild) el.replaceWith(tmp.firstElementChild);
  });
  animateRings();
}
document.addEventListener('vumed-stats', repaintGoalRings);
// Grow every dial from empty to its value once it's in the DOM.
function animateRings() {
  requestAnimationFrame(function () { requestAnimationFrame(function () {
    document.querySelectorAll('.sr-fill').forEach(function (c) {
      var off = c.getAttribute('data-off');
      if (off !== null) c.style.strokeDashoffset = off;
    });
  }); });
}

// Inzicht: current subject's topic breakdown (donut + legend), like the Tentamen page.
function renderInzicht(subject) {
  const idx = SUBJ_IDX[subject];
  if (!idx || !idx.topics || !Object.keys(idx.topics).length) return '<div class="inzicht-body" style="color:#fff;font-weight:700">Geen inzicht beschikbaar.</div>';
  const entries = Object.entries(idx.topics).sort((a,b)=>b[1]-a[1]);
  const total = entries.reduce((s,[,c])=>s+c,0) || 1;
  const COLORS = ["rgba(255,255,255,0.92)","rgba(255,255,255,0.72)","rgba(255,255,255,0.54)","rgba(255,255,255,0.38)","rgba(255,255,255,0.24)","rgba(255,255,255,0.13)"];
  let legend = '';
  entries.forEach(([t,c],i)=>{ const pct = Math.round(c/total*100);
    legend += '<div class="inz-row" data-idx="'+i+'"><span class="inz-sw" style="background:'+COLORS[i%COLORS.length]+'"></span>'+t+'<span class="cnt">'+c+' · '+pct+'%</span></div>'; });
  return '<div class="inzicht-body">'+pieDonutSVG(entries, total, COLORS)+'<div class="inz-legend">'+legend+'</div></div>';
}

function pieDonutSVG(entries, total, colors) {
  const SIZE=120, CX=60, CY=60, R=50, IR=31;
  const centre = '<text x="'+CX+'" y="'+(CY-1)+'" text-anchor="middle" fill="#fff" font-size="18" font-weight="900" font-family="Nunito,sans-serif">'+total+'</text>'
    + '<text x="'+CX+'" y="'+(CY+13)+'" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-size="9" font-weight="600" font-family="Nunito,sans-serif">vragen</text>';
  if (entries.length === 1) {
    return '<svg width="'+SIZE+'" height="'+SIZE+'" viewBox="0 0 '+SIZE+' '+SIZE+'" style="flex-shrink:0">'
      + '<circle cx="'+CX+'" cy="'+CY+'" r="'+((R+IR)/2)+'" fill="none" stroke="'+colors[0]+'" stroke-width="'+(R-IR)+'"/>'+centre+'</svg>';
  }
  let ang = -Math.PI/2, paths = '';
  const POP = 6;
  entries.forEach(([topic,count],i) => {
    const frac = count/total, start = ang, end = ang + frac*2*Math.PI, la = frac > 0.5 ? 1 : 0;
    const mid = (start+end)/2;
    const c0=Math.cos(start), s0=Math.sin(start), c1=Math.cos(end), s1=Math.sin(end);
    const d = ['M '+(CX+IR*c0)+' '+(CY+IR*s0), 'L '+(CX+R*c0)+' '+(CY+R*s0),
      'A '+R+' '+R+' 0 '+la+' 1 '+(CX+R*c1)+' '+(CY+R*s1),
      'L '+(CX+IR*c1)+' '+(CY+IR*s1),
      'A '+IR+' '+IR+' 0 '+la+' 0 '+(CX+IR*c0)+' '+(CY+IR*s0), 'Z'].join(' ');
    const dx = (Math.cos(mid)*POP).toFixed(2)+'px', dy = (Math.sin(mid)*POP).toFixed(2)+'px';
    // Visible slice (pops out, no pointer events) + static invisible hit path (never moves).
    paths += '<g class="pd-slice" data-idx="'+i+'">'
      + '<g class="pd-vis" style="--dx:'+dx+';--dy:'+dy+'">'
      + '<path d="'+d+'" fill="'+colors[i%colors.length]+'" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/></g>'
      + '<path class="pd-hit" d="'+d+'" fill="transparent"/></g>';
    ang = end;
  });
  return '<svg width="'+SIZE+'" height="'+SIZE+'" viewBox="0 0 '+SIZE+' '+SIZE+'" style="flex-shrink:0">'+paths+centre+'</svg>';
}

// Cross-highlight (like the tentamen page): hovering a donut slice highlights its
// legend row + %, and hovering a legend row pops the matching slice. Delegated once,
// scoped per .inzicht-body so multiple donuts on the page stay independent.
(function(){
  if (window._inzHoverWired) return;
  window._inzHoverWired = true;
  function setActive(body, idx, on){
    if (!body || idx == null) return;
    body.querySelectorAll('.pd-slice[data-idx="'+idx+'"], .inz-row[data-idx="'+idx+'"]')
        .forEach(function(el){ el.classList.toggle('inz-active', on); });
  }
  document.addEventListener('mouseover', function(e){
    const t = e.target.closest && e.target.closest('.pd-slice, .inz-row');
    if (!t) return;
    setActive(t.closest('.inzicht-body'), t.getAttribute('data-idx'), true);
  });
  document.addEventListener('mouseout', function(e){
    const t = e.target.closest && e.target.closest('.pd-slice, .inz-row');
    if (!t) return;
    // ignore moves that stay within the same element (child-to-child)
    if (e.relatedTarget && t.contains(e.relatedTarget)) return;
    setActive(t.closest('.inzicht-body'), t.getAttribute('data-idx'), false);
  });
})();

function toggleInzicht() {

    + '<div class="psec-meta"><div class="pm">'
    +   '<span class="pm-txt">'+st.done+' / '+st.total+' · '+st.pct+'%</span>'
    +   '<div class="pm-bar"><span style="--pct:'+st.pct+'%"></span></div>'
    + '</div></div>'
    + dials
    + '</div>';
  // Body strip: the Inzicht breakdown across the full width, then the clock below it.
  const strip = '<div class="sc-hero-strip" style="background:'+grad+'">'
    + renderInzicht(subject)
    + (clockHtml || '')
    + '</div>';
  // Each subject is a card whose dials+Inzicht strip smoothly grows/shrinks on click
  // (single-open; click again to shrink back). Its mission tiles always stay on the page.
  return '<div class="psubject'+(isOpen?' is-open':'')+'" id="subj-'+slug+'" data-grad="'+grad+'">'
    + '<div class="subj-card" style="background:'+grad+'">'
    +   head
    +   '<div class="subj-strip-wrap"><div class="subj-strip-inner">' + strip + '</div></div>'
    + '</div>'
    + inner + '</div>';
}

// The full-year road: every subject of the study year, in block order.
function renderPad(openSubject, currentSubject, clockHtml) {
  const blocks = resolveBlocks(studyYear()).filter(b => MISSIONS[b.subject]);
  if (!blocks.length) return '<div class="empty">Voor dit jaar zijn nog geen missies beschikbaar.</div>';
  let html = '<div class="pathwrap">';
  blocks.forEach((b, i) => {
    const isCur = b.subject === currentSubject;   // the current block = nearest exam → gets the clock
    html += renderSubjectPath(b.subject, i+1, b.subject === openSubject, isCur, isCur ? clockHtml : '');
  });
  html += '</div>';
  return html;
}
// The one merged "big" card for the active subject: tabs + banner + dials + Inzicht,
// all in a single colored card. It's a persistent header (above the panes) so the tabs
// keep switching the content below; the subject's mission tiles stay on the page (Pad pane).
function renderHeader(subject, isCurrent) {
  const m = MISSIONS[subject];
  const col = subjColor(subject);
  const grad = 'linear-gradient(135deg,'+col.bg+','+col.dark+')';
  if (!m) return renderTabs(0, 0, grad);
  const st = subjectStats(subject);
  const blocks = resolveBlocks(studyYear()).filter(b => MISSIONS[b.subject]);
  const sidx = blocks.findIndex(b => b.subject === subject) + 1;
  const rings = statRing(st.tq ? st.aq/st.tq : 0, st.pct+'%', st.aq+' / '+st.tq, 'vragen', false)
    + statRing(st.total ? st.done/st.total : 0, st.done+' / '+st.total, '', 'missies', false)
    + dailyRing();
  const badge = isCurrent ? '<span class="pcur-badge">Huidig vak</span><br>' : '';
  return '<div class="bigwrap">'
    + renderTabs(0, 0, grad)
    + '<div class="psubject-head" style="background:'+grad+'">'
    +   '<div><div class="pl">Vak '+sidx+'</div><div class="pt">'+subject+'</div></div>'
    +   '<div class="psec-meta">'+badge+st.pct+'% · '+st.done+'/'+st.total+'</div>'
    + '</div>'
    + '<div class="sc-hero-strip" style="background:'+grad+'">'
    +   '<div class="hero-stats sc-stats">'+rings+'</div>'
    +   renderInzicht(subject)
    + '</div>'
    + '</div>';
}

// The road (Pad pane): the active subject's tiles (its banner/stats are in the header above),
// then every other subject as a small banner + its tiles — all tiles always visible.
function renderRoad(focusName, currentName) {
  const blocks = resolveBlocks(studyYear()).filter(b => MISSIONS[b.subject]);
  if (!blocks.length) return '<div class="empty">Voor dit jaar zijn nog geen missies beschikbaar.</div>';
  let html = '<div class="pathwrap">';
  blocks.forEach((b, i) => {
    if (b.subject === focusName) {
      html += '<div class="psubject is-current" id="subj-'+MISSIONS[b.subject].subj_slug+'">' + renderRoadNodes(b.subject) + '</div>';
    } else {
      html += renderSubjectPath(b.subject, i+1, b.subject === currentName);
    }
  });
  html += '</div>';
  return html;
}

// Smoothly grow/shrink a subject's card in place: click a small one → it opens (big),
// click it again (or another) → it shrinks back. Single-open. No re-render, so it animates.
function toggleSubject(slug) {
  var el = document.getElementById('subj-' + slug);
  if (!el) return;
  var willOpen = !el.classList.contains('is-open');
  document.querySelectorAll('.psubject.is-open').forEach(function (p) { if (p !== el) p.classList.remove('is-open'); });
  el.classList.toggle('is-open', willOpen);
  if (willOpen) {
    var fills = el.querySelectorAll('.sr-fill');
    fills.forEach(function (c) { c.style.strokeDashoffset = c.style.strokeDasharray || getComputedStyle(c).strokeDasharray; });
    requestAnimationFrame(function () { requestAnimationFrame(function () {
      fills.forEach(function (c) { var o = c.getAttribute('data-off'); if (o !== null) c.style.strokeDashoffset = o; });
    }); });
  }
}

function render() {
  const cur = computeCurrent();
  window._cur = cur;
  const cc = subjColor(cur.subject);
  const cgrad = 'linear-gradient(135deg,'+cc.bg+','+cc.dark+')';
  const root = document.getElementById('root');
  const clockHtml = renderExamClock(cur, true);   // clock lives inside the current subject's card only
  // On phones, start the current subject card COLLAPSED (banner only) — tap it to expand.
  const isNarrow = !!(window.matchMedia && window.matchMedia('(max-width: 768px)').matches);
  const padOpen = isNarrow ? null : cur.subject;
  root.innerHTML = renderTopBar(cur)
    + renderTabs(0, 0, cgrad)
    + '<div class="tabpane active" id="pane-pad">' + renderPad(padOpen, cur.subject, clockHtml) + '</div>'
    + '<div class="tabpane" id="pane-opgeslagen"><div class="empty">Laden…</div></div>'
    + '<div class="tabpane" id="pane-fouten"><div class="empty">Laden…</div></div>';
  document.getElementById('loading').style.display = 'none';
  root.style.display = 'block';
  animateRings();
  initStickyTabs(cgrad);
  loadSaved(cur);
  loadFouten(cur);
  // Returning from an exam/mission opened via a tab deep-link (#opgeslagen / #fouten)
  // → reopen that tab instead of the default Pad.
  var h = (location.hash || '').replace('#', '');
  if (h === 'opgeslagen' || h === 'fouten') switchTab(h);
}

// The tabs bar is sticky; as you scroll the Pad, recolour it to match whichever
// subject section is currently under it (the subject you're looking at).
function initStickyTabs(defaultGrad) {
  const sc = document.querySelector('.main-content');
  const tabs = document.querySelector('.hero-tabs');
  if (!sc || !tabs) return;
  let last = defaultGrad, ticking = false;
  function apply() {
    ticking = false;
    // Only the Pad pane has subject sections; leave the colour as-is on others.
    if (!document.getElementById('pane-pad').classList.contains('active')) return;
    const tr = tabs.getBoundingClientRect();
    tabs.classList.toggle('is-stuck', tr.top <= 57);        // pinned → show the backdrop
    const line = tr.bottom + 8;                              // just below the sticky bar
    const secs = document.querySelectorAll('#pane-pad .psubject[data-grad]');
    let grad = null;
    for (const s of secs) {
      if (s.getBoundingClientRect().top <= line) grad = s.getAttribute('data-grad');
      else break;                                           // sections are in top-to-bottom order
    }
    grad = grad || defaultGrad;
    if (grad !== last) { tabs.style.background = grad; last = grad; }
  }
  sc.addEventListener('scroll', function () {
    if (!ticking) { ticking = true; requestAnimationFrame(apply); }
  }, { passive: true });
  apply();
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tabpane').forEach(p => p.classList.remove('active'));
  const pane = document.getElementById('pane-' + name); if (pane) pane.classList.add('active');
}

/* ── Opgeslagen (saved questions) ── */
// The set of exam_keys that belong to a subject: its real exam keys (subject_index)
// plus all its mission keys. Used to scope saved/wrong questions to one subject.
function subjectKeySet(subject) {
  const idx = SUBJ_IDX[subject];
  const set = new Set((idx && idx.exam_keys) || []);
  const m = MISSIONS[subject];
  if (m) Object.values(m.topics).forEach(u => u.missions.forEach(ms => set.add(ms.key)));
  return set;
}
async function loadSaved(cur) {
  const pane = document.getElementById('pane-opgeslagen');
  const sb = getSB(), uid = await currentUid();
  if (!sb || !uid) { pane.innerHTML = '<div class="empty">Log in om je opgeslagen vragen te zien.</div>'; return; }
  let rows = [];
  try { const { data } = await sb.from('saved_questions').select('exam_key,qnum,created_at').eq('user_id', uid).order('created_at', { ascending: false }); rows = data || []; }
  catch (e) { pane.innerHTML = '<div class="empty">Kon opgeslagen vragen niet laden.</div>'; return; }
  // Only show saved questions from the current subject (real exams + missions).
  const keys = subjectKeySet(cur.subject);
  rows = rows.filter(r => keys.has(r.exam_key));
  const m = MISSIONS[cur.subject];
  const slug = m ? m.subj_slug : ((SUBJ_IDX[cur.subject] || {}).subj_slug);
  document.querySelector('.tab[data-tab="opgeslagen"]').innerHTML = IC.star + ' Opgeslagen' + (rows.length ? ' <span class="badge">'+rows.length+'</span>' : '');
  if (!rows.length) { pane.innerHTML = '<div class="empty">Nog geen opgeslagen vragen in <b>'+cur.subject+'</b>. Tik op de ster bij een vraag om \'m te bewaren.</div>'; return; }
  window._svSaved = rows.map(r => r.exam_key + '#' + r.qnum);
  const cta = slug ? '<a class="fr-cta sv-cta" href="missie.html?mode=opgeslagen&vak='+slug+'" onclick="startSaved()">'+IC.star+' Herhaal opgeslagen vragen</a>' : '';
  pane.innerHTML = cta + rows.map(r =>
    '<a class="qrow" href="'+r.exam_key+'.html#qblock-'+r.qnum+'" onclick="setReturn(\'opgeslagen\')">'+IC.star
    + '<div class="qrow-main"><div class="qrow-t">'+prettyKey(r.exam_key)+'</div><div class="qrow-s">Vraag '+r.qnum+'</div></div>'
    + '<button class="qrow-x" title="Verwijderen" onclick="event.preventDefault();event.stopPropagation();unsaveQ(\''+r.exam_key+'\','+r.qnum+',this)">✕</button></a>'
  ).join('');
}
// Stash the saved-question refs so missie.html?mode=opgeslagen can rebuild the set.
function startSaved() {
  try { sessionStorage.setItem('vumed_saved_review', JSON.stringify(window._svSaved || [])); } catch (e) {}
  setReturn('opgeslagen');
}
async function unsaveQ(examKey, qnum, btn) {
  const sb = getSB(), uid = await currentUid(); if (!sb || !uid) return;

function startFouten() {

}
// Stash where the exam/mission "Menu" button should return to (a dashboard tab).
// progressdots.js reads this on the exam page and rewrites its back button. One-shot.
function setReturn(tab) {
  try { sessionStorage.setItem('vumed_return', 'dashboard.html#' + tab); } catch (e) {}
}
function prettyKey(k) {
  k = k.replace(/^mission_/, '').replace(/^oefen_/, '');
  return k.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

/* ── Foutenreview ── */
async function loadFouten(cur) {
  const pane = document.getElementById('pane-fouten');
  const idx = SUBJ_IDX[cur.subject];
  if (!idx) { pane.innerHTML = '<div class="empty">Geen foutenreview beschikbaar.</div>'; return; }
  // count wrong answers across this subject's real exams + its missions
  let wrong = 0;
  const keys = (idx.exam_keys || []).slice();
  const m = MISSIONS[cur.subject];
  if (m) Object.values(m.topics).forEach(u => u.missions.forEach(ms => keys.push(ms.key)));
  const sb = getSB(), uid = await currentUid();
  const seen = {}, seenAll = {};
  let answered = 0, correct = 0;
  function countFrom(progress, ek) {
    const ans = (progress && progress.answered) || {};
    Object.entries(ans).forEach(([q,v]) => {
      const id = ek+'#'+q;
      if (v === 'wrong' && !seen[id]) { seen[id]=1; wrong++; }
      if (!seenAll[id]) { seenAll[id]=1; answered++; if (v === 'correct') correct++; }
    });
  }
  // localStorage
  keys.forEach(ek => { try { const p = JSON.parse(localStorage.getItem('vumed_progress_'+ek)); if (p) countFrom(p, ek); } catch(e){} });
  if (sb && uid) {
    try { const { data } = await sb.from('exam_progress').select('exam_key,progress').eq('user_id', uid).in('exam_key', keys);
      (data||[]).forEach(r => countFrom(r.progress, r.exam_key)); } catch(e){}
  }
  const wrongIds = Object.keys(seen);
  document.querySelector('.tab[data-tab="fouten"]').innerHTML = IC.flag + ' Foutenreview' + (wrong ? ' <span class="badge">'+wrong+'</span>' : '');
  if (!wrong) {
    pane.innerHTML = '<div class="fr-done"><div class="fr-done-ring">'+IC.check+'</div>'
      + '<div><div class="fr-heading">Alles op orde!</div>'
      + '<div class="fr-text">Je hebt nog geen foute antwoorden in dit vak. Maak eerst wat vragen — fouten verschijnen hier om gericht te herhalen.</div></div></div>';
    return;
  }
  const slug = m ? m.subj_slug : idx.subj_slug;
  const acc = answered ? Math.round(correct / answered * 100) : 0;
  pane.innerHTML = '<div class="fr-hero"><div class="fr-card">'
    + '<div class="bn-shine"></div>'
    + '<div class="fr-top">'
      + '<div class="fr-ring"><div class="fr-ring-num">'+wrong+'</div><div class="fr-ring-lbl">fout</div></div>'
      + '<div><div class="fr-heading">Tijd om deze vragen recht te zetten</div>'
        + '<div class="fr-text">Je maakte <b>'+wrong+'</b> ' + (wrong===1?'fout':'fouten') + ' in dit vak. Herhaal ze gericht in één missie en zet je kennis vast.</div></div>'
    + '</div>'
    + '<div class="fr-stats">'
      + '<div class="fr-chip"><div class="fr-chip-num">'+acc+'%</div><div class="fr-chip-lbl">nauwkeurigheid</div></div>'
      + '<div class="fr-chip"><div class="fr-chip-num">'+answered+'</div><div class="fr-chip-lbl">beantwoord</div></div>'
      + '<div class="fr-chip"><div class="fr-chip-num">'+wrong+'</div><div class="fr-chip-lbl">te herhalen</div></div>'
    + '</div>'
    + '<a class="fr-cta" href="missie.html?mode=foutenreview&vak='+slug+'" onclick="startFouten()">'+IC.flag+' Start foutenreview</a>'
    + '</div></div>';
  window._frWrong = wrongIds;
}

/* Jaar volgt het account: elke expliciete keuze (toggle of onboarding-popup)
   gaat ook naar user_profiles.study_year, zodat een vers apparaat / de app
   meteen op het juiste jaar start. Fire-and-forget. */
async function pushStudyYear(y) {
  const n = parseInt(String(y).replace('year', ''), 10);
  if (!(n >= 1 && n <= 3)) return;
  const sb = getSB(), uid = await currentUid();
  if (!sb || !uid) return;
  try { await sb.from('user_profiles').update({ study_year: n }).eq('user_id', uid); } catch (e) {}
}

/* Haalt het accountjaar op. Retourneert true zodra het jaar bekend is (DB of
   dit apparaat). DB vult een vers apparaat; een lokale keuze zonder DB-waarde
   wordt omhoog gedragen (zelfde carry-up als het dagdoel). Een afwijkende
   lokale waarde blijft staan — setYear duwt elke wissel toch naar de DB. */
async function syncStudyYear() {
  const sb = getSB(), uid = await currentUid();
  if (!sb || !uid) return !!localStorage.getItem('vumed_study_year');
  try {
    const r = await sb.from('user_profiles').select('study_year').eq('user_id', uid).maybeSingle();
    if (r.error) return !!localStorage.getItem('vumed_study_year');
    const db = r.data && r.data.study_year;
    const loc = localStorage.getItem('vumed_study_year');
    if (db) {
      if (!loc) { localStorage.setItem('vumed_study_year', 'year' + db); afterYearChange(); }
      return true;
    }
    if (loc) { pushStudyYear(loc); return true; }
    return false;
  } catch (e) { return !!localStorage.getItem('vumed_study_year'); }
}
