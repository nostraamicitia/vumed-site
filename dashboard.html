/* ─────────────────────────── Daily Quests flyout ───────────────────────────
   Vanilla-JS port of the vumed.html quest flyout (that page is React). Same
   storage keys (vumed_daily, vumed_quests, vumed_daily_<ISO>), same milestone
   ladder, same random loot rolls via gift_modal.js. Rewards credit through the
   shared VumedStats wallet. */
(function () {
  const XP_MILESTONES = [100, 200, 300, 500, 1000, 1500, 2000, 3000, 5000];
  function getMilestone(c) {
    return c < XP_MILESTONES.length
      ? XP_MILESTONES[c]
      : XP_MILESTONES[XP_MILESTONES.length - 1] + (c - XP_MILESTONES.length + 1) * 5000;
  }
  // Same ISO-UTC day key progressdots.js uses for vumed_daily_<date>, so claims
  // and the question counter roll over at the same instant.
  function getDayKey() { return new Date().toISOString().slice(0, 10); }
  function getDailyData() {
    const today = getDayKey();
    try {
      const s = JSON.parse(localStorage.getItem('vumed_daily') || '{}');
      if (s.date === today) return { date: today, startXp: s.startXp ?? null, claimedCount: s.claimedCount || 0, guestXp: s.guestXp || 0 };
    } catch (e) {}
    return { date: today, startXp: null, claimedCount: 0, guestXp: 0 };
  }
  function saveDailyData(d) { try { localStorage.setItem('vumed_daily', JSON.stringify(d)); } catch (e) {} }
  function getDailyQuestionCount() {
    try { return parseInt(localStorage.getItem('vumed_daily_' + getDayKey()) || '0', 10) || 0; } catch (e) { return 0; }
  }
  function getQuestClaims() {
    const today = getDayKey();
    try {
      const s = JSON.parse(localStorage.getItem('vumed_quests') || '{}');
      if (s.date === today) return s.claimed || {};
    } catch (e) {}
    return {};
  }
  function saveQuestClaims(c) { try { localStorage.setItem('vumed_quests', JSON.stringify({ date: getDayKey(), claimed: c })); } catch (e) {} }
  const fmt = n => n.toLocaleString('nl-NL');

  const QUESTS = [
    { id: 'q5',  label: 'Beantwoord 5 vragen',  target: 5  },
    { id: 'q15', label: 'Beantwoord 15 vragen', target: 15 },
    { id: 'q30', label: 'Beantwoord 30 vragen', target: 30 },
  ];

  const BOLT = s => '<svg width="' + s + '" height="' + s + '" viewBox="0 0 24 24" fill="none" style="flex-shrink:0"><path d="M13 2L4.5 13.5H11L10 22L19.5 10H13L13 2Z" fill="#FFC800"/></svg>';
  // shop.html GIFT icon — keep in sync
  // mini EHBO-koffertje (2026-07-20, verving het cadeau-icoon — sync met vumed.html Gift / shop.html GIFT / trofeeenpad GIFT_SVG_SM)
  const EHBO_MINI = function (s) { return '<svg width="' + s + '" height="' + s + '" viewBox="0 0 24 24" fill="none"><rect x="8.6" y="2.6" width="6.8" height="4.8" rx="2.4" stroke="#E03131" stroke-width="1.7"/><rect x="2.5" y="5.4" width="19" height="15.2" rx="3" fill="#FF4B4B"/><rect x="2.5" y="5.4" width="19" height="4.2" rx="3" fill="#FF6B6B"/><rect x="2.5" y="9.4" width="19" height="1.4" fill="rgba(0,0,0,0.14)"/><rect x="10.4" y="11" width="3.2" height="7.6" rx="1" fill="#fff"/><rect x="8.2" y="13.2" width="7.6" height="3.2" rx="1" fill="#fff"/></svg>'; };
  const GIFT = EHBO_MINI(42);
  const CHECK = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 12.5L9.5 18L20 6.5" stroke="#58CC02" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  let user = null, totalXp = null;
  let dailyData = getDailyData();
  let questClaims = getQuestClaims();
  let dailyCount = getDailyQuestionCount();
  let open = false, closing = false;
  let tabEl = null, badgeEl = null, panelEl = null;

  function bar(now, target) {
    const pct = Math.min(now / target * 100, 100);
    return '<div class="qp-bar"><div class="qp-bar-fill" style="width:' + pct + '%"></div>'
      + '<span class="qp-bar-txt">' + fmt(Math.min(now, target)) + ' / ' + fmt(target) + '</span></div>';
  }

  function xpState() {
    const target = getMilestone(dailyData.claimedCount);
    const now = (user && totalXp !== null && dailyData.startXp !== null) ? Math.max(0, totalXp - dailyData.startXp) : 0;
    return { target, now, done: now >= target };
  }

  function VS() { return window.VumedStats || null; }
  // The free daily hearts gift is claimable when it hasn't been opened today.
  // Works for guests too (VumedStats mirrors giftDay in localStorage).
  function giftReady() {
    const vs = VS();
    if (!vs || !vs.getState) return false;
    try { return vs.getState().giftDay !== getDayKey(); } catch (e) { return false; }
  }

  // Dagdoel-reeks (vumed_stats.js owns it) — null until the engine has loaded.
  function goalInfo() {
    const vs = VS();
    if (!vs || !vs.goalInfo) return null;
    try { return vs.goalInfo(); } catch (e) { return null; }
  }
  function goalReady() {
    const gi = goalInfo();
    return !!(gi && gi.claimable && user);   // claiming writes to the DB → needs an account
  }

  function claimableCount() {
    const xs = xpState();
    return (giftReady() && user ? 1 : 0)
      + (xs.done && user ? 1 : 0)
      + (goalReady() ? 1 : 0)
      + QUESTS.filter(q => dailyCount >= q.target && !questClaims[q.id]).length;
  }

  function panelHTML() {
    const xs = xpState();
    let h = '<div class="qp-head"><span class="qp-title">Dagelijkse quests</span>'
      + '<button class="qp-close" title="Sluiten">&#10005;</button></div>'
      + '<div class="qp-sub">Elke dag nieuwe quests</div>';
    // Dagelijkse beloning — free daily hearts gift (moved here from the shop)
    const giftDone = !giftReady();
    // Guests: the reward is off — clicking it opens the login pop-up instead of
    // granting anything (claiming writes to the account, which they don't have).
    let giftReward;
    if (!user) giftReward = '<button class="qp-gift qp-idle" style="cursor:pointer" data-act="gift-login" title="Log in om je dagelijkse beloning te claimen">' + GIFT + '</button>';
    else if (giftDone) giftReward = '<span class="qp-claimed">' + CHECK + ' Geclaimd</span>';
    else giftReward = '<button class="qp-gift qp-active" data-act="gift" title="Klik om je beloning te claimen!">' + GIFT + '</button>';
    h += '<div class="qp-row">'
      + '<div class="qp-info"><div class="qp-name">Dagelijkse beloning</div>'
      + '<div class="qp-desc">Een verrassingskist, elke dag opnieuw</div></div>'
      + '<div class="qp-reward">' + giftReward + '</div></div>';
    // XP milestone quest — chest reward
    const xpReady = xs.done && user;
    h += '<div class="qp-row qp-xp">'
      + '<div class="qp-info"><div class="qp-name">Verdien ' + fmt(xs.target) + ' XP</div>' + bar(xs.now, xs.target) + '</div>'
      + '<div class="qp-reward"><button class="qp-gift ' + (xpReady ? 'qp-active' : 'qp-idle') + '"'
      + (xpReady ? ' data-act="xp" title="Klik om je beloning te claimen!"' : ' disabled title="Verdien XP om je beloning te ontgrendelen"') + '>'
      + GIFT + '</button></div></div>';
    // Question-count quests — gem rewards
    QUESTS.forEach(q => {
      const done = dailyCount >= q.target;
      const claimed = !!questClaims[q.id];
      let reward;
      if (claimed) reward = '<span class="qp-claimed">' + CHECK + ' Geclaimd</span>';
      else if (done) reward = '<button class="qp-gift qp-active" data-act="quest" data-id="' + q.id + '" title="Klik om je beloning te claimen!">' + GIFT + '</button>';
      else reward = '<span title="Beloning — voltooi de quest" style="display:inline-flex;opacity:.5">' + GIFT + '</span>';
      h += '<div class="qp-row">'
        + '<div class="qp-info"><div class="qp-name">' + q.label + '</div>' + bar(dailyCount, q.target) + '</div>'
        + '<div class="qp-reward">' + reward + '</div></div>';
    });
    // Dagdoel-reeks — the long game next to the daily quests. Days on which the
    // user's OWN dagdoel was met; a chest at 7/30/100 (see vumed_stats.js).
    const gi = goalInfo();
    if (gi) {
      const tgt = gi.claimable ? gi.claimable.days : gi.next;
      if (tgt) {
        const ready = goalReady();
        let reward;
        if (ready) reward = '<button class="qp-gift qp-active" data-act="goal" title="Klik om je beloning te claimen!">' + GIFT + '</button>';
        else if (gi.claimable) reward = '<button class="qp-gift qp-idle" style="cursor:pointer" data-act="gift-login" title="Log in om te claimen">' + GIFT + '</button>';
        else reward = '<span title="Beloning — haal je dagdoel ' + tgt + ' dagen op rij" style="display:inline-flex;opacity:.5">' + GIFT + '</span>';
        h += '<div class="qp-row">'
          + '<div class="qp-info"><div class="qp-name">Dagdoel-reeks: ' + tgt + ' dagen</div>'
          + '<div class="qp-desc">' + gi.goal + ' vragen per dag' + (gi.done ? ' · vandaag gehaald' : '') + '</div>'
          + bar(Math.min(gi.streak, tgt), tgt) + '</div>'
          + '<div class="qp-reward">' + reward + '</div></div>';
      }
    }
    return h;
  }

  function render() {
    const c = claimableCount();
    if (badgeEl) { badgeEl.style.display = c > 0 ? 'flex' : 'none'; badgeEl.textContent = c; }
    if (panelEl) panelEl.innerHTML = panelHTML();
  }

  function creditPrize(prize) {
    const vs = window.VumedStats;
    if (vs && vs.awardGems) {
      vs.awardGems(prize.gems);
      if (vs.awardCoins) vs.awardCoins(prize.coins);
      if (prize.hearts && vs.awardHearts) vs.awardHearts(prize.hearts);
      return;
    }
    const sb = getSB();
    if (sb && user) {
      // no add_hearts RPC exists — hearts only credit via VumedStats (it owns
      // the hearts state); this belt-and-braces path drops them
      sb.rpc('add_gems',  { p_user_id: user.id, p_amount: prize.gems  }).then(() => {}, () => {});
      sb.rpc('add_coins', { p_user_id: user.id, p_amount: prize.coins }).then(() => {}, () => {});
    }
  }

  // Open the random-loot chest; onClaimed runs once at reveal (guarded by
  // gift_modal.js), so closing the chest early never grants the reward.
  function openReward(title, onClaimed) {
    if (window.VumedGift) {
      window.VumedGift.open({
        random: true, title,
        onClaim: (prize) => { creditPrize(prize); onClaimed(prize); },
      });
    } else {
      const prize = { gems: 25, coins: 0 };
      creditPrize(prize); onClaimed(prize);
    }
  }

  function claimXp() {
    const xs = xpState();
    if (!(xs.done && user)) return;
    openReward('Dagelijkse XP-beloning', () => {
      dailyData = Object.assign({}, dailyData, { claimedCount: dailyData.claimedCount + 1 });
      saveDailyData(dailyData);
      render();
    });
  }

  function claimQuest(id) {
    if (questClaims[id] || dailyCount < (QUESTS.find(q => q.id === id) || {}).target) return;
    openReward('Quest voltooid', () => {
      questClaims = Object.assign({}, questClaims, { [id]: true });
      saveQuestClaims(questClaims);
      render();
    });
  }

  // Dagdoel-reeks chest. Rarity comes from the dagdoel, size from the milestone —
  // both already resolved by VumedStats (goal_min, so raising the goal on day 7
  // can't buy a bigger chest).
  //
  // Order matters: the chest opens FIRST and only records the claim at the reveal,
  // keeping gift_modal's contract that closing early leaves the reward claimable.
  // The RPC is also the double-claim guard — if it says no (a second tab got there
  // first), nothing is credited.
  function claimGoal() {
    const vs = VS(); const gi = goalInfo();
    if (!vs || !gi || !gi.claimable || !user) return;
    const r = gi.claimable;
    const finish = async (prize) => {
      const res = await vs.claimGoalMilestone(r.days);
      if (!res.ok) { render(); return; }   // already claimed elsewhere → credit nothing
      creditPrize(prize);                  // credit what the user actually saw
      render();
    };
    if (window.VumedGift) {
      window.VumedGift.open({
        random: true, forceRarity: r.rarity, multiplier: r.mult,
        title: 'Dagdoel-reeks: ' + r.days + ' dagen',
        footText: r.days + ' dagen op rij ' + r.goal + ' vragen',
        onClaim: finish,
      });
    } else {
      finish({ gems: 10, coins: 60 });
    }
  }

  // Dagelijkse beloning — a RANDOM chest since 2026-07-20 (was fixed +3
  // hearts). claimGift only marks the day now (its ok:false = the double-claim
  // guard, a second tab credits nothing); the rolled prize — incl. the small
  // hearts chance every random chest has — credits via creditPrize.
  function claimDailyGift() {
    const vs = VS();
    if (!vs || !vs.claimGift || !giftReady()) return;
    const finish = (prize) => Promise.resolve(vs.claimGift()).then((r) => {
      if (!r || r.ok !== false) creditPrize(prize);
      render();
    });
    if (window.VumedGift) {
      window.VumedGift.open({
        random: true, title: 'Dagelijkse beloning',
        footText: (prize) => {
          try {
            const st = vs.getState();
            if (prize.hearts && st && typeof st.hearts === 'number') {
              return 'Totaal: ' + (st.hearts + prize.hearts) + ' hartjes';
            }
          } catch (e) {}
          return '';
        },
        onClaim: finish,
      });
    } else { finish({ gems: 10, coins: 0 }); }
  }

  /* ── Dagdoel picker ──────────────────────────────────────────────────────
     Asked once, on the first login (daily_goal is still null). Guests are never
     asked: their choice would be per-device and they can't claim the reward
     anyway. Changeable afterwards in instellingen.html. */
  const RAR_COL  = { gewoon: '#58CC02', zeldzaam: '#FF9600', episch: '#AA72FF', legendarisch: '#9FB6CC' };
  const RAR_COL2 = { gewoon: '#46A302', zeldzaam: '#E07E00', episch: '#8B4DF0', legendarisch: '#7E99B3' };
  const RAR_LBL  = { gewoon: 'Gewoon', zeldzaam: 'Zeldzaam', episch: 'Episch', legendarisch: 'Legendarisch' };
  // Stars mirror the chest's tap-ladder (gift_modal RARITIES: gewoon 1, zeldzaam 2, episch 3, legendarisch 4).
  const RAR_STARS = { gewoon: 1, zeldzaam: 2, episch: 3, legendarisch: 4 };
  const GOAL_STAR = '<svg viewBox="0 0 24 24" fill="#FFC800"><path d="M12 2l2.9 6.26 6.6.7-4.9 4.55 1.3 6.49L12 16.9 6.1 20l1.3-6.49L2.5 8.96l6.6-.7z"/></svg>';
  let goalAsked = false;

  function goalOptHTML(n) {
    const vs = VS();
    const t = (vs && vs.GOAL_TIERS && vs.GOAL_TIERS[n]) || {};
    const rc  = RAR_COL[t.rarity]  || '#8E8E93';
    const rc2 = RAR_COL2[t.rarity] || '#6E6E73';
    const stars = GOAL_STAR.repeat(RAR_STARS[t.rarity] || 1)
      + (t.mult > 1 ? '<span class="gs-plus">+</span>' : '');
    const rec = (vs && n === vs.DEFAULT_GOAL) ? '<span class="goal-rec">Aanbevolen</span>' : '';
    return '<button class="goal-opt" data-goal="' + n + '" style="--rc:' + rc + ';--rc2:' + rc2 + '">'
      + '<span class="goal-opt-n">' + n + '</span>'
      + '<span class="goal-opt-txt">'
      +   '<span class="goal-opt-name">' + (t.label || '') + rec + '</span>'
      +   '<span class="goal-opt-sub">' + n + ' vragen per dag</span>'
      + '</span>'
      + '<span class="goal-opt-right">'
      +   '<span class="goal-stars">' + stars + '</span>'
      +   '<span class="goal-opt-tag">' + (RAR_LBL[t.rarity] || '') + (t.mult > 1 ? ' +' : '') + '</span>'
      + '</span></button>';
  }

  // Jaar-stap van de onboarding (zelfde kaart-stijl als de dagdoel-opties;
  // kleuren = de jaar-toggle kleuren YEAR_COL).
  const YEAR_OPTS = [
    { y: 'year1', n: 1, rc: '#1CB0F6', rc2: '#0E85B5' },
    { y: 'year2', n: 2, rc: '#FF9600', rc2: '#E07E00' },
    { y: 'year3', n: 3, rc: '#58CC02', rc2: '#46A302' },
  ];

  function yearStepHTML() {
    return '<div class="modal goal-modal">'
      + '<div class="goal-hero">'
      +   '<div class="goal-hero-ic"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'
      +     '<path d="M22 10L12 5 2 10l10 5 10-5z"/><path d="M6 12v5c0 1.5 2.7 3 6 3s6-1.5 6-3v-5"/></svg></div>'
      +   '<h2>In welk jaar zit je?</h2>'
      +   '<p>Dan staan het dashboard en de tentamens meteen op jouw jaar.</p>'
      + '</div>'
      + '<div class="goal-body">'
      +   '<div class="goal-opts">'
      +     YEAR_OPTS.map(o =>
              '<button class="goal-opt" data-year="' + o.y + '" style="--rc:' + o.rc + ';--rc2:' + o.rc2 + '">'
            + '<span class="goal-opt-n">' + o.n + '</span>'
            + '<span class="goal-opt-txt">'
            +   '<span class="goal-opt-name">Jaar ' + o.n + '</span>'
            +   '<span class="goal-opt-sub">Bachelor geneeskunde jaar ' + o.n + '</span>'
            + '</span></button>').join('')
      +   '</div>'
      +   '<p class="goal-note">Wisselen kan altijd met de jaarknoppen bovenaan.</p>'
      + '</div></div>';
  }

  function goalStepHTML(vs) {
    return '<div class="modal goal-modal">'
      + '<div class="goal-hero">'
      +   '<div class="goal-hero-ic"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">'
      +     '<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/>'
      +     '<circle cx="12" cy="12" r="1.6" fill="#fff" stroke="none"/></svg></div>'
      +   '<h2>Stel je dagdoel in</h2>'
      +   '<p>Haal je dagdoel 7 dagen op rij en verdien een kist — hoe hoger je doel, hoe beter de kist.</p>'
      + '</div>'
      + '<div class="goal-body">'
      +   '<div class="goal-opts">' + vs.GOALS.map(goalOptHTML).join('') + '</div>'
      +   '<p class="goal-note">Je dagenreeks blijft gewoon op 10 vragen staan — je dagdoel staat daar los van. '
      +   'Aanpassen kan later bij Instellingen.</p>'
      + '</div></div>';
  }

  function openGoalPicker(askYear, askGoal) {
    const vs = VS(); if (!vs || !vs.GOALS) return;
    const back = document.createElement('div');
    back.className = 'modal-back';
    back.innerHTML = askYear ? yearStepHTML() : goalStepHTML(vs);
    // Deliberately no outside-click / Esc close: it's a one-time choice, and
    // dismissing it would leave the profile incomplete and re-open next load.
    back.addEventListener('click', (e) => {
      const yb = e.target.closest('[data-year]');
      if (yb) {
        const y = yb.getAttribute('data-year');
        localStorage.setItem('vumed_study_year', y);
        pushStudyYear(y);
        afterYearChange();
        if (askGoal) back.innerHTML = goalStepHTML(vs);   // door naar stap 2
        else back.remove();
        return;
      }
      const b = e.target.closest('[data-goal]');
      if (!b) return;
      const n = parseInt(b.getAttribute('data-goal'), 10);
      Promise.resolve(vs.setGoal(n)).then(() => { back.remove(); render(); });
    });
    document.body.appendChild(back);
  }

  async function maybeGoalPopup() {
    if (goalAsked) return;
    const vs = VS(); if (!vs || !vs.goalInfo) return;
    let st; try { st = vs.getState(); } catch (e) { return; }
    if (!st.loaded || !st.uid) return;      // wait for the profile pull; logged-in only
    goalAsked = true;                       // guard vóór de awaits (event vuurt vaak)
    const yearKnown = await syncStudyYear();
    const goalKnown = vs.goalInfo().chosen;
    if (yearKnown && goalKnown) return;
    openGoalPicker(!yearKnown, !goalKnown);
  }

  function shiftMain(px) {
    // The panel now overlays the page (desktop) / slides in as a full page
    // (mobile) — the content is never pushed aside on any screen.
    const mc = document.querySelector('.main-content');
    if (mc) mc.style.paddingRight = '';
  }

  function openPanel() {
    // Refresh live counters from storage on every open
    dailyCount = getDailyQuestionCount();
    questClaims = getQuestClaims();
    dailyData = getDailyData();
    open = true; closing = false;
    panelEl = document.createElement('div');
    panelEl.className = 'quest-panel';
    panelEl.innerHTML = panelHTML();
    document.body.appendChild(panelEl);
    panelEl.addEventListener('click', (e) => {
      if (e.target.closest('.qp-close')) { closePanel(); return; }
      if (e.target.closest('[data-act="gift-login"]')) { closePanel(); openDashAuth(); return; }
      if (e.target.closest('[data-act="gift"]')) { claimDailyGift(); return; }
      if (e.target.closest('[data-act="xp"]')) { claimXp(); return; }
      if (e.target.closest('[data-act="goal"]')) { claimGoal(); return; }
      const qb = e.target.closest('[data-act="quest"]');
      if (qb) { claimQuest(qb.getAttribute('data-id')); return; }
    });
    shiftMain(384);
    render();
    document.addEventListener('mousedown', onDocDown);
  }

  function closePanel() {
    if (!panelEl || closing) return;
    closing = true;
    panelEl.classList.add('qp-closing');
    shiftMain(0);
    document.removeEventListener('mousedown', onDocDown);
    const el = panelEl;
    setTimeout(() => { if (el && el.parentNode) el.parentNode.removeChild(el); }, 260);
    panelEl = null; open = false; closing = false;
  }

  function onDocDown(e) {
    const t = e.target;
    if (t.closest && (t.closest('.quest-panel') || t.closest('.quest-tab'))) return;
    closePanel();
  }

  async function loadProfile() {
    const sb = getSB();
    if (!sb) { render(); return; }
    try {
      const { data } = await sb.auth.getSession();
      user = (data && data.session) ? data.session.user : null;
    } catch (e) { user = null; }
    if (!user) { render(); return; }
    try {
      const { data: p } = await sb.from('user_profiles').select('total_xp').eq('user_id', user.id).single();
      if (p) {
        totalXp = p.total_xp || 0;
        // Anchor today's start XP the first time we load for this day
        if (dailyData.startXp === null) {
          dailyData = Object.assign({}, dailyData, { startXp: totalXp });
          saveDailyData(dailyData);
        }
      }
    } catch (e) {}
    render();
    maybeGoalPopup();
  }

  function mount() {
    tabEl = document.createElement('button');
    tabEl.className = 'quest-tab';
    tabEl.title = 'Daily quests';
    tabEl.innerHTML = BOLT(24) + '<span class="quest-badge" style="display:none"></span>';
    badgeEl = tabEl.querySelector('.quest-badge');
    tabEl.addEventListener('click', () => { if (open) closePanel(); else openPanel(); });
    document.body.appendChild(tabEl);
    render();
    loadProfile();
    // Keep the wallet in sync when it repaints (e.g. after a claim elsewhere).
    // Also the moment the engine's profile pull lands, which is what tells us
    // whether this account has ever picked a dagdoel.
    document.addEventListener('vumed-stats', () => { render(); maybeGoalPopup(); });

    // Touch swipe: from the right edge swipe LEFT to open the daily-quests panel;
    // while open, swipe RIGHT to close it.
    var tsX = 0, tsY = 0, track = false;
    document.addEventListener('touchstart', function (e) {
      if (!e.touches || e.touches.length !== 1) { track = false; return; }
      tsX = e.touches[0].clientX; tsY = e.touches[0].clientY;
      track = open || (tsX >= window.innerWidth - 32); // open-candidate = start near right edge
    }, { passive: true });
    document.addEventListener('touchend', function (e) {
      if (!track) return; track = false;
      var t = e.changedTouches && e.changedTouches[0]; if (!t) return;
      var dx = t.clientX - tsX, dy = t.clientY - tsY;
      if (Math.abs(dx) < 45 || Math.abs(dx) <= Math.abs(dy)) return; // need a clear horizontal swipe
      if (!open && dx < 0) openPanel();        // right edge, swipe left → open
      else if (open && dx > 0) closePanel();   // swipe right → close
    }, { passive: true });
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', mount);
  else mount();
})();

/* ── Drop-in reveal: dashboard tiles fall onto the page ("toenk toenk toenk").
   On page entry the whole above-fold set cascades down with a slower, rhythmic
   stagger; tiles scrolled into view later drop in quicker. ── */
(function () {
  if (!('IntersectionObserver' in window)) return;
  if (window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  // Top-level "difjes" only — nested matches are skipped in scan() so a card and
  // its own header never compound-drop.
  var SEL = '.pnode-row';   // tiles only — the year pills / tabs / subject headers / unit labels stay put
  // Entrance window: the first 1.6s after the FIRST tile reveals = the page-entry
  // cascade (slower rhythm, deeper stagger). After that: quick scroll-reveal drops.
  var firstAt = 0;
  function stagDelay(n) {
    if (!firstAt) firstAt = Date.now();
    var entrance = (Date.now() - firstAt) < 1600;
    return (entrance ? Math.min(n, 9) * 110 : Math.min(n, 6) * 70) + 'ms';
  }
  function drop(el, n) {
    el.style.animationDelay = stagDelay(n);
    el.classList.add('in');
    io.unobserve(el);
  }
  var io = new IntersectionObserver(function (ents) {
    var n = 0;
    ents.forEach(function (e) {
      if (!e.isIntersecting) return;
      drop(e.target, n); n++; // stagger tiles that enter together
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -6% 0px' });
  // When a drop finishes, strip the animation (.landed) so inline transforms
  // (pnode serpentine X) and transition-based hovers work again.
  document.addEventListener('animationend', function (e) {
    if (e.animationName === 'dashDrop') {
      e.target.classList.add('landed');
      e.target.style.animationDelay = '';
    }
  });
  function scan() {
    var els = document.querySelectorAll(SEL);
    for (var i = 0; i < els.length; i++) {
      var el = els[i];
      if (el.__rev) continue;
      el.__rev = true;
      // A tile inside another dropping tile rides its parent's fall.
      if (el.parentElement && el.parentElement.closest(SEL)) continue;
      el.classList.add('dash-reveal');
      io.observe(el);
    }
  }
  // Reveal every tile currently within (or above) the viewport. Backs up the
  // IntersectionObserver so the drop never depends on IO delivery timing.
  function revealVisible() {
    var e = document.querySelectorAll('.dash-reveal:not(.in)'), n = 0;
    for (var i = 0; i < e.length; i++) {
      var r = e[i].getBoundingClientRect();
      if (r.bottom > 0 && r.top < window.innerHeight * 0.92) {
        drop(e[i], n); n++;
      }
    }
  }
  function boot() {
    scan();
    var root = document.querySelector('.main-content') || document.body;
    // Debounce with setTimeout (not rAF — rAF freezes in background tabs).
    var t = 0;
    function schedule() { if (t) return; t = setTimeout(function () { t = 0; scan(); }, 80); }
    new MutationObserver(schedule).observe(root, { childList: true, subtree: true });
    // Also poll a few times so async-rendered content is caught + above-fold tiles
    // land on load even where IO delivery is throttled.
    [150, 500, 1200, 2500].forEach(function (ms) { setTimeout(function () { scan(); revealVisible(); }, ms); });
    // Scroll fallback (throttled) — works even where IO callbacks are throttled.
    var lastT = 0;
    function onScroll() { var now = Date.now(); if (now - lastT < 90) return; lastT = now; revealVisible(); }
    if (root) root.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('scroll', onScroll, { passive: true });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
</script>

<!-- Jaar-swipe (phone, INTERACTIEVE PAGER — Tijmen 2026-07-22): de jaar-content
     (#pane-pad) volgt 1:1 de vinger tijdens het vegen (half-vegen-en-vasthouden
     houdt de pagina daar), met een iOS-rubberband aan de uiteinden. Bij loslaten
     voorbij ~28% of een flick commit't het naar het buurjaar; het nieuwe jaar
     schuift binnen vanaf de kant waarheen je veegde. Richting = standaard
     carrousel: veeg LINKS → volgend jaar (komt van rechts), veeg RECHTS → vorig
     jaar. Alleen ≤768px; genegeerd bij verticale scroll, een horizontale scroller
     onder de vinger, een open modal/quest-paneel, of een start in de rechter
     32px-rand (daar hoort de quest-paneel-veeg). -->
<script>
(function () {
  var isPhone = function () { return window.matchMedia('(max-width:768px)').matches; };
  function startsInHScroll(node) {
    for (var el = node; el && el !== document.body; el = el.parentElement) {
      if (!(el instanceof Element)) continue;
      if (el.scrollWidth - el.clientWidth > 8) {
        var ov = getComputedStyle(el).overflowX;
        if (ov === 'auto' || ov === 'scroll') return true;
      }
    }
    return false;
  }
  function overlayOpen() {
    return !!(document.querySelector('.modal-back') || document.querySelector('.quest-panel'));
  }
  function pane() { return document.getElementById('pane-pad'); }
  function padActive() { var p = pane(); return !!(p && p.classList.contains('active')); }
  function curYear() {
    try { return parseInt(String(window.studyYear()).replace(/\D/g, ''), 10) || 1; }
    catch (e) { return 1; }
  }
  function reset(p) { if (p) { p.style.transition = ''; p.style.transform = ''; } }

  var sx = 0, sy = 0, dx = 0, W = 360, tracking = false, locked = false, vfail = false;
  var lastX = 0, lastT = 0, vel = 0, animating = false;

  document.addEventListener('touchstart', function (e) {
    if (animating || !isPhone() || !e.touches || e.touches.length !== 1) { tracking = false; return; }
    if (overlayOpen() || !padActive()) { tracking = false; return; }
    if (typeof window.setYear !== 'function' || typeof window.studyYear !== 'function') { tracking = false; return; }
    var t = e.touches[0];
    W = window.innerWidth || 360;
    if (t.clientX >= W - 32 || startsInHScroll(e.target)) { tracking = false; return; }
    sx = t.clientX; sy = t.clientY; dx = 0;
    lastX = sx; lastT = e.timeStamp || Date.now(); vel = 0;
    tracking = true; locked = false; vfail = false;
  }, { passive: true });

  document.addEventListener('touchmove', function (e) {
    if (!tracking || vfail) return;
    var t = e.touches[0];
    var mx = t.clientX - sx, my = t.clientY - sy;
    if (!locked) {
      if (Math.abs(mx) < 12 || Math.abs(mx) < Math.abs(my) * 1.3) {
        if (Math.abs(my) > 14) vfail = true;   // duidelijk verticaal → laat scrollen
        return;
      }
      locked = true;
      var p0 = pane(); if (p0) p0.style.transition = 'none';
    }
    var now = e.timeStamp || Date.now();
    var dt = now - lastT;
    if (dt > 0) { vel = (t.clientX - lastX) / dt; lastX = t.clientX; lastT = now; }
    dx = mx;
    var cur = curYear();
    // rubberband aan de uiteinden: veeg-links voorbij jaar 3, of veeg-rechts vóór jaar 1
    var atEnd = (dx < 0 && cur >= 3) || (dx > 0 && cur <= 1);
    var move = atEnd ? dx * 0.22 : dx;
    var p = pane(); if (p) p.style.transform = 'translateX(' + move + 'px)';
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchend', function () {
    if (!tracking) return;
    tracking = false;
    if (!locked) return;
    locked = false;
    var p = pane(); if (!p) return;
    var cur = curYear();
    var goNext = dx < 0;                       // veeg links → volgend jaar
    var target = goNext ? cur + 1 : cur - 1;
    var flick = (goNext ? vel < -0.5 : vel > 0.5) && Math.abs(dx) > 24;
    var commit = (Math.abs(dx) > W * 0.28 || flick) && target >= 1 && target <= 3;
    if (commit) commitYear(p, goNext, 'year' + target);
    else snapBack(p);
  });
  document.addEventListener('touchcancel', function () {
    if (tracking && locked) snapBack(pane());
    tracking = false; locked = false;
  });

  function snapBack(p) {
    if (!p) return;
    p.style.transition = 'transform .3s cubic-bezier(.22,1,.36,1)';
    p.style.transform = 'translateX(0)';
    setTimeout(function () { reset(p); }, 320);
  }

  function commitYear(p, goNext, yearKey) {
    animating = true;
    var w = window.innerWidth || 360;
    p.style.transition = 'transform .19s ease-out';
    p.style.transform = 'translateX(' + (goNext ? -w : w) + 'px)';
    setTimeout(function () {
      try { window.setYear(yearKey); } catch (e) {}   // rebuilt #root → verse #pane-pad
      var np = pane();
      if (!np) { animating = false; return; }
      np.style.transition = 'none';
      np.style.transform = 'translateX(' + (goNext ? w : -w) + 'px)';   // binnen vanaf veeg-kant
      void np.offsetHeight;
      requestAnimationFrame(function () {
        np.style.transition = 'transform .28s cubic-bezier(.22,1,.36,1)';
        np.style.transform = 'translateX(0)';
      });
      setTimeout(function () { reset(np); animating = false; }, 340);
    }, 200);
  }
})();
</script>
</body>
</html>
