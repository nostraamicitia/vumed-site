  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dark-theme.css?v=3">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', Arial, sans-serif;
      background: #fff; color: #1C1C1E;
      -webkit-font-smoothing: antialiased;
      display: flex; height: 100vh; overflow: hidden;
    }
    html.dark body { background: #1C1C1E; color: #EBEBF0; }
    .main-content { flex: 1; overflow-y: auto; }
    .page { max-width: 980px; margin: 0 auto; padding: 58px 32px 90px; }

    /* ── Colorful hero banner ── */
    .shop-hero { position: relative; overflow: hidden; border-radius: 24px; padding: 28px 30px;
      color: #fff; margin-bottom: 26px; display: flex; align-items: center; gap: 20px;
      background: linear-gradient(135deg, #1CB0F6 0%, #6C63FF 52%, #CE82FF 100%);
      box-shadow: 0 12px 30px rgba(108,99,255,0.28), inset 0 -4px 0 rgba(0,0,0,0.14);
      animation: shDrop .62s cubic-bezier(.5,0,.85,.4) backwards; transform-origin: 50% 100%; }
    .shop-hero::before { content: ''; position: absolute; top: -60px; right: -30px;
      width: 200px; height: 200px; border-radius: 50%; background: rgba(255,255,255,0.14); }
    .shop-hero::after { content: ''; position: absolute; bottom: -70px; left: 26%;
      width: 150px; height: 150px; border-radius: 50%; background: rgba(255,255,255,0.10); }
    /* Trage lichtbaan over de hero (zelfde effect als de trofeeenpad-banner);
       ::before/::after zijn al bezet door de deco-cirkels → los div'je */
    .shop-hero .bn-shine { position: absolute; top: -30%; left: 0; width: 34%; height: 160%; background: linear-gradient(105deg, transparent, rgba(255,255,255,0.09) 42%, rgba(255,255,255,0.16) 50%, rgba(255,255,255,0.09) 58%, transparent); transform: skewX(-16deg) translateX(-330%); animation: bnShine 7s ease-in-out infinite; pointer-events: none; }
    @keyframes bnShine { 0% { transform: skewX(-16deg) translateX(-330%); } 27%, 100% { transform: skewX(-16deg) translateX(430%); } }
    @media (prefers-reduced-motion: reduce) { .shop-hero .bn-shine { display: none; }
      .shop-hero, .shop-sec, .cat-head, .item { animation: none; } }
    .shop-hero-txt { position: relative; z-index: 1; flex: 1; min-width: 0; }
    .shop-hero-label { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; opacity: 0.86; }
    .shop-hero-title { font-size: 34px; font-weight: 900; letter-spacing: -0.6px; line-height: 1.05; margin: 2px 0 8px; }
    .shop-hero-sub { font-size: 13.5px; font-weight: 600; line-height: 1.55; max-width: 560px; opacity: 0.94; }
    .shop-hero-art { position: relative; z-index: 1; flex-shrink: 0;
      animation: heroFloat 3.4s ease-in-out infinite; filter: drop-shadow(0 8px 14px rgba(0,0,0,0.18)); }
    /* Drop-in reveal (dashboard-taal): vallen + squash-bounce landing.
       fill backwards, niet both — een blijvende animatie-transform zou de
       hover-lift van .item doodslaan. */
    @keyframes shDrop {
      0%   { opacity: 0; transform: translateY(-26px) scaleY(1.04) scaleX(.98);
             animation-timing-function: cubic-bezier(.5,0,.85,.4); }
      30%  { opacity: 1; }
      46%  { transform: translateY(3px) scaleY(.93) scaleX(1.03);
             animation-timing-function: cubic-bezier(.18,.65,.3,1); }
      70%  { transform: translateY(-4px) scaleY(1.02) scaleX(.99);
             animation-timing-function: cubic-bezier(.5,0,.6,1); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes heroFloat { 0%,100% { transform: translateY(0) rotate(-3deg); } 50% { transform: translateY(-9px) rotate(3deg); } }
    @media (max-width: 620px) {
      .shop-hero { padding: 22px 20px; gap: 14px; }
      .shop-hero-art svg { width: 64px; height: 64px; display: block; }
      .shop-hero-title { font-size: 28px; }
    }

    /* ── Section banner (gradient, per theme) ── */
    .shop-sec { display: flex; align-items: center; gap: 15px; border-radius: 18px; padding: 14px 20px;
      color: #fff; box-shadow: inset 0 -3px 0 rgba(0,0,0,0.16); margin: 30px 0 12px;
      animation: shDrop .62s cubic-bezier(.5,0,.85,.4) backwards; transform-origin: 50% 100%; }
    .shop-sec-icon { width: 44px; height: 44px; border-radius: 13px; flex-shrink: 0;
      background: rgba(255,255,255,0.22); display: flex; align-items: center; justify-content: center; }
    .shop-sec-label { font-size: 11.5px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.7px; opacity: 0.86; }
    .shop-sec-title { font-size: 20px; font-weight: 900; line-height: 1.1; margin-top: 1px; }
    .shop-sec.hearts { background: linear-gradient(135deg, #FF6E8A, #E5245A); box-shadow: inset 0 -3px 0 rgba(0,0,0,0.16), 0 8px 20px rgba(229,36,90,0.20); }
    .shop-sec.freeze { background: linear-gradient(135deg, #5AC8FF, #1CB0F6); box-shadow: inset 0 -3px 0 rgba(0,0,0,0.16), 0 8px 20px rgba(28,176,246,0.20); }
    .shop-sec.avatar { background: linear-gradient(135deg, #CE82FF, #8B3FE0); box-shadow: inset 0 -3px 0 rgba(0,0,0,0.16), 0 8px 20px rgba(139,63,224,0.20); }
    .shop-sec.hearts { animation-delay: .08s; }
    .shop-sec.freeze { animation-delay: .16s; }
    .shop-sec.avatar { animation-delay: .24s; }

    .sec-sub { font-size: 13px; font-weight: 600; color: #8E8E93; margin: 0 2px 14px; line-height: 1.5; text-align: center; }
    .sec-sub b { color: #1CB0F6; }
    html.dark .fz-cube { fill: #17394A; stroke: #2E5F7C; }
    html.dark .fz-shine { opacity: 0.15; }

    /* ── Avatar subcategory heading: gradient-chip met icoon + teller,
       geflankeerd door zachte divider-lijnen (breedte = de kaartgrid) ── */
    .cat-head { display: flex; align-items: center; gap: 14px;
      max-width: 744px; margin: 26px auto 8px;
      animation: shDrop .62s cubic-bezier(.5,0,.85,.4) backwards; transform-origin: 50% 100%; }
    .cat-head::before, .cat-head::after { content: ''; flex: 1; height: 2px; border-radius: 2px;
      background: linear-gradient(90deg, rgba(139,63,224,0), rgba(139,63,224,0.35)); }
    .cat-head::after { background: linear-gradient(90deg, rgba(139,63,224,0.35), rgba(139,63,224,0)); }
    .cat-chip { display: inline-flex; align-items: center; gap: 9px;
      background: linear-gradient(135deg, #CE82FF, #8B3FE0); color: #fff;
      border-radius: 999px; padding: 9px 18px;
      font-size: 13px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.9px;
      box-shadow: 0 6px 16px rgba(139,63,224,0.32), inset 0 -2px 0 rgba(0,0,0,0.16); }
    .cat-chip svg { flex-shrink: 0; display: block; }
    .cat-count { background: rgba(255,255,255,0.26); border-radius: 999px;
      padding: 2px 9px; font-size: 11.5px; font-weight: 800; letter-spacing: 0; }
    html.dark .cat-head::before { background: linear-gradient(90deg, rgba(206,130,255,0), rgba(206,130,255,0.30)); }
    html.dark .cat-head::after { background: linear-gradient(90deg, rgba(206,130,255,0.30), rgba(206,130,255,0)); }
    #avatar-cats .empty { font-size: 13.5px; font-weight: 700; color: #8E8E93; margin: 8px 2px; }

    /* ── Shop grid: gecentreerd, max 3 kaarten per rij (740px = 3×236 + 2×16),
       vollere categorieën wrappen naar een nieuwe rij ── */
    .strip { position: relative; }
    .shop-row {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 16px;
      max-width: 744px; margin: 0 auto; /* 3×236 + 2×16 gap + 2×2 eigen padding */
      padding: 8px 2px 22px;
    }

    .item { position: relative; flex: 0 0 236px;
      background: #fff; border-radius: 20px; padding: 24px 20px 20px;
      border: 1.5px solid #EEEFF3;
      box-shadow: 0 3px 12px rgba(0,0,0,0.06);
      display: flex; flex-direction: column; align-items: center; text-align: center; gap: 4px;
      overflow: hidden;
      user-select: none; -webkit-user-select: none;
      transition: transform .24s cubic-bezier(.34,1.2,.5,1), box-shadow .24s ease, border-color .24s ease;
      animation: shDrop .52s cubic-bezier(.5,0,.85,.4) backwards; transform-origin: 50% 100%; }
    .item:nth-child(2) { animation-delay: .05s; }
    .item:nth-child(3) { animation-delay: .10s; }
    .item:nth-child(4) { animation-delay: .15s; }
    .item:nth-child(5) { animation-delay: .20s; }
    .item:nth-child(6) { animation-delay: .25s; }
    html.dark .item { background: #2C2C2E; border-color: #3A3A3C; }
    /* Colored top accent bar per section */
    .item::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
      background: linear-gradient(90deg, #1CB0F6, #6C63FF); opacity: 0.9; }
    #shop-row .item::before { background: linear-gradient(90deg, #FF6E8A, #E5245A); }
    #freeze-row .item::before { background: linear-gradient(90deg, #5AC8FF, #1CB0F6); }
    .av-row .item::before { background: linear-gradient(90deg, #CE82FF, #8B3FE0); }
    .item:hover { transform: translateY(-7px); box-shadow: 0 16px 34px rgba(0,0,0,0.14); border-color: transparent; }
    /* Deeplink highlight (shop.html?item=<id> vanuit de avatar-editor).
       .av-row prefix: wint van html.dark .item op border-color (gotcha 5). */
    .av-row .item.shop-focus { border-color: #1CB0F6;
      box-shadow: 0 0 0 4px rgba(28,176,246,0.22), 0 12px 28px rgba(28,176,246,0.28);
      animation: shopFocusPulse 1.1s ease-in-out 3; }
    @keyframes shopFocusPulse { 0%, 100% { transform: none; } 50% { transform: translateY(-6px) scale(1.02); } }
    @media (prefers-reduced-motion: reduce) { .av-row .item.shop-focus { animation: none; } }
    .item-art { height: 66px; display: flex; align-items: center; justify-content: center; margin-bottom: 6px;
      transition: transform .28s cubic-bezier(.34,1.5,.5,1); }
    .item-art > svg, .item-art > img { max-width: 100%; max-height: 100%; }
    .item:hover .item-art { transform: scale(1.14) rotate(-4deg); }
    .item-name { font-size: 15.5px; font-weight: 900; }
    .item-desc { font-size: 12.5px; font-weight: 600; color: #8E8E93; line-height: 1.4; min-height: 34px; }

    /* Duolingo-style 3D buttons, tinted per section */
    .item-btn { margin-top: 14px; width: 100%; border: none; border-radius: 14px; padding: 12px;
      font-family: inherit; font-size: 14px; font-weight: 800; cursor: pointer;
      background: #1CB0F6; color: #fff; box-shadow: 0 4px 0 #0E85B5;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: background .15s ease, transform .08s ease, box-shadow .08s ease; }
    .item-btn:hover:not(:disabled) { background: #0A9EDC; }
    .item-btn:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 0 0 #0E85B5; }
    .item-btn:disabled { background: #E5E5EA; color: #8E8E93; box-shadow: 0 4px 0 #CFCFD4; cursor: not-allowed; }
    html.dark .item-btn:disabled { background: #48484A; box-shadow: 0 4px 0 #333335; }
    .item-btn.free { background: #58CC02; box-shadow: 0 4px 0 #3A9200; }
    .item-btn.free:hover:not(:disabled) { background: #4EB800; }
    #shop-row .item-btn:not(:disabled) { background: #FF4B6E; box-shadow: 0 4px 0 #D42E52; }
    #shop-row .item-btn:not(:disabled):hover { background: #F03A5E; }
    #freeze-row .item-btn:not(:disabled) { background: #1CB0F6; box-shadow: 0 4px 0 #0E85B5; }
    .av-row .item-btn:not(:disabled) { background: #9345D4; box-shadow: 0 4px 0 #6E2CAB; }
    .av-row .item-btn:not(:disabled):hover { background: #8237C4; }

    .note { margin-top: 26px; background: linear-gradient(135deg, #EBF7FF, #F3ECFF); border: 1.5px solid #DCEBFA;
      border-radius: 16px; padding: 15px 18px;
      font-size: 13.5px; font-weight: 700; color: #0A6E9E; line-height: 1.5; }
    html.dark .note { background: #17394A; border-color: #2E5F7C; color: #9BD7F5; }
    .note a { color: inherit; }

    /* purchase feedback toast */
    .shop-toast { position: fixed; top: 26px; left: 50%; transform: translateX(-50%) translateY(-8px);
      z-index: 700; padding: 12px 22px; background: #fff; border: 1.5px solid #D1F0C0; border-radius: 16px;
      font-size: 14px; font-weight: 800; color: #46A302; box-shadow: 0 10px 28px rgba(0,0,0,0.15);
      opacity: 0; pointer-events: none; transition: opacity .25s ease, transform .25s ease;
      display: flex; align-items: center; gap: 8px; }
    .shop-toast.err { color: #FF3B30; border-color: #FFD3DC; }
    .shop-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    html.dark .shop-toast { background: #2C2C2E; border-color: #3E5C2A; }
    html.dark .shop-toast.err { border-color: #7A2E3E; }

    /* ── Telefoon: óók 3 kaarten naast elkaar (compacte kaartjes) ── */
    @media (max-width: 768px) {
      .page { padding-left: 12px; padding-right: 12px; }
      .shop-row { gap: 8px; }
      .item { flex: 0 0 calc((100% - 16px) / 3); min-width: 0;
        padding: 13px 7px 11px; border-radius: 16px; }
      /* zoom schaalt de vaste-px art mee (multi-icoon rijen zoals 5 bevriezers
         zijn ~200px breed en moeten in een ~105px kaartje passen) */
      .item-art { height: 60px; margin-bottom: 2px; }
      .item-art > svg, .item-art > img { zoom: 0.7; }
      .item-art > div { zoom: 0.5; }
      .item-name { font-size: 12px; line-height: 1.25; }
      .item-desc { font-size: 10.5px; min-height: 0; }
      /* Kaarten in een rij stretchen naar gelijke hoogte; met margin-top:auto
         zakt de knop naar de onderkant zodat alle tiles/knoppen op dezelfde
         hoogte uitlijnen, ongeacht of de naam/omschrijving korter is
         (5 streakbevriezers, gouden hoofdlamp). */
      .item-btn { margin-top: auto; font-size: 11px; font-weight: 800;
        padding: 8px 4px; border-radius: 10px; gap: 4px; }
      .item-btn svg { zoom: 0.8; }
      .cat-chip { font-size: 11.5px; padding: 7px 14px; }
    }
  </style>
</head>

  <div class="main-content">

    </div>

<script>
/* ── Icons (inline SVG, no emoji) ── */
var HEART = function (s) { return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#FF4B6E"/></svg>'; };
var GEM = function (s) { return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 24 24"><path d="M6 3h12l4 6-10 12L2 9z" fill="#1CB0F6"/><path d="M2 9h20M8 3l-2 6 6 12M16 3l2 6-6 12" fill="none" stroke="#0A8BD0" stroke-width="1.1" stroke-linejoin="round"/></svg>'; };
var GIFT = function (s) { return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 24 24" fill="none"><rect x="8.6" y="2.6" width="6.8" height="4.8" rx="2.4" stroke="#E03131" stroke-width="1.7"/><rect x="2.5" y="5.4" width="19" height="15.2" rx="3" fill="#FF4B4B"/><rect x="2.5" y="5.4" width="19" height="4.2" rx="3" fill="#FF6B6B"/><rect x="2.5" y="9.4" width="19" height="1.4" fill="rgba(0,0,0,0.14)"/><rect x="10.4" y="11" width="3.2" height="7.6" rx="1" fill="#fff"/><rect x="8.2" y="13.2" width="7.6" height="3.2" rx="1" fill="#fff"/></svg>'; };
var MULTIHEART = '<div style="display:flex;gap:2px;align-items:center">' + HEART(30) + HEART(42) + HEART(30) + '</div>';
/* Streakbevriezer: glazig ijsblok met de dagenreeks-vlam erin bevroren.
   Vlamvorm = statisch frame van streak_anim.json (de dagenreeks-lottie). */
var _fzN = 0;
var FREEZE = function (s) {
  var id = 'fzg' + (_fzN++);
  return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 24 24">'
    + '<defs><linearGradient id="'+id+'" x1="0" y1="0" x2="1" y2="1">'
    +   '<stop offset="0" stop-color="#F2FBFF"/><stop offset="0.55" stop-color="#C7ECFF"/><stop offset="1" stop-color="#96DEFF"/>'
    + '</linearGradient></defs>'
    + '<rect class="fz-cube" x="1.5" y="1.5" width="21" height="21" rx="5.5" fill="url(#'+id+')" stroke="#8AD3F9" stroke-width="0.9"/>'
    + '<path d="M22.5 11.5V17a5.5 5.5 0 0 1-5.5 5.5H11.5Z" fill="#5BC8FF" opacity="0.38"/>'

  if (!el) { el = document.createElement('div'); el.id = 'shop-toast'; document.body.appendChild(el); }
  el.className = 'shop-toast' + (err ? ' err' : '');
  el.innerHTML = (err ? '' : HEART(16)) + '<span>' + msg + '</span>';
  void el.offsetWidth;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(function () { el.classList.remove('show'); }, 2600);
}

function buy(id) {
  var api = VS(); if (!api) return;
  var o = OFFERS.filter(function (x) { return x.id === id; })[0];
  if (!o) return;
  Promise.resolve(api.buyHearts(o.cost, o.gain)).then(function (r) {
    if (r && r.ok) toast('Gekocht! Je hebt nu ' + api.getState().hearts + ' hartjes.');
    else if (r && r.reason === 'coins') toast('Niet genoeg munten.', true);
    else if (r && r.reason === 'login') toast('Log eerst in om te kopen.', true);
    else if (r && r.reason === 'full') toast('Je hartjes zitten al vol.', true);
    renderAll();
  });
}

/* Skin purchase: coins via the atomic add_coins RPC, ownership as a jsonb
   id-array on user_profiles (re-read from the DB right before buying so a
   stale mirror can never double-charge). */
var _skinBusy = false;
async function buySkin(id) {
  if (_skinBusy) return;
  var api = VS(); if (!api) return;
  var s = api.getState();
  var o = SKIN_OFFERS.filter(function (x) { return x.id === id; })[0];
  if (!o) return;
  if (!s.uid) { toast('Log eerst in om te kopen.', true); return; }
  if (ownedSkins().indexOf(o.id) !== -1) return;
  if (s.coins < o.cost) { toast('Niet genoeg munten.', true); return; }
  var c = getSB();
  if (!c) { toast('Kopen mislukt — probeer opnieuw.', true); return; }
  _skinBusy = true;
  try {
    // Atomic: deduct + grant in one transaction (no more "charged with no item").
    var res = await c.rpc('buy_avatar_item', { p_item_id: o.id, p_price: o.cost, p_currency: 'coins' });
    if (res && res.error) throw res.error;
    if (!res || !res.data || !res.data.ok) {
      toast(res && res.data && res.data.reason === 'insufficient' ? 'Niet genoeg munten.' : 'Kopen mislukt — probeer opnieuw.', true);
    } else {
      var owned = res.data.owned || [];
      try { localStorage.setItem('vumed_skins', JSON.stringify(owned)); } catch (e) {}
      toast('Gekocht! Zet hem op via je profiel → avatar bewerken.');
    }
  } catch (e) {
    toast('Kopen mislukt — probeer opnieuw.', true);
  }
  _skinBusy = false;
  api.refresh();   // re-pulls coins → repaints wallet, fires vumed-stats → renderAll
}

      return '<div class="item" data-shop-item="' + esc(o.id) + '"><div class="item-art">' + o.art + '</div>'
        + '<div class="item-name">' + esc(o.name) + '</div>'
        + '<button class="item-btn" ' + (canPay ? '' : 'disabled') + ' onclick="' + o.buy + '(\'' + o.id + '\')">' + label + '</button>'
        + '</div>';
    });
    html += '<div class="cat-head"><div class="cat-chip">'
          +   (CAT_ICONS[cat[0]] || CAT_ICONS._)
          +   '<span>' + esc(cat[1]) + '</span>'
          +   '<span class="cat-count">' + cards.length + '</span>'
          + '</div></div>'
          + '<div class="strip"><div class="shop-row av-row">' + cards.join('') + '</div></div>';
  });
  if (!html) html = '<div class="empty">Je hebt alle avatar-onderdelen al — mooi zo!</div>';
  host.innerHTML = html;
  applyShopFocus(host);
}

/* Deeplink vanuit de avatar-editor: shop.html?item=<id> scrollt naar die kaart
   en laat hem pulsen. renderAvatar draait meermaals (stats-events, dyn-items en
   ownership laden async) — blijf de klasse terugzetten tot het venster sluit.
   Al gekocht (kaart bestaat niet meer) → er gebeurt gewoon niets. */
var _focusId = '';
try { _focusId = new URLSearchParams(location.search).get('item') || ''; } catch (e) {}
var _focusScrolled = false;
function applyShopFocus(host) {
  if (!_focusId) return;
  var sel = '[data-shop-item="' + ((window.CSS && CSS.escape) ? CSS.escape(_focusId) : _focusId) + '"]';
  var el = host.querySelector(sel);
  if (!el) return;                    // nog niet gerenderd — volgende render probeert opnieuw
  el.classList.add('shop-focus');
  if (!_focusScrolled) {
    _focusScrolled = true;
    setTimeout(function () {
      var e2 = host.querySelector(sel);
      if (e2) e2.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
    }, 200);
    setTimeout(function () {
      _focusId = '';
      var e2 = host.querySelector('.shop-focus');
      if (e2) e2.classList.remove('shop-focus');
    }, 5200);
  }
}
var _dynBusy = false;
async function buyItem(id) {
  if (_dynBusy) return;
  var api = VS(); if (!api) return;
  var s = api.getState();
  var o = DYN_ITEMS.filter(function (x) { return x.id === id; })[0]; if (!o) return;
  if (!s.uid) { toast('Log eerst in om te kopen.', true); return; }
  if (ownedSkins().indexOf(o.id) !== -1) return;
  var free = (o.price || 0) <= 0, isGems = o.currency === 'gems';
  var bal = isGems ? s.gems : s.coins;
  if (!free && bal < o.price) { toast('Niet genoeg ' + (isGems ? 'gems' : 'munten') + '.', true); return; }
  var c = getSB(); if (!c) { toast('Kopen mislukt — probeer opnieuw.', true); return; }
  _dynBusy = true;
  try {
    // Atomic: deduct (coins/gems, or free) + grant in one transaction.
    var res = await c.rpc('buy_avatar_item', { p_item_id: o.id, p_price: free ? 0 : o.price, p_currency: isGems ? 'gems' : 'coins' });
    if (res && res.error) throw res.error;
    if (!res || !res.data || !res.data.ok) {
      toast(res && res.data && res.data.reason === 'insufficient' ? ('Niet genoeg ' + (isGems ? 'gems' : 'munten') + '.') : 'Kopen mislukt — probeer opnieuw.', true);
    } else {
      var owned = res.data.owned || [];
      try { localStorage.setItem('vumed_skins', JSON.stringify(owned)); } catch (e) {}
      toast('Gekocht! Zet hem op via je profiel → avatar bewerken.');
    }
  } catch (e) { toast('Kopen mislukt — probeer opnieuw.', true); }
  _dynBusy = false;
  api.refresh();
}

/* The daily hearts gift ("Dagelijkse beloning") now lives in the Daily Quests
   flyout (dashboard.html + vumed.html), which calls VumedStats.claimGift itself. */

function renderAll() {
  var api = VS(); if (!api) return;
  renderItems(api.getState(), api);
}

/* Shop-only wallet extra: freezes-pill naast de gems. paint() in vumed_stats
   dispatcht 'vumed-stats' VOORDAT het de bar herschrijft, dus injecteer een
   tick later — anders veegt de innerHTML-write de pill meteen weg. */
function injectFreezePill() {
  var bar = document.getElementById('vumed-stats');
  if (!bar || bar.classList.contains('vs-inbar')) return;
  var gems = bar.querySelector('.vs-gems');
  if (!gems || bar.querySelector('.vs-freeze')) return;
  var api = VS();
  var n = api ? (api.getState().freezes || 0) : 0;
  var pill = document.createElement('div');
  pill.className = 'vs-pill vs-freeze';
  pill.title = 'Streakbevriezers';
  pill.innerHTML = FREEZE(19) + '<span class="vs-num">' + n + '</span>';
  gems.insertAdjacentElement('afterend', pill);
}
document.addEventListener('vumed-stats', function () { setTimeout(injectFreezePill, 0); });
setTimeout(injectFreezePill, 0);

/* vumed_stats dispatches 'vumed-stats' on every paint (mount + after Supabase pull) */
document.addEventListener('vumed-stats', renderAll);
document.addEventListener('DOMContentLoaded', renderAll);
loadDynItems();
</script>
