<!DOCTYPE html>
<html lang="nl">
<head>
    <link rel="icon" type="image/png" href="favicon-32.png">
<script src="pwa.js?v=10"></script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Klassement – VUmed</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dark-theme.css?v=3">
  <script src="supabase_config.js"></script>
  <script src="supabase-js.min.js"></script>
  <script src="auth_gate.js?v=12"></script>
  <script src="navbar.js?v=44" data-active="voortgang"></script>
  <script src="user_popup.js?v=1"></script>
  <script src="bg-decor.js?v=4"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', Arial, sans-serif;
      background: #fff;
      color: #1C1C1E;
      -webkit-font-smoothing: antialiased;
      display: flex; height: 100vh; overflow: hidden;
    }

    /* ── Main content ── */
    .main-content { flex: 1; overflow-y: auto; overflow-x: hidden; min-width: 0; }

    /* ── Page header ── */
    .page-header { padding: 36px 48px 0; text-align: center; display: flex; flex-direction: column; align-items: center; }
    .page-title { font-size: 34px; font-weight: 900; color: #1C1C1E; letter-spacing: -0.5px; margin-bottom: 4px; margin-top: 8px; }
    .page-sub { font-size: 15px; color: #afafaf; margin-bottom: 26px; max-width: 420px; }
    .lsh-wrap svg { display: block; animation: lshBob 6s ease-in-out 1.4s infinite; }
    @keyframes lshBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes lsh-sparkle {
      0%, 62%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
      70%  { opacity: 1;   transform: scale(2.6) rotate(20deg); }
      83%  { opacity: 0.85; transform: scale(3.0) rotate(-8deg); }
      94%  { opacity: 0;   transform: scale(0.4) rotate(40deg); }
    }

    /* ── Drop-in reveal (dashboard-taal): elementen vallen op de pagina en landen
       met een squash-bounce. Alleen actief zodra JS html.vg-anim zet — zonder JS
       blijft alles gewoon zichtbaar. ── */
    html.vg-anim .rv, html.vg-anim .rvp { opacity: 0; transform-origin: 50% 100%; will-change: opacity, transform; }
    html.vg-anim .rv.in  { animation: vgDrop .62s cubic-bezier(.5,0,.85,.4) both; animation-delay: var(--d, 0s); }
    html.vg-anim .rvp.in { animation: vgPop .55s cubic-bezier(.34,1.56,.64,1) both; animation-delay: var(--d, 0s); }
    @keyframes vgDrop {
      0%   { opacity: 0; transform: translateY(-26px) scaleY(1.04) scaleX(.98);
             animation-timing-function: cubic-bezier(.5,0,.85,.4); }
      30%  { opacity: 1; }
      46%  { transform: translateY(3px) scaleY(.93) scaleX(1.03);
             animation-timing-function: cubic-bezier(.18,.65,.3,1); }
      70%  { transform: translateY(-4px) scaleY(1.02) scaleX(.99);
             animation-timing-function: cubic-bezier(.5,0,.6,1); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes vgPop {
      0%   { opacity: 0; transform: scale(.78) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── Stat tiles: vlakke witte dashboard-tegels met harde randschaduw ── */
    .stat-tiles {
      width: 100%; max-width: 620px;
      margin: 0 auto 22px; padding: 0 48px;
      display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px;
      align-items: stretch;
    }
    .stat-tile {
      background: #fff; border: 2px solid #E5E5EA; border-radius: 18px;
      box-shadow: 0 5px 0 #E5E5EA;
      padding: 14px; min-width: 0;
      display: flex; align-items: center; gap: 11px;
      position: relative;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .stat-tile:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #E5E5EA; }
    .stat-chip {
      width: 42px; height: 42px; border-radius: 14px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      box-shadow: inset 0 -3px 0 rgba(0,0,0,0.14);
    }
    .stat-chip svg { display: block; }
    .stat-tile:hover .stat-chip svg { animation: chipWiggle .5s ease; }
    @keyframes chipWiggle { 0%,100% { transform: rotate(0); } 30% { transform: rotate(-10deg) scale(1.1); } 65% { transform: rotate(8deg); } }
    .stat-chip--rank { background: linear-gradient(135deg, #FFC800, #FF9600); }
    .stat-chip--xp   { background: linear-gradient(135deg, #38BDF8, #0284C7); }
    .stat-body { min-width: 0; flex: 1; }
    .stat-value {
      font-size: 22px; font-weight: 900; color: #1C1C1E; letter-spacing: -0.4px; line-height: 1.15;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .stat-value--rang { font-size: 18px; }
    .stat-label {
      font-size: 11px; font-weight: 800; color: #AFAFAF;
      text-transform: uppercase; letter-spacing: 0.05em; margin-top: 1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* rang-meter in de rang-tegel — gekleurde vulling (rangkleur) op grijze track */
    .meter-track {
      margin-top: 9px; height: 10px; border-radius: 99px;
      background: #F0F0F4; overflow: hidden; position: relative;
    }
    .meter-fill {
      height: 100%; border-radius: 99px; width: 0%;
      background: #58CC02; position: relative;
      transition: width 1s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    /* glansstreepje bovenop de vulling (zelfde trucje als de streak-bar) */
    .meter-fill::after {
      content: ''; position: absolute; left: 6px; right: 6px; top: 2px; height: 3px;
      border-radius: 99px; background: rgba(255,255,255,0.32);
    }
    .meter-sub { margin-top: 6px; font-size: 11px; font-weight: 700; color: #AFAFAF; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Leaderboard-kaart: witte tegel, harde randschaduw ── */
    .lb-section {
      width: 100%; max-width: 620px;
      margin: 0 auto 40px;
      padding: 0 48px;
    }
    .lb-card {
      background: #fff; border: 2px solid #E5E5EA; border-radius: 22px;
      overflow: hidden; box-shadow: 0 6px 0 #E5E5EA;
    }
    .lb-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 22px; position: relative; overflow: hidden;
      background: linear-gradient(135deg, #38BDF8, #0284C7);
    }
    /* trage lichtbaan over de header-banner (bnShine, zelfde als trofeeenpad) */
    .lb-header::before { content: ''; position: absolute; top: -30%; left: 0; width: 34%; height: 160%; background: linear-gradient(105deg, transparent, rgba(255,255,255,0.09) 42%, rgba(255,255,255,0.18) 50%, rgba(255,255,255,0.09) 58%, transparent); transform: skewX(-16deg) translateX(-330%); animation: bnShine 7s ease-in-out 1.6s infinite; pointer-events: none; }
    @keyframes bnShine { 0% { transform: skewX(-16deg) translateX(-330%); } 27%, 100% { transform: skewX(-16deg) translateX(430%); } }
    .lb-header::after {
      content: ''; position: absolute; top: -120%; right: -4%;
      width: 200px; height: 200px; border-radius: 50%;
      background: rgba(255,255,255,0.12); pointer-events: none;
    }
    .lb-header-title { font-size: 16px; font-weight: 900; color: #fff; }
    .lb-countdown-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.20); border-radius: 99px; padding: 4px 11px;
      font-size: 12.5px; font-weight: 800; color: #fff;
      position: relative; z-index: 1; white-space: nowrap;
    }

    /* ── Podium (top 3): blokken groeien uit de vloer, avatars poppen erin,
       de kroon valt met een zwiepje op nr. 1. Alle delays hangen aan --pd
       zodat brons → zilver → goud in crescendo opbouwt. ── */
    .podium {
      display: flex; align-items: flex-end; justify-content: center;
      gap: 12px; padding: 30px 22px 0;
      border-bottom: 1.5px solid #f0f0f0;
      background: linear-gradient(180deg, #F0F9FF, #fff);
    }
    .pod-col {
      display: flex; flex-direction: column; align-items: center;
      flex: 1; max-width: 140px; min-width: 0;
      animation: podIn 0.45s cubic-bezier(0.25,0.46,0.45,0.94) both;
      animation-delay: var(--pd, 0s);
    }
    @keyframes podIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .pod-avatar-wrap {
      position: relative; margin-bottom: 8px;
      animation: podAvIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
      animation-delay: calc(var(--pd, 0s) + .28s);
    }
    @keyframes podAvIn {
      0%   { opacity: 0; transform: scale(.3); }
      65%  { opacity: 1; transform: scale(1.12); }
      100% { opacity: 1; transform: scale(1); }
    }
    .pod-crown {
      position: absolute; top: -21px; left: 50%; transform: translateX(-50%);
      animation: crownDrop 0.55s cubic-bezier(.34,1.56,.64,1) both;
      animation-delay: calc(var(--pd, 0s) + .72s);
    }
    @keyframes crownDrop {
      0%   { opacity: 0; transform: translate(-50%, -16px) rotate(-14deg); }
      60%  { opacity: 1; transform: translate(-50%, 2px) rotate(6deg); }
      100% { opacity: 1; transform: translate(-50%, 0) rotate(0deg); }
    }
    /* twinkelende sterretjes rond de nummer 1 */
    .pod-spark { position: absolute; pointer-events: none; z-index: 2; opacity: 0; }
    .pod-spark svg { display: block; }
    .pod-spark--a { top: -8px; right: -13px; animation: sparkTwinkle 3.4s ease-in-out 1.3s infinite; }
    .pod-spark--b { bottom: 0px; left: -14px; animation: sparkTwinkle 4.1s ease-in-out 2.4s infinite; }
    @keyframes sparkTwinkle {
      0%, 55%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
      70% { opacity: 1; transform: scale(1.15) rotate(18deg); }
      85% { opacity: 0.7; transform: scale(0.8) rotate(-8deg); }
    }
    .pod-avatar {
      border-radius: 50%; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; color: #fff; background: #e5e5ea;
    }
    .pod-avatar--empty {
      background: transparent; border: 2.5px dashed #D1D1D6;
      color: #C7C7CC; font-size: 20px;
    }
    .pod-name {
      max-width: 100%; font-size: 13px; font-weight: 800; color: #1C1C1E;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .pod-name--me { color: #1CB0F6; }
    .pod-xp { font-size: 12px; font-weight: 800; color: #AFAFAF; margin-top: 1px; margin-bottom: 10px; max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pod-block {
      width: 100%; border-radius: 14px 14px 0 0;
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 10px;
      font-size: 26px; font-weight: 900; color: #fff;
      text-shadow: 0 1px 0 rgba(0,0,0,0.12);
      position: relative; overflow: hidden;
      transform-origin: 50% 100%;
      animation: podRise 0.55s cubic-bezier(.34,1.56,.64,1) both;
      animation-delay: calc(var(--pd, 0s) + .1s);
    }
    @keyframes podRise { from { transform: scaleY(0); } to { transform: scaleY(1); } }
    .pod-num {
      display: inline-block;
      animation: podNumPop 0.4s cubic-bezier(.34,1.56,.64,1) both;
      animation-delay: calc(var(--pd, 0s) + .48s);
    }
    @keyframes podNumPop {
      0%   { opacity: 0; transform: scale(.2) translateY(6px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    .pod-block--1 { height: 92px; background: linear-gradient(180deg, #FFD000, #FFB100); }
    /* glans-sweep over het gouden blok */
    .pod-block--1::after { content: ''; position: absolute; inset: 0; background: linear-gradient(115deg, transparent 34%, rgba(255,255,255,0.45) 50%, transparent 66%); background-size: 230% 100%; background-position: 150% 0; pointer-events: none; animation: podShine 5.4s ease-in-out 1.8s infinite; }
    @keyframes podShine { 0%, 62% { background-position: 150% 0; } 88%, 100% { background-position: -80% 0; } }
    .pod-block--2 { height: 68px; background: linear-gradient(180deg, #C9D6E0, #A9BDCC); }
    .pod-block--3 { height: 52px; background: linear-gradient(180deg, #E0995A, #C97B2E); }
    .pod-block--empty { background: #F2F2F7; color: #C7C7CC; text-shadow: none; }

    /* ── Lijst (positie 4+) ── */
    .lb-row {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 22px; border-bottom: 1px solid #f6f6f8;
      animation: fadeInUp 0.36s cubic-bezier(0.25,0.46,0.45,0.94) both;
      transition: background 0.12s, transform 0.1s ease;
    }
    .lb-row:hover { background: #FAFAFC; }
    .lb-row:active { transform: scale(0.985); }
    .lb-row:last-child { border-bottom: none; }
    .lb-row--me { background: #EBF7FF; }
    .lb-row--me:hover { background: #EBF7FF; }
    .lb-row--me .lb-name, .lb-row--me .lb-xp, .lb-row--me .lb-rank-num { color: #1CB0F6; }
    .lb-rank-num {
      font-size: 15px; font-weight: 800; color: #b0b8c4;
      width: 28px; text-align: center; flex-shrink: 0;
    }
    .lb-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      overflow: hidden; flex-shrink: 0;
      border: 2px solid #e5e5ea;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 900; color: #fff;
      transition: transform 0.15s ease;
    }
    .lb-row:hover .lb-avatar { transform: scale(1.08); }
    .lb-name {
      flex: 1; min-width: 0; font-size: 15px; font-weight: 700; color: #1C1C1E;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: flex; align-items: center; gap: 8px;
    }
    .lb-me-chip {
      flex-shrink: 0; background: #1CB0F6; color: #fff;
      font-size: 10px; font-weight: 900; letter-spacing: 0.08em;
      border-radius: 99px; padding: 2px 8px; text-transform: uppercase;
      animation: chipPulse 2.6s ease-in-out 1.2s infinite;
    }
    @keyframes chipPulse { 0%, 24%, 100% { transform: scale(1); } 12% { transform: scale(1.14); } }
    .lb-xp { font-size: 14px; font-weight: 800; color: #afafaf; flex-shrink: 0; }
    .lb-empty {
      padding: 36px 22px; text-align: center;
      color: #afafaf; font-size: 14px; font-weight: 600; line-height: 1.6;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.14); border-radius: 10px; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Phone (≤560px): rang-tegel wordt full-width (namen als "Co-assistent"
       clippen anders in een 1/3-kolom), rest 2-koloms; alles net wat compacter. ── */
    @media (max-width: 560px) {
      .page-header { padding: 26px 20px 0; }
      .page-title { font-size: 28px; }
      .page-sub { font-size: 14px; }
      .stat-tiles, .lb-section { padding-left: 14px; padding-right: 14px; }
      .stat-tiles { grid-template-columns: 1fr 1fr; gap: 10px; }
      .stat-tile { padding: 12px; gap: 10px; }
      .stat-tile--rang { grid-column: 1 / -1; }
      .stat-chip { width: 38px; height: 38px; border-radius: 12px; }
      .stat-value { font-size: 20px; }
      .stat-value--rang { font-size: 18px; }
      .podium { gap: 8px; padding: 24px 12px 0; }
      .lb-header { padding: 14px 16px; }
      .lb-row { padding: 12px 14px; gap: 10px; }
      .lb-xp { font-size: 13px; }
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      html.vg-anim .rv, html.vg-anim .rvp { opacity: 1; animation: none !important; }
      .pod-col, .pod-avatar-wrap, .pod-crown, .pod-block, .pod-num { animation: none !important; opacity: 1; }
      .pod-spark, .lb-header::before, .pod-block--1::after { display: none; }
      .lsh-wrap svg, .lb-me-chip { animation: none !important; }
      .lb-row { animation-duration: 0s !important; }
      .meter-fill { transition: none; }
    }

    /* ── Dark mode ── */
    html.dark body { background: #1C1C1E; }
    html.dark .page-title { color: #EBEBF0; }
    html.dark .stat-tile { background: #2C2C2E; border-color: #3A3A3C; box-shadow: 0 5px 0 #232325; }
    html.dark .stat-tile:hover { box-shadow: 0 7px 0 #232325; }
    html.dark .stat-value { color: #EBEBF0; }
    html.dark .stat-label { color: #8E8E93; }
    html.dark .meter-track { background: #3A3A3C; }
    html.dark .meter-sub { color: #8E8E93; }
    html.dark .lb-card { background: #2C2C2E; border-color: #3A3A3C; box-shadow: 0 6px 0 #232325; }
    html.dark .podium { border-bottom-color: #3A3A3C; background: linear-gradient(180deg, #22303B, #2C2C2E); }
    html.dark .pod-name { color: #EBEBF0; }
    html.dark .pod-name--me { color: #58D4FF; }
    html.dark .pod-block--empty { background: #3A3A3C; color: #6E6E73; }
    html.dark .pod-avatar--empty { border-color: #48484A; color: #6E6E73; }
    html.dark .lb-row { border-bottom-color: #3A3A3C; }
    html.dark .lb-row:hover { background: #333335; }
    html.dark .lb-name { color: #EBEBF0; }
    html.dark .lb-avatar { border-color: #48484A; }
    html.dark .lb-row--me, html.dark .lb-row--me:hover { background: #0E2A38; }
    html.dark .lb-row--me .lb-name, html.dark .lb-row--me .lb-xp, html.dark .lb-row--me .lb-rank-num { color: #58D4FF; }
  </style>
</head>
<body>

<!-- Main content -->
<div class="main-content">
  <div class="page-content">

    <!-- Header: shields icon + title + subtitle -->
    <div class="page-header">
      <div class="lsh-wrap rvp in-wait" style="--d:0s">
      <svg width="200" height="140" viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="lsh-br"><path d="M50 4 L92 18 Q96 18 96 24 L96 62 Q96 90 50 106 Q4 90 4 62 L4 24 Q4 18 8 18 Z"/></clipPath>
          <clipPath id="lsh-si"><path d="M50 4 L92 18 Q96 18 96 24 L96 62 Q96 90 50 106 Q4 90 4 62 L4 24 Q4 18 8 18 Z"/></clipPath>
          <clipPath id="lsh-go"><path d="M50 4 L92 18 Q96 18 96 24 L96 62 Q96 90 50 106 Q4 90 4 62 L4 24 Q4 18 8 18 Z"/></clipPath>
        </defs>
        <!-- Bronze shield -->
        <g transform="translate(52 74) rotate(-18) translate(-50 -55)">
          <path d="M50 4 L92 18 Q96 18 96 24 L96 62 Q96 90 50 106 Q4 90 4 62 L4 24 Q4 18 8 18 Z" fill="#CD7F32" opacity="0.9"/>
          <polygon points="4,24 4,62 70,4 38,4" fill="#E8A96E" clip-path="url(#lsh-br)" opacity="0.9"/>
          <path d="M50 4 L92 18 Q96 18 96 24 L96 30 Q60 10 50 4 Z" fill="rgba(255,255,255,0.14)" opacity="0.9"/>
          <g clip-path="url(#lsh-br)">
            <g transform="translate(19.5,24.5) scale(2.6)" fill="rgba(100,50,0,0.22)"><path fill-rule="evenodd" clip-rule="evenodd" d="M17.8284 5.82843L18.1716 6.17158C19.7337 7.73367 19.7337 10.2663 18.1716 11.8284L15.5031 14.4969C12.3137 14.2161 9.78387 11.6863 9.50312 8.49689L12.1716 5.82843C13.7337 4.26634 16.2663 4.26634 17.8284 5.82843ZM7.78827 10.2117L5.82843 12.1716C4.26634 13.7337 4.26634 16.2663 5.82843 17.8284L6.17158 18.1716C7.73368 19.7337 10.2663 19.7337 11.8284 18.1716L13.7883 16.2117C10.8779 15.4083 8.5917 13.1221 7.78827 10.2117Z"/></g>
            <g transform="translate(19,24) scale(2.6)" fill="#F2D4A0"><path fill-rule="evenodd" clip-rule="evenodd" d="M17.8284 5.82843L18.1716 6.17158C19.7337 7.73367 19.7337 10.2663 18.1716 11.8284L15.5031 14.4969C12.3137 14.2161 9.78387 11.6863 9.50312 8.49689L12.1716 5.82843C13.7337 4.26634 16.2663 4.26634 17.8284 5.82843ZM7.78827 10.2117L5.82843 12.1716C4.26634 13.7337 4.26634 16.2663 5.82843 17.8284L6.17158 18.1716C7.73368 19.7337 10.2663 19.7337 11.8284 18.1716L13.7883 16.2117C10.8779 15.4083 8.5917 13.1221 7.78827 10.2117Z"/></g>

<script>
/* ── Drop-in reveal (dashboard-taal). Zonder JS of met reduced-motion blijft
   alles gewoon zichtbaar (opacity-0 hangt aan html.vg-anim). ── */
(function(){
  if (window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  document.documentElement.classList.add('vg-anim');
  function go() {
    document.querySelectorAll('.rv, .rvp').forEach(function(el){ el.classList.add('in'); });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', go);
  else go();
})();

const NODE_COUNT   = 100;
const XP_PER_LEVEL = 100;

let totalXP  = 0;
let sbClient = null;

/* ── Supabase ── */
function getSB() {
  if (sbClient) return sbClient;
  if (!window.SUPABASE_URL || window.SUPABASE_URL === 'YOUR_SUPABASE_URL') return null;
  try { sbClient = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY); } catch(e) { return null; }
  return sbClient;
}

/* ── Count-up: telt een tegelwaarde op naar het doel (dashboard/pd-res-taal) ── */
function countUp(el, target, opts) {
  opts = opts || {};
  var prefix = opts.prefix || '';
  var dur = opts.dur || 900;
  if (el._cuRaf) cancelAnimationFrame(el._cuRaf);
  if (window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) {
    el.textContent = prefix + target.toLocaleString('nl-NL');
    return;
  }
  var t0 = null;
  function step(ts) {
    if (t0 === null) t0 = ts;
    var p = Math.min(1, (ts - t0) / dur);
    var e = 1 - Math.pow(1 - p, 3);
    el.textContent = prefix + Math.round(target * e).toLocaleString('nl-NL');
    if (p < 1) el._cuRaf = requestAnimationFrame(step);
    else el._cuRaf = null;
  }
  el._cuRaf = requestAnimationFrame(step);
}

/* ── ISO week key  e.g. "2026-W21" ── */
function getISOWeekKey() {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + 4 - (d.getDay() || 7));
  const yearStart = new Date(d.getFullYear(), 0, 1);
  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return d.getFullYear() + '-W' + String(weekNo).padStart(2, '0');
}

/* ── Countdown to next Monday ── */
function updateCountdown() {
  const now = new Date();
  const day = now.getDay();
  const daysLeft = day === 1 ? 7 : (8 - day) % 7;
  const el = document.getElementById('lbCountdown');
  if (!el) return;
  if (daysLeft === 1) el.textContent = 'reset morgen';
  else el.textContent = 'reset over ' + daysLeft + ' dagen';
}

/* ── Avatar helpers ── */
const AVATAR_COLORS = ['#FF4B4B','#FF9600','#58CC02','#1CB0F6','#CE82FF','#FF86D0','#00CD9C','#FFC800'];
function avatarColor(name) {
  let h = 0;
  for (let i = 0; i < (name || '').length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffff;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}
function makeAvatar(svgStr, name, size, cls) {
  size = size || 42;
  const div = document.createElement('div');
  div.className = cls || 'lb-avatar';
  div.style.width = size + 'px';
  div.style.height = size + 'px';
  if (svgStr && /viewBox/.test(svgStr)) {
    // New-format avatar heads (avatar_render.js) carry their own viewBox — render as-is
    div.style.background = '#e8f7ff';
    div.style.padding = '0';
    div.innerHTML = svgStr;
    const s = div.querySelector('svg');
    if (s) { s.setAttribute('width', size); s.setAttribute('height', size); }
  } else if (svgStr) {
    const inner = svgStr.replace(/^<svg[^>]*>/, '').replace(/<\/svg>\s*$/, '');
    div.style.background = '#e8f7ff';
    div.style.padding = '0';
    div.innerHTML = '<svg viewBox="50 10 300 265" width="' + size + '" height="' + size + '" xmlns="http://www.w3.org/2000/svg">' + inner + '</svg>';
  } else {
    const letter = ((name || '?')[0] || '?').toUpperCase();
    div.style.background = avatarColor(name);
    div.style.fontSize = Math.round(size * 0.4) + 'px';
    div.textContent = letter;
  }
  return div;
}

/* Profiel van een andere gebruiker → popup (user_popup.js); fallback = pagina */
function visitUser(id) {
  if (!id) return;
  if (window.VumedUserPopup) VumedUserPopup.open(id);
  else window.location.href = 'gebruiker.html?u=' + id;
}

function podiumCol(rank, row, myId) {
  const cfg = POD_CFG[rank];

  col.className = 'pod-col';

  if (row) {
    if (rank === 1) {
      const crown = document.createElement('div');
      crown.className = 'pod-crown';
      crown.innerHTML = CROWN_SVG;
      wrap.appendChild(crown);
      const spA = document.createElement('div');
      spA.className = 'pod-spark pod-spark--a';
      spA.innerHTML = POD_STAR_SVG;
      wrap.appendChild(spA);
      const spB = document.createElement('div');
      spB.className = 'pod-spark pod-spark--b';
      spB.innerHTML = POD_STAR_SVG;
      wrap.appendChild(spB);
    }
    const av = makeAvatar(row.avatar_svg, row.display_name, cfg.avatar, 'pod-avatar');
    av.style.border = '3px solid ' + cfg.ring;
    if (row.uid) {
      av.style.cursor = 'pointer';
      av.onclick = function() { visitUser(row.uid); };
    }
    wrap.appendChild(av);
  } else {
    const empty = document.createElement('div');
    empty.className = 'pod-avatar pod-avatar--empty';
    empty.style.width = cfg.avatar + 'px';
    empty.style.height = cfg.avatar + 'px';
    empty.textContent = '?';
    wrap.appendChild(empty);
  }
  col.appendChild(wrap);

  const name = document.createElement('div');
  name.className = 'pod-name' + (row && myId && row.uid === myId ? ' pod-name--me' : '');
  name.textContent = row ? (row.display_name || 'Gebruiker') : '—';
  col.appendChild(name);

  const xp = document.createElement('div');
  xp.className = 'pod-xp';
  xp.textContent = row ? (row.weekly_xp || 0).toLocaleString('nl-NL') + ' XP' : ' ';
  xp.innerHTML = row ? xp.innerHTML : '&nbsp;';
  col.appendChild(xp);

  const block = document.createElement('div');
  block.className = 'pod-block ' + (row ? cfg.blockCls : 'pod-block--empty');
  block.style.height = { 1: 92, 2: 68, 3: 52 }[rank] + 'px';
  const num = document.createElement('span');
  num.className = 'pod-num';
  num.textContent = rank;
  block.appendChild(num);
  col.appendChild(block);

  return col;
}

function renderPodium(rows, myId) {
  const pod = document.getElementById('podium');
  pod.innerHTML = '';
  if (!rows || rows.length === 0) { pod.style.display = 'none'; return; }
  pod.style.display = 'flex';
  /* display order: 2 — 1 — 3 */
  pod.appendChild(podiumCol(2, rows[1] || null, myId));
  pod.appendChild(podiumCol(1, rows[0] || null, myId));
  pod.appendChild(podiumCol(3, rows[2] || null, myId));
}

/* ── Render leaderboard ── */
function renderLeaderboard(rows, myId) {
  const list = document.getElementById('lbList');
  renderPodium(rows, myId);

  if (!rows || rows.length === 0) {
    list.innerHTML = '<div class="lb-empty">Nog geen spelers deze week.<br>Begin een tentamen om in het klassement te verschijnen!</div>';
    return;
  }
  list.innerHTML = '';
  let myRank = -1;
  rows.forEach(function(row, i) {
    const rank = i + 1;
    const isMe = row.uid === myId;
    if (isMe) myRank = rank;
    if (rank <= 3) return; /* top 3 live on the podium */

    const div = document.createElement('div');
    div.className = 'lb-row' + (isMe ? ' lb-row--me' : '');
    div.style.animationDelay = Math.min(0.55 + (rank - 4) * 0.045, 1.1) + 's';
    if (row.uid) {
      div.style.cursor = 'pointer';
      div.onclick = function() { visitUser(row.uid); };
    }

    const rankEl = document.createElement('span');
    rankEl.className = 'lb-rank-num';
    rankEl.textContent = rank;

    const avatarEl = makeAvatar(row.avatar_svg, row.display_name);

    const nameEl = document.createElement('div');
    nameEl.className = 'lb-name';
    const nameTxt = document.createElement('span');
    nameTxt.style.cssText = 'min-width:0;overflow:hidden;text-overflow:ellipsis;';
    nameTxt.textContent = row.display_name || 'Gebruiker';
    nameEl.appendChild(nameTxt);
    if (isMe) {
      const chip = document.createElement('span');
      chip.className = 'lb-me-chip';
      chip.textContent = 'jij';
      nameEl.appendChild(chip);
    }

    const xpEl = document.createElement('div');
    xpEl.className = 'lb-xp';
    xpEl.textContent = (row.weekly_xp || 0).toLocaleString('nl-NL') + ' XP';

    div.appendChild(rankEl);
    div.appendChild(avatarEl);
    div.appendChild(nameEl);
    div.appendChild(xpEl);
    list.appendChild(div);
  });

  /* stat tiles fed from the leaderboard rows */
  if (myId && myRank >= 1) {
    countUp(document.getElementById('tileRank'), myRank, { prefix: '#', dur: 700 });
    const myRow = rows[myRank - 1];
    countUp(document.getElementById('tileWeekXP'), myRow.weekly_xp || 0);
  }
}

/* ── Load leaderboard from Supabase RPC ── */
async function loadLeaderboard(sb, myId) {
  if (!sb) { renderLeaderboard([], myId); return; }
  try {
    const { data, error } = await sb.rpc('get_weekly_leaderboard');
    if (error) { console.error('Leaderboard error:', error); renderLeaderboard([], myId); return; }
    renderLeaderboard(data || [], myId);
  } catch(e) {
    renderLeaderboard([], myId);
  }
}

/* ── Rang (medische carrière) — zelfde ladder als profile.html LEAGUE_TIERS ── */
const RANK_TIERS = [
  { name: 'Student',      min: 0,     color: '#58CC02' },
  { name: 'Co-assistent', min: 10000, color: '#00CD9C' },
  { name: 'Basisarts',    min: 20000, color: '#1CB0F6' },
  { name: 'AIOS',         min: 30000, color: '#A78BFA' },
  { name: 'Specialist',   min: 40000, color: '#FFB800' },
  { name: 'Hoogleraar',   min: 50000, color: '#FF4B6E' },
];
function rankIdxFromXP(xp) {
  for (var i = RANK_TIERS.length - 1; i >= 0; i--)
    if (xp >= RANK_TIERS[i].min) return i;
  return 0;
}

/* ── Rang tile + meter ── */
function updateStats() {
  const idx  = rankIdxFromXP(totalXP);
  const tier = RANK_TIERS[idx];
  const next = RANK_TIERS[idx + 1];
  const levelEl = document.getElementById('tileLevel');
  const fillEl  = document.getElementById('levelMeterFill');
  levelEl.textContent = tier.name;
  levelEl.style.color = tier.color;
  fillEl.style.background = tier.color;
  if (next) {
    const span = next.min - tier.min;
    const prog = totalXP - tier.min;
    fillEl.style.width = Math.max(0, Math.min(100, (prog / span) * 100)) + '%';
    document.getElementById('levelMeterSub').textContent =
      (next.min - totalXP).toLocaleString('nl-NL') + ' XP naar ' + next.name;
  } else {
    fillEl.style.width = '100%';
    document.getElementById('levelMeterSub').textContent = 'Hoogste rang bereikt';
  }
}

/* ── Init ── */
async function init() {
  window.renderSidebarProfileIcon && window.renderSidebarProfileIcon('?');
  updateCountdown();

  const sb = getSB();

  /* The klassement is meaningless without an account (no XP, no rank, no row),
     so guests get the shared login pop-up instead of an empty board. */
  const session = await VumedAuthGate.guard({
    subtitle: 'Log in om mee te doen aan het klassement en je positie te zien.',
  });
  if (!session) { renderLeaderboard([], null); return; }

  const user = session.user;
  const displayName = (user.user_metadata?.full_name || user.email || '').split('@')[0] || 'Gebruiker';
  window.renderSidebarProfileIcon && window.renderSidebarProfileIcon(displayName[0]);

  /* Fetch full profile — stable columns only */
  const { data: profile } = await sb
    .from('user_profiles')
    .select('total_xp, week_key, week_start_xp, display_name, avatar_svg, total_gems, total_coins')
    .eq('user_id', user.id)
    .single();

  totalXP = profile?.total_xp || 0;

  /* Update profile fields if needed */
  const currentWeekKey = getISOWeekKey();
  const localAvatar    = localStorage.getItem('vumed_avatar_head_svg') || null;
  const updatePayload  = {};
  let weekStartXP      = profile?.week_start_xp ?? totalXP;

  if ((profile?.week_key || '') !== currentWeekKey) {
    updatePayload.week_key      = currentWeekKey;
    updatePayload.week_start_xp = totalXP;
    weekStartXP = totalXP;
  }
  if (!profile?.display_name)                         updatePayload.display_name = displayName;
  if (localAvatar && localAvatar !== profile?.avatar_svg) updatePayload.avatar_svg = localAvatar;

  if (Object.keys(updatePayload).length > 0) {
    await sb.from('user_profiles').upsert({ user_id: user.id, total_xp: totalXP, ...updatePayload });
  }

  /* Weekly-XP tile fallback from the profile (the leaderboard row overrides it when present) */
  countUp(document.getElementById('tileWeekXP'), Math.max(0, totalXP - weekStartXP));

  updateStats();
  await loadLeaderboard(sb, user.id);

  /* Logged out in another tab → the gate comes back rather than a hard redirect. */
  sb.auth.onAuthStateChange(function(event, session2){
    if (!session2) VumedAuthGate.require({
      subtitle: 'Log in om mee te doen aan het klassement en je positie te zien.',
    });
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
